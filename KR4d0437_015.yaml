body:
  text: 水雲村稿卷十五元劉塤撰表箋壽節賀表景定庚申正月五日獻歲發春挺生真主與天齊壽恭祝聖人矧臨啓運之年有衍興王之慶恭惟剛健中正神武聰明三紀四方無虞丕暢久成之化九夷八蠻通道克開底定之勳適虹電之交輝等乾坤而同永臣分藩有守造闕無繇藝祖開創於庚申願恢令緒帝舜誕彌於甲子期邁修齡謝賜厯日表景定甲子仰觀天文協用五紀以為民極賚及萬方蒙帝力以何知表人時之敬授恭惟誠參化育道妙裁成膺厯數以在躬契合六十年之興運察璣衡而齊政環循三百載之太平正朔誕頒車書咸被臣職司勸課志在布宣云云紹陵誕嗣賀表咸淳戊辰十月一日乾萬物之資始式開有道之長震一索而得男丕衍無疆之厯甸區嘉賴宗社奠安恭惟德澤延洪仁恩涵育忠厚成其福祿克底蒸民之生孝弟通於神明宜接千歲之統告朔適當於良月流虹遂應於前星臣老佚里居逺欣邦慶二十九得皇子同符先漢之頌歌億萬年敬天休永邁成周之厯數賀太后德合重坤仰詒謀而翼子祥開索震爰受祉而抱孫宸扆來朝慈幃增喜恭惟得天久照應地無疆壽考萬年用介福於王母本支百世肆遺休於後人遙知問寢之歡坐享含飴之樂臣身棲南畝心戀東朝誦太任思齊之詩於昭積慶效湯孫猗那之頌式衍丕基賀皇后宫幃雍穆肇美蟄繩廟社靈長為生岐嶷仰離明之繼照表坤厚之含光恭惟如月之常配天其澤審官賢佐君子助成化育之功帥嬪御祠高禖協應誕彌之瑞凡皇祚綿於百世由化基本諸二南臣幸佚餘年欣逢慶事祝帝堯之多子有偉貽謀頌太姒之嗣音永言齊壽正旦賀表咸淳庚午歲協祝釐頌九州之正朔帝臨垂拱朝萬國之衣冠自天降康與民更始恭惟日新盛德春育涵生六年受五服之朝混同文軌一氣轉八荒之壽增壯山河適當黃道之中宜處青陽之左臣歸田身老戀闕心存王春受漢京之圗莫陪正伏吉月布周邦之治苐仰寬書太后月正元日尊臨南靣之居天下一家同致東朝之慶慈顏有喜景福無疆恭惟與物為春後天不老龍樓戒曉日膺問寢之儀雉扇開雲歲舉奉觴之典九重稱賀萬國具瞻臣歸老邱園馳神集闕四時成歲欣逢交泰之期五色補天端賴重坤之助皇后王者大一統式迎泰道之亨太極有兩儀允賴坤元之載歡騰柏頌喜溢椒塗恭惟化基二南仁育萬物正位乎內助宣太皥之春申命自天均迓元正之福對龍杓之易次仰鳯闕之受朝臣昔侍西清今安南畝想紫禁煙花之繞莫綴班聨瞻黃道日月之明遙依魏闕壽節賀表至元戊子八月二十八日乾統天而乘六龍光臨率土兑正秋而説萬物瑞應流虹聖明挺生遐邇胥慶欽惟寬仁撫世神武興邦如月之恆日之升同符久照際天所覆地所載咸入洪圖福鎮關河壽齊箕翼臣分藩有守望闕無由致嵩嶽之三呼苐瞻北極指軍峰之萬仞遙祝南山又至元己丑乾元御極運應河清兑正司秋節逢電繞萬年介福四海均歡欽惟光嶽儲神箕翼同壽為天地立心生民立命共樂治平凡日月所照人力所通悉陶化育祥開誕聖慶衍齊天臣忝牧一州恭瞻九陛歸美報上莫親奉於玊巵以忠事君尚逺稽於金鑑登極賀表至元甲午四月天子君萬邦遹符厯數皇極斂五福誕覆幅員華夏歡聲乾坤喜氣欽惟與天同大如日方升聰明睿智以獨尊登九五位朝覲謳歌之並集得億兆心宗社安於泰山詔令聳乎率土丕昭祖訓光御皇圖臣叨守外藩遙瞻中禁又逢聖主逾殫莫報之忠嘉與逺氓共樂升平之治又萬户府明帝御邦嗣纍朝之丕緒黎民有主藹萬國之歡聲廟社奠安乾坤開霽欽惟純粹中正濬哲文明鍾三光五嶽之英天姿特異為六軍兆姓之主神器有歸奉烈祖之聖謨膺皇躬之景命時乘龍御光紹鴻基臣濫職柳營馳神楓陛爰飭采薇之戍謹守封疆敬歌天保之章願綏福壽壽節賀表甲午九月五日虹電流輝適應九秋之候乾坤齊壽有開萬壽之期瑞氣氤氲頌聲洋溢欽惟睿知神武博厚高明天日英姿鍾太極兩儀之全氣風雷嘉會協六軍萬姓之歡心當新政之御圖紀良辰之育聖誕彌厥月長發其祥臣分牧南邦馳神北闕瞻蓬萊之五色阻綴賀班效嵩嶽之三呼遙伸善頌又萬戶府龍飛御極甫新一統之權虹流介祥咸仰九重之慶歡騰薄海瑞靄層霄欽惟載纘武功誕敷文德撫軍監國久符重輝重暈之占應天順人善繼同軌同文之治茂介秋高之候有開帝出之辰臣縻職柳營馳神楓陛千官朝賀遙瞻漢殿之班萬旅歡呼共上莊杶之祝正旦賀表元貞乙未歲頒寶厯大一統以為元春度玉墀喜萬年之介壽和熏海岱喜溢乾坤欽惟德與日新仁同天覆車書混一睿知足以有臨正朔昭明華夏罔不率俾儉勤遵夫祖訓愛敬説於親闈茂對青陽益臻洪福臣職分藩服心戀闕廷膺貢受圖雖阻陪於朝會行慶施惠願祗布於恩言又萬户府東風轉律又新萬物之輝南靣受朝茂介九重之慶聖朝臨御華夏瞻依欽惟稟睿自天性仁繼祖修車馬備器械八紘丕振於皇威開黃道拜紫宸百辟共推其神武當持盈守成之世逢考圖數貢之辰壽祉駢臻基圖鞏固臣屬縻軍務阻綴廷班詩詠采薇恪守封疆之戍春融細柳常懷雨露之恩壽節賀表總統所華衮天臨喜親逢於明主方袍雲集咸恭祝於聖人運應六龍之乘生同一佛之出欽惟慧通山海福比河沙纍劫萬行圓成為世界主大地衆生歸仰居人中尊當秋高氣清之時紀電繞虹流之節壽齊箕翼慶溢乾坤臣祗率梵徒遙瞻宸御真詮五千卷敬翻貝多葉以披宣睿照億萬年願比須彌山而長久又九月五日虹渚紀祥九五適符于令節象筵啓教億兆齊藹於頌聲飛龍御天生佛見世欽惟獲無量福居不動尊因果圓成作大地山河之主智慧廣大為當世天人之師先囊茰四日之期應曇花千年之瑞光騰箕翼喜溢乾坤臣寄迹南邦傾心北闕領苾芻衆敬宣覺帝之真詮繞蓮華臺齊祝聖皇之上壽登寶位賀表大德丁未六龍在御初臨南面之朝萬象維新咸拱北辰之照皇圖鞏固甸宇欣愈欽惟淵懿聰明睿知神武鍾三光五嶽之全氣繼祖嫡傳得六軍萬姓之歡心受天寶命孝愛首尊於慈極寬仁誕布於多方膺謳歌朝覲之歸副宗廟社稷之託臣忝紆郡韍恭被詔綸厯數在躬所願跨商周之世福威惟辟何幸逢堯舜之君太后册寶賀箋同神受寶册正萬國之母儀帝奉玉巵開億年之聖壽宫闈喜氣穹壤歡聲欽惟道協媧皇德高文母如天之運定大策於禁中挾日以升福羣黎於宇內既措安於神器宜誕受於鴻名盛典輝煌慈顏欣懌臣縻身南服稽首東朝擁佑有功永昌九重之侍養對揚無斁共欣千載之會逢東宫受寶賀箋帝臨玉扆新膺昕陛之朝天受寶符首正春宫之位慶綿宗祏歡動甸區敬惟機神英明性質仁厚娛侍太母藹和氣於宫闈擁戴聖皇著殊勳於社稷宸眷篤怡怡之好淵𠂻定繼繼之謀瑞協龍潛祥開燕翼某身縻支壘心遡賀庭重光重暉喜羣情之有屬同文同軌占大厯之無疆尊號賀表至大乙酉四月南靣視朝敞玉宸而臨御東宫考禮煥寶册以推尊仁洽萬方歡騰八表欽惟德配天地孝通神明得位得祿得名光昭烈祖重光重輪重潤敷佑後人履端誕受於徽稱渙號遄頒於慶賜聖朝創見縟典增輝臣忝守偏城欽承明詔進官一列喜均被於隆恩祝壽萬年願常熙於鴻號壽節賀表己酉七月律轉清商適金行之肇序位尊皇極紀電繞之呈祥福祿駢臻朝野胥慶欽惟聰明作后寬惠愛人天下同軌同文新崇徽號王言如綸如綍誕播洪恩勤問寢於龍樓永貽謀於燕翼式逢瑞節丕衍耆齡臣分牧南邦馳神北闕三呼祝壽阻親奉於玊巵百拜盡恭願常瞻於丹扆東宫生日賀箋三月三日瑞啓龍潛光應斗樞之繞歡均鼇掖時當天氣之新福祿駢臻朝野胥慶敬惟英明冠世神武安邦贊一日萬幾之權允熙庶績慕二帝三王之學博采羣書欣際昌辰益隆壽祉某等屬縻州壘阻綴庭班遙祝千齡衍本支而益茂恭陳百拜仰華鄂之相輝延祐丁巳肆赦謝表周王敗後立愛惟親特厚宗藩之眷宥過無大誕均甸宇之恩詔下九霄歡騰八表欽惟堯仁濟衆舜德好生追懷棣鄂之華忍遺厥後曲軫茅封之貴弗麗於刑憐其詿誤之情錫以虧除之澤宏敷曠蕩溥及隱微臣職謹布宣心同欣躍雷雨作解同熙一氣之春日月照臨永衍萬年之福水雲村稿卷十五
