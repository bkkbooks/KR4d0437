body:
  text: 水雲村稾巻十元劉壎撰啟下代友上太守求辟凝蘇州燕寢之香承流有偉對藍田鶩行之立居攝何庸昔未契於登龍茲僭希於附驥遂修小楷以叩大鈞某空抱古心素無竒骨少時鐙火頗睥睨於文塲壯日塵埃竟低徊於俗轍值豕蛇之蹂躪隨鴻雁之流離命也奈何心之憂矣國破而山河在歎身寄於異鄉城是而人民非空夢懷乎故宇一行作吏再轉為丞聞之諸老誨言厲以古人事業我心匪石惟履正以奉公衆口鑠金乃為法而受惡肺肝洞見頰舌難爭幸有為推轂之謀俾來試代庖之技吾斯未信若將驚曲於傷弓人亦有言詎可因噎而廢食方重西江涸轍之苦敬為南豐瓣香而來見交朋競相勉以新圖謂前政已不該於舊職昉茲虛席曷勿改弦雖太守不可干無容出位然真王何用假妄欲正名惠冀陶鎔就加剡奏舍皇甫而取居易抑又何嫌薦文舉而辟慈明亦知無靳輒忘自售遂爾長鳴判府以世偉人為郡良牧半符分竹奉行寛大之書四境耕桑鼔舞治平之政相業將傳于衣鉢民歌已沸於袴𥜗方恢夾帒之儲尤軫同袍之念尚私造化施及么微失一老兵得一老兵儻成身之有望遇以國士報以國士誓沒齒以無忘混補中太學謝運使雪案窮經幾嘆平沈於塲屋星台校士例䝉薦送於橋門被明君樂育之仁由膚使吹噓之力摳衣以謝銜袖惟㳟某陋巷簞瓢窮年鐙火數寸管盈尺紙乆無當世之知六國印二頃田毎慨古人之志雖嘗充賓而觀國未能換骨以成僊鼓瑟於好竽之時不諧已甚戴笠於乘車之側見棄宜然屬當以喜以懼之年豈無為養為貧之志然功名路左何翅隔弱水而望蓬萊且幽憂味深安得夢鈞天而遊帝所我之懷矣命也奈何適公朝之議欲廣羣才舉京師之試悉歸諸道既省買珠之費孰無獻玉之思來從姑山直上滕閣苐知小敵怯大敵勇何懼萬人傑千人英咸疑寒谷之黍遲忽覺冷灰之豆爆讙馳榜帖喜動庭闈禮儀三百威儀三千且不孤於家學初是什三終是什五姑勿恤於浮言意其遂顯揚之心是以有倖踰之幸孫業鼓篋即為帝學之諸生教子明經差慰高堂之二老不妨竒特穏趁扶揺都運侍郎武城名家甘泉法從晝錦行部薦增枌杜之光昕陛疇庸寵畀松階之峻共惟先正有偉清名魁躔尚見於煇煌世官克宣於乆大茲煩勸駕遄趣歸班致令桑梓之微亦玷菁莪之數孰云朽腐忽爾神竒某敢不騰蹋天庠激昻風節舉幡叱六館士慨想何蕃之忠弄筆貽三子羞敢負旴江之訓謝廟堂給假元宰施恩曲憐覊困孤生銜恤暫釋縶維還家遂負土之情出命由轉鈞之造惠均存沒感極髙深伏念某志攀龍鱗福輕蟬翼強支衰冷門户頗思激昂欣際清明朝廷荐叨啟擬忽自天而擿福誠無地以訴寃集的騰章披襟受責方風濤飛千仞而上殆性命寄半縷之間所幸天王明聖公卿篤厚顧朝綱關係雖重違霜簡之言及造化斡回止近徙春臺之境然受譴固非荒逺難居之所而抱痛則異尋常負戾之人當其雷霆震驚聞者為之落膽俄而滫瀡凄斷愴然㡬致殞身禍機交迫乎一時逆境真成於萬狀使至此極不如無生几筵長辭舉室皆爲掩泣衰絰赴貶行路莫不興哀回首三年冥心一黙蚍蜉援絶分永棄於纍囚烏鳥情鍾痛未安於卜兆流涕歎青山之逺撫膺嗟素韠之終㳟惟廟堂寛繩束以待謫籍載在禋赦許謁告以葬親喪陳情甫徹於六符予假訖寛於三月方將披荆榛而營冡隧植松檟以蔽阡原遼東之鶴來歸渾疑夢裏巴西之麑獲放永戴恩私惟公所施與宋無極茲葢大丞相身佩軍國手運乾坤以仁厚贊威福之權延洪社稷以忠義立勛名之本昭掲旂常每興憫於流人俾自全於盛世謂御史執國法寧無風霜肅殺之威而大臣育人材當廣天地發生之徳俾克襄於大事獲暫反於故鄉某永誓糜捐重伸歸倚所冀寛慈之量就施觧縱之仁當此生中儻未答成身之賜盡未來世亦必酬造物之恩此語或誣彼蒼可鑒謝雷安撫辟充帥參依夫子宫牆夙歸化冶陪元戎幕府允出禮羅甫被命於鈞天亟攄忱於恩地卵翼其造手額知歸某崛起單平勇思植立韓王謂道理最大服膺是言晉人云州縣徒勞强顔以仕居常奮厲求實職業深恥矯亢竊虛名聲然而問劍抵掌之雄固慙馬武當走檄飛書之任亦媿枚臯分平沈於常科忽巧逢於元造殷勤說項特達薦韓内而翺翔學省之班出則關决山水之郡比解綬而歸故里盍杜門而理舊書念人生盛時豈忍自同於草木况士遇知己亦欲少報於絲毫旣著主家衣裳豈傍誰人門户方將九頓首而請已施一舉手之仁天落除書俾陪鈇鉞地居元幕堪賦鐙棊謝吳提刑特薦四牡勞使臣之功將催召駕一鶚騰薦士之表猥及别車軒然特異之知偉甚不求之獲允謂竒事可無謝言㳟惟明台實號澂按之任凢我屬部以受薦舉為榮欲旌别以報聖明宜簡㧞而得竒俊顧如某者何若人哉老色漸分已消盡英雄之氣壯心未已欲獨垂天地之間覽流涕太息之疏而傷懷受抱膝長嘯之吟而抵掌謂苟可以及物初何拘於擇官起從空山來佐偏壘訪麻姑方乎舊隱玩泰伯子固遺文閉户讀書奚暇計寒餓之水火研朱㸃易頗欲窺廣大之乾坤諸老深諒其持躬當路間委之决事奉三尺法每思特立以獨行寓一分寛幸免羣嘲而衆怒頃荷崇臺之出檄俾行鄰境以慮囚鄉人好惡何如兩難於處天下道理最大壹斷以公苐求不負於平亭何敢僭希於賞識行部獨懸清鍳騰章靡棄凢材決獄中情公過褒矣遇事能斷僕敢當哉鏘然韶鈞之鳴過於鼎吕之重茲蓋提刑祕閣五雲絢綵萬壑凌清詳讞多功玉節駐斗牛之分陶鎔有造金丹換雞犬之僊似俛念於湮沈故特加乎披拂慨然推轂光此題輿某敢不祗佩隆知益堅素履幸入古靈之稾足重此生不叛韓子之門請觀他日上吕都大求舉鎔台天近寳光上映斗間辯幕地遙金躍碩歸冶内幸在六路提封之數敢私一陶播物之恩冐然呌呼冀於造就竊惟士皆欲附名世人必有待先容元獻知遇希文端自沂公之汲引歐陽奬進介甫亦由子固之推揚氣類一時風流干載乃若說項旣無旁譟薦韓又乏裏言不自陳之其誰知者某素短竒譎空持拙迂讀聖人書頗亦識其大者登進士第乃以困而得之每嗟萬物之皆塵當思一命之及物入芙蓉府孜孜備竭忠勞問桃李蹊落落渾無主意當路雖加之刮目選坑豈易以騰身洪惟崇台所統幾半天下凡我屬部相與求入彀中矧薦額素寛宜癡心有望因念曩奉秋風之檄嘗幸獲親霽月之暉官燭風簾尚憶夜堂星聚寳儲玊節或憐幽谷黍遲雖隔龍豬妄希鷙鶚都大寳謨典型諸老經濟通儒入登農雁之司月班清峻出總圜府之任馹傳光華宸旒渇想老成筆槖將還嚴近尤篤同袍之好常恢推轂之仁遂及我私願竊有請亦既在鳶飛魚躍之内所願附牛馬勃之餘呂公為相善用人儻垂恩而東拔何蕃正色不從亂誓盡節以報酬籲天而言指日以竢再舉謝段知軍朝廷右文聿求竒士郡國論秀又及陳人秋風姑慰其寂寥春色頓囘於顦顇雖非差事敢廢謝言某起從單寒妄慕高逺更生晝觀書夜觀象心實憂時武惠左執印右執戈志期用世雖嘗充賓而觀國未能換骨以成僊念壯夫工篆刻之詞聊復爾耳以科舉妨義理之學豈所欲哉掲元龍百尺之樓聚鄴侯三萬之軸交韵人勝士競勉以千載而自期游名山大川亦深思一試之可厭徒以親年逾邁已志未伸從容隨戰蟻之塵慷慨動落鵰之興漢將軍出塞漠幸爾成功唐學士登瀛洲居然充數換醒十年舊夢彉開萬里修程疏景暗香問逋仙之無恙紅塵紫陌笑劉郎之又來雖曰僥踰距非竒特判府真循良守為君子儒平易近民四境相安而成俗忠信勸士一榜多見於得人明揚韋布之精神勇赴衣冠之期㑹某敢不力懲奔北期趁圖南竊慕昔人謂温飽非平生之志所冀異日願功名成逺大之猷恥循囁嚅姑陳梗槩謝監試通判聖主摉賢擇新進士魁儒䕶試得舊門生昔未嘗造請於公庭今亦非稱謝於私室漫循彛典用摯斐文某起從䵓鉏誤學書劍撫六經陳蹟厥有深思爭一時虛名每成自笑早游場屋嘗辱鑑衡方執鞭屬櫜而前自分禹門之鯤化及棄甲曵兵而走竟作宋都之鷁飛盍歸來乎短檠可奈何兮長鋏以科舉妨義理之學夫豈本心如壯夫工篆刻之詞亦懷媿色適别車之來涖喜廣厦之可依子來見我乎豈不願親於臯坐人言可畏也苐當力戒於𤓰田所恃堂下見蔑之心不訝庭中無愈之蹟謝州郡勸糶差充僉幕倒廪應公家之急幸逭嚴誅走檄假議幕之榮猥叨華奬增户門之輝映動閭里之傳誇頓首凝香箋心銜裏某深居山澤薄有田園頗慕少游稱善人故毎奉太守都吏之條教莫效魯連為國士故惟聽里胥亭長之指呼思先世剏業之孔艱凡平日奉公之尤謹有來使命謂乏軍儲俾為實粟之圖以繼汎舟之役人非卜式焉得輸財而助邊世乏子文孰肯毁家而紓國况旴南當千里旱而後彼田間無三年蓄之存寧有積倉可供公廪然而良二千石薫然如召父之慈福十萬家樂只歌岑君之化當酌緩急通融之誼式昭公私體恤之心順流而東非有萬連檣之獻從天而下遽膺一紙十部之班俾由民伍之卑徑齒議曹之末惟通有無於上下之際本皆職分當然若論施報於官民之間殆似等威不辨固知忠信所以勸士然而名器不可假人雖則浮榮寧非竒事判府諸王孫之貴介郡刺史之循良來臨小有洞天成渤海潁川之化重見太平官府如元康地節之間偶當郡計築底之餘深軫軍食乏興之慮命之輸粟褒以泛蓮某袛服寵光永銘恩紀清香畫㦸如今足庇於震凌茅屋蒼苔從此甘安於耕鑿混補試中謝運使陳吏部雪案臞儒低徊場屋星台膚使吹送橋門借桃李之恩光采菲葑之下體摳衣往謝銜袖具陳於惟我朝度越前代六館突兀率聚養於英豪三舍選掄多貯儲於公輔十四聖流傳美意幾千人成就大名逢明主之右文闢賢關而升俊十行下詔數路得人宜求博達經世之儒何取椎魯不文之士如某者風霜容顇鐙火夢孤壯志激昂頗亦自矜寸管流年晼晩居然坐閱千颿精神疲敝於三日之文意氣銷沈於四詩之學蹋秋槐共已屢折僊桂以何艱竊嘗泣黄巻而問天悔不買緑蓑而耕雨傷嗟垂翄羞縮中眉適公朝之議欲廣羣材舉成均之試悉歸諸道既省買珠之費孰無獻玊之思扁舟下旴母之江斗酒上滕王之閣挾書而賈勇整文陳以前驅弄翰操觚頗識詩人興致之逺造車合轍敢期有司裁鑒之精正憐寒谷黍遲忽覺冷灰豆爆便辭下土徑到鈞天矧叔姪之竝游尤朋儕之共賞太學生辭家射䇿誰啟亨幾清詔使攬轡登車實司文炳風雷變化星斗光芒都運吏部三山魁傑之儒四海耆英之老號佳吏部蓋嘗集北斗而騎麐為健監司方且邀西江而活鮒追憶當年鼓篋許令此士傳衣俾小草之出山同菁莪之在沚某敢不磨厲風操騰蹋天庠念騎省故家雖粗習文章小技入古靈薦稾尚勉思節誼大閑賀宰執正旦三朝元㑹將囘青籥之春四近輔臣獨侍紅雲之表協扶熙運丕輯蕃禧某官氣鍾陽和名掲晝日謀王體斷國論蚤簡宸𠂻究皇儀展帝容獨持政柄親被銀罌之賜永觀金鼎之調某行即解摩及逢換厯千林有喜竊自歎於嵗寒一氣轉鈞尚密囘乎生意賀侍從正旦風轉青旗嵗又逢於作噩雲連紫禁班獨峻乎文昌偉魁傑人膺熾昌福某官胷中太極筆底陽春金門龠玉珂密連芳於法從銀罌翠琯親拜賜於君王巍步星辰早施霖雨某解麾將代換厯有慙芙蓉不向於東風自憐顦顇江梅願依於朝露尚借發生囘太守惠夀詞露電餘年寧復久生之羡宮商雅韵寵貽初度之褒借衛㦸垂光添門弧喜色判府儒雅飾吏平易近民鳯凰行集於潁川歡傳召璽龜鶴相期於夀域特製新腔句麗陽春氣增晚莫蕭蕭白髪忽聞正始之音寂寂紅牙難品清平之調某苐瞻凝燕莫效續貂少太公三年自知耄矣頌魯侯千嵗還以報之冞積感𠂻曷抒謝語謝郡宴致語一牛横笛方欣受許子之㕓千騎專城乃辱設穆生之醴荷君侯寵遇覺樵牧傳誇判府東陽文章之家西京循良之吏秩中二千石試皁蓋之行春胷有百萬兵報紅旗之破賊既肅清狐兎亦安集雁鴻適帶裘整暇之時宜尊爼從容之樂謂古者存問遺老蓋敬高年謂諸侯不臣寓公特加異禮肆啟黄堂之宴倍添白髪之光揮哲匠雄文託伶工俳語從太守游而樂欣聆歌管之和均笑山翁醉似泥不覺綸巾之傾倒賀錢守生辰天開瑞節月紀誕辰入千嵗為春式占遐筭十萬户受福丕靄歡聲適又對於埀弧行入躋於持橐某僭陳頌語阻綴賀班欲永歌之恐難入紅牙之拍為此詩者願常觀緑鬢之新囘黄堂長投獻捧檄録囚暫寓弦歌之治峩冠枉駕遽同翰墨之盟便相忘一見之初真不啻三生之遇有文相接陳誼甚高堂長丰骨昂藏詞華竒怪宜州太史之裔必昌於詩南豐先生之鄉忽有此士諒欲黼黻乎王度奚為領袖於湖庠嬉笑怒罵皆成文章何軒騰之小晩趦趄囁嚅羞處汚薉信抱負之不凡見諸公咸稱之謂一第特溷耳孤鐙窻下毋忘黄卷討論羣玉峯閒曾掌丹鉛㸃勘某朅來折獄虛枉貽緘相遇邂逅而子偕臧知為善士多有平反而毋必喜自愧古人雖即言還尚圖往謝謝陳總領惠夀詞年華尚晩癡頑戀駒隙之隂韵語生春流麗援鶴山之譜交情無斁初度有光總領户部魁儒嫡傳王人雅望書破萬巻毎鑄出偉詞文成一家獨埽空衆作游戲小有丹霞之鏡歸來甘泉上雍之班興念陳人適臨生旦度尊前白雪溜亮宮商剪水上浮雲淋漓翰墨華哉短韵期以長年某方禱山川莫垂弧矢傳來樂府雖難期銅狄之齡流入教坊應可品玊簫之調通判囘諸縣賀滿考共千里月愧莫積於年勞飛五朶雲辱過褒其嵗最䝉成幸矣稱賀宜乎毎惟遲鈍之蹤深負平分之寄湯火交迫苐懷玩愒之羞泉石自佳寧有嘯詠之樂蹉跎累日僥倖及期敢圖宰邑之賢特軫同僚之誼念司馬青衫老去幸免曠瘝辱諫議白絹飛來曲相奬飾九頓圭誦一意篆銘苐既沗郡股肱正自賴公羽翼動陶園松菊之興尚逺戍期借潘縣桃李之春允資寅協招陳總領㑹夙幸登門毎厪縣榻天下士惟陳正字信足當涪翁之言山中友勸老東坡久欲效黄人之飲茲卜月圓之夕正逢秋立之期汎埽行窩欵延都騎願振飛霞之佩庶聆屑玉之談囘羅檢閱求書入京猥荷深情寵貽妙語志在千里喜將賦子長之游文成一家初何待孔融之薦意者游戲翰墨居然寵畀琳瑯檢閱昭諫詩材公逺仙韵城南鐙火頗聞警悟於昨非筆下波瀾時見流傳於近作破除湖海豪氣親炙文章巨公然且自憐虞翻之屯恨無知已蓋有爭說項斯之善惜未逢時乃今不憚山川阻修而欲往觀京闕壯麗脫頴而出諸公定放一頭揮翰如飛即日㑹逢具眼某素加心敬苦恨力微竊幸有志之竟成敢不以言而為贈辭家好去未湏動莊舄之吟得意歸來定見佩蘇秦之印薄相從臾未冩綢繆賀翁中書知贑州誕膺温詔出鎮巨藩岳牧用詞人輟紅藥蒼苔之步兒童迎太守囘玊虹翠浪之春千里宅生萬物吐氣某欣聞滌篆莫遂拜庭顧比辱於貽箋且重厪於致饋敢因慶語就控謝衷送司業酒錢自驚暴富依杜陵夏屋猶賴庇寒代謝送物赴試浪游南浦正怯望洋送上西雍猥厪借潤璀粲餞行之貺殷勤助譟之言拜嘉堪醉於瀲紅賈勇無愁於曵白苐慚不振恐負相期仰天大笑出門吾無患矣入學孫業鼓篋君其許之感戢未央敷陳曷既代賀趙京尹生辰銅陵石磴之地清實鍾間氣玊露春風之秋早喜際誕辰爰集懽聲肅陳善頌某官斗間瑞采天上靈根都民騰前趙之歌尚思神政詩人咏保魯之壽永重宗盟春動綵庭恩來紫禁某幸依仁里盍詣慶閎屬方倚於藥鑪遂莫扶於夀斝進長生曲雖媿非白雪之音祝不老僊願永見朱顔之潤代送車新昌赴任鼎來迓騎趣駕飛鳬花景一簾坐想彈琴而治芝亭百里又傳製錦之新靡待政成即聞詔召某莫陳祖宴輒貢贐儀因緬思乎舊游悵已成於陳蹟媿無遺愛顧揚秕之懷羞儻有餘情尚匿瑕之是望代鄒倅任滿經從招㑹海沂歌滿行趣簉鵷泉間地佳小煩駐馬方欲少叙子孫之好詎容弗盡賓主之情輒擬詰朝僭邀卜晝作文字飲雖無楚舞勸酬待老成人定有蕭規授受願言臨賁用篤交承代囘鄉舉諸貢元獨提健筆偉新刃之發硎勇奪薦書儼輕車之就道盛傳秋㨗大㥦旦評某人經明行修聲飛實茂賦云賦聲摩空書眼如月品流高勝信紅泉碧澗所鍾意氣豪雄以黄榜緑袍自許已㸔横鶚㑹應䜟龜某沗此分麾幸哉勸駕辱峩冠而枉顧驚銜袖之暗投希夷謂天地間無全名所願力培於逺業挺之云科舉外有理學幸毋自足於斯文相期者深是所以報代囘漕魁趙主簿投謝名芳鏤牒偉甚仇棲文壓鎮㕔居然禰薦喜報冰台魁㨗祥開天陛臚傳判簿學入幾深文多神變被飛龍新渥早列簪纓慕題雁榮觀克勤筆硯若昔名父嘗奪儒科景運又逢戍年世冑定登甲榜重書淡墨真同遼鶴歸來穏趁飛黄行見溟鵾直上某猥厪臨訪虚辱謙詞云云代鄒連州經從招㑹解組价藩還錦鄉社旌麾臨寵荷不遺先世之交尊爼獻勤僭欲叙通家之好輒以翊日迎於下風舉酒細論值桂華競放聨鑣枉顧瞻棣鄂相煇代囘黄堂長賀冬陽囘緹室有開吾道之亨春入書幃丕衍斯文之福聿來華翰如挹高標某人雄辨生風老柯㯳雪少年能賦剪裁天上之雲晚節耽書組織胷中之繡對灰飛於葭管㸔恩下於蒲輪某欣承慶言倍感高誼何當㑹面共浮竹葉之觴姑此寫心為寄梅花之驛代知縣再任招客久矣賦歸居然因任重上八節灘之險拊髀自憐空懷五斗米之羞脫身無計欲邀福於寅協期聽誨之丁寧爰卜明朝欲修小集非敢飾豆觴之宴蓋覬聞藥石之規又再鼔聽逾淡已無高山流水之音萬間顔俱歡又託凌雨震風之庇輒涓翊日祗屈飛霞非欲事於虛文蓋圖商乎實政技止此耳孰憐重涉於峻灘忠勿誨乎尚俾早離于沸鼎又水益深火益熱欲脫去而不能鑑之明衡之平於聽斷乎何取徒頼鳴珂之貴或憐沸鼎之難敢敬布其腹心願相為於羽翼輒涓明日祗屈飛霞又智窮力竭不堪面具再呈政拙心勞那得戲衫善脫所幸鄒魯之俗居多董賈之賢必有忠規禆此實政輒涓翊日祗屈飛霞代囘魁星醮請拈香問秋風消息已愧陳人挹杓宿光芒願陪勝彦肅拜裁雲之翰欣聞涓日之期當展敬於夜壇冀聨題於春榜步虛聲裏豫占來歲臚傳集英殿前共叱今朝魁讖賀娶婦慶襲鯉庭吉諧鳯卜孔雀屛芙蓉褥煇煌花夕門闌鸕鷀杓鸚鵡杯爛漫椿闈風月欣逢好事薄貢賀儀賀端午日生辰節臨重午日紀生申蒲艾浮香正值錦標之掲桑蓬襲喜式增寳牒之暉凡與照臨孰不欣快僭陳微禮仰祝修齡齊國之生孟嘗恪逢是日漢朝之誕胡𫝊願見同年摯魯山臧亷使繡衣行部親風采於大江以西素服拜庭望顔色於崇台之下積久願瞻英槩投老始契竒逢若有數存敢以文摯某官孟氏剛直之氣孔門宏毅之材豎骾脊梁擔當宇宙具法眼藏區别正衺四海魯山之名萬仞喬嶽之望自居亷察毎志澂清廣漢發摘如神小民氣吐葛豐刺舉不避大吏膽寒比福星重臨即隂氛頓豁雖猨驚鶴怨不遂閒散而狐號鱓舞稍知伏藏方且竭蹶暑行宣朝廷之欽恤振揚秋肅消田里之歎愁萬談百年幾見惟天地中間莫不順茲惟極治之朝然國家閒暇及是時猶有可陳之事若偏州下邑僻處尤疽根弊蠹多端儻明公問俗不遺則他日更僕以對沈痼非常劑能瘉賴遇神醫敗局有妙著可尋正㸔國手此書生好論事之癖恃君侯有容物之懷太平之期當今允宜建萬世之䇿真儒之用無敵㑹見垂千載之芳某塲屋陳蹤山林薄命所學甚苦徧參名軰大老之間於道無聞竟墮文人曲士之數目昏頭白心在力微有時自擊缺壺未忍遽甘墮甑備員鄉校授篆久閒遁迹里門著書自遣乃幸迎於華使真見識於偉人三生結來有披霧睹天之快一語提醒便吟風弄月而歸儻借春暉足夸晩遇養子啟江梅無實照孤景以自憐僊桂有香分一根而何幸敢通吉語願踐初盟恭惟簪纓世家實毓階庭壘秀咸稱麒麐抱送之瑞卓爾不凡竊慕螟蛉速肖之功冐焉有請儻異日遂親傳之望亦均受無别愛之憎三生因縁雖他人即如同姓一家慶幸謂此兒當興吾宗奉幣而請致書以告謝春谷學正惠夀詞年華逾六衰穨隠流水之邨韵語無雙妙麗協滿江之譜感宗盟意厚惜初度日非恭惟某官正學為師多情愛友書破萬巻毎自鑄偉詞文成一家獨埽空衆作游戲南旴軍峯之境歸來東觀石渠之班興念陳人强推生旦度尊前白雪溜亮宮商翦水上紅雲謂滿江紅也淋漓翰墨我辰安在君意故長某駭突如其來如欲福我兮夀我傳來樂府荷期銅狄之齡流入教坊可品玊簫之調薄言酬謝惠冀鑒融代囘夏友蘭某誤被國恩冐沾世賞山城分月媿弗稱於題輿藝苑揮雲辱逺貽於褒衮如見諫議之面足知君子之心某官機鑒不凡器能自許與人為善粟萬斛以救饑取友必端蘭九畹而自媚襟度湖海名聲朝廷謂宜騰翔霄漢之班横金取貴然且宴適園林之趣懷玉久淹獨崇篤交情特鋪張慶語紅光照室白璧入懷某謹藏襲篋中容奉呈膝下秩六百石顧關決之無長厦千萬間尚庇全之有望未殫感謝且冀照臨囘黄渠屋求復職居廣文舍杜門歎佳客之稀迎長者車銜袖增老夫之重麗詞唾玉高義斷金蕖屋徴君龍首華宗龜山正學筆鋒銛利粲雙劍神光腹笥豐盈藴九峯秀氣正厲㸔花之志俄興離黍之悲抱膝芹西斂元龍湖海之氣著書蕖畔樂淵明田園之居蓋甞窺編摩鈔纂之文固知為博洽專勤之士昔來游庠序期私淑佩䘳鋪張紙上之云云吐露胷中之鬱鬱然作闕實由舊政其責備何豫後人事已久而難追時不利兮奚怨况一飯先書籍皆前定而靡待求雖五斗不折腰儻有分則將亦獲少安毋躁其終必還某徒虛辱雄文曷㳟酬嘉惠率爾而對語焉不詳謂羊叔子鴆人孰云知我就謝仁祖索食當亦憐君安得無情尚圖見意水雲村稾巻十
