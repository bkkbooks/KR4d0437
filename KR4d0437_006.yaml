body:
  text: 水雲村稾巻六元劉壎撰贊銘前朝遺像贊元氣妙運有時醖停天地將泰聖神乃生五季糜潰天厭腥穢龍翔汴洛始識真帝馬營紅光陳橋黃袍不殺之誓昭徹葢髙踰三百年傳十六聖日角鳳姿采睂隆凖際天其仁何罪至斯遺民哀哀無窮之思陵闕久荒圖繪是貴稽首威顔如在其世自贊咸淳年中時公年三十餘眸不炯炯貌不堂堂勲業未建鬢毛巳蒼其卓乎有立以胸中粗識大道理其未能免俗以筆下間為小文章斯人也使展其霖雨之手固當忠君父而澤民物而著之水雲之村亦能詠風月而歌滄浪雖然此猶其小者也若其方寸之耿耿終不以死生而存亡又謂為似邪吾固無可謂不似邪亦無不可嬰忽而癃浮雲景過更後三數十年我亦不知其為我故人真贊吳浚也字允文名張都督之名字虞舎人之諱裁縫雲霧之文采照映日月之忠義語時艱則流涕沾襟憤仇敵則怒目裂眦空劵興師誓雪國恥運去祚移功不酬志君子以為有補於世敎小人議其無救於時事使東南鎮戍皆然則宗社亦何至此嗚呼斯人晚節巳矣其初心終足以媿天下之亂臣賊子谿隐圖贊青林蔽屋白雲滿谿髙隐者誰勿過橋西巴山龍贊鱗族之宗宜宅海宮胡為乎巴峰揚鬐奮爪霆奔雲從撼動坤軸作霖兆豐孰能貌其真昔惟所翁此畵與同人亦曰所翁之龍四禽贊田贛似慵非慵蹺足谿東勿歎無魚有時㑹逢二鴝鵒藏頭入羽莫作人語若學鸚䳇被人籠取三雪姑汝名雪姑誰為汝夫確守貞白休入畵圖四翡翠何怨於人以翎累身懐璧者誰見之傷神啞子觀音贊籃魚休賣瓔珞休帶若以色見誤人罪大且離相明心觀自在渡海羅漢贊平歩海水謾不㑹底我識得汝是箇影子又足踏海浪不沈不蕩逞大神通㺯小伎倆和尚和尚畵形聊可娛人成佛直須離相掃心圖贊有引少讀水心文集有掃心圖一詩莫諭其㫖後於一貴家見小軸繪一人青巾黃衣手提掃帚而有百十心字環繞其身繇是始悟水心公所題殆為此邪回首四五十年矣為追贊之雜念紛飛與糞壤等隨掃隨有弗浄弗瑩何以止之無思而定雲散天空放却帚柄觀我贊我既是我觀者是誰騎牛尋牛笑倒牧兒觀心贊心觀萬物又誰觀心牀上疉牀向何處尋朱光祿陰德圖贊有引記兒時行郭西門外有木合抱蔽翳江濆片版書朱光祿陰德樹六字數見之未省也長而聞諸老先生道光祿公捐金救人事粗知其槩又長而閲圖志觀陰德記始得其詳不知何年岸崩木拔每經行輒追思嗟惜不置非惜是樹惜樹之所以名而名不傳也天昌善慶乃令聞孫秀出紹緒貎而圖之展開眼明如見當日何其慰人意邪予因是圖以垂世戒揭以贊曰賦命自天天德好生體天活人福報川增為善在我我豈希報形動影隨自然天造謂吾廷汝視光祿公公活人命心與天通公心伊何為善弗貳忍貧傾貲救死於縊彼富或靳吾貧安行陰功孰知太虛神明森其階蘭執珪鳴玉種勤穫豐㝠報何速綵侍官游真行地僊上壽之褒大哉王言施及雲來錚錚楚楚貎入丹青宛其若睹善積慶長歳二百餘忍人薄夫愧此畵圖河西憲使壽容贊睂宇如神襟度如春澂清閩海慶㑹風雲豈非應上元甲子之㑹而輔皇極太平之君者乎一幅丹青千載麒麟真宰相器大福德人指書心經贊有引古厓饒生能用指頭蘸墨寫心經而不用筆求贊語經以心名葢由心出字以指書亦心所役心不好書指何所為汝識心否在運指時體認要真勿作字看波羅宻多此巳得半聾啞翁贊為旴江童耆卿作弗聽而巳遽曰聾弗語而巳遽曰啞神明内充寓言外假避世知幾隨波上下嗟夫使其挹後元貞觀之風囿慶厯元祐之化未必不傾耳以聆咸韶哆口而談王霸退然木雞是曰智者雖然猶未免夫有跡也併聾啞之名而空之始造夫浄倮倮而赤灑灑壽昌院鐘銘有引時公年五十六元貞元年夏四月南豐州夀昌院新鑄大鐘縣諸層樓將以節昬昕警迷聵也為之銘曰惟大覺尊矜哀羣䝉何以牖之爰有洪鐘考擊以時耳聞心通廼眷壽昌範此新鏞層搆鉅鈕法音隨風為彼聞者破其昬聾縁聲而覺萬境悉空衆生成佛繄鐘之功州獄鐘銘有引時公年六十八大德十有一年歳在丁未暮春之月南豐郡鑄洪鐘以嚴奉州獄士師之神所以昭神功答陰貺也為之銘曰赫赫士師萬世神靈作福於豐尤大彰明陰驅猾囚民寃底平何以報之有鐘在庭朝昬考擊聞者皆興丕顯神功永揚厥聲陳氏琴銘琴名吹萬靈音自然妙在無弦一巳多何萬言益齋銘有引古洪熊文卿取魯論三益之義以名其齋嘉禾劉壎參以大易益卦之象而為之銘將以廣文卿之志也夫直諒多聞益之自外者也遷善改過益之自内者也内外相養缺一不可文卿勉乎哉交闡互暢篤志力行其益無疆矣然予則媿之因斯銘也且以自警焉人有五倫友與其一以友輔仁允資爾益益有卦象維風及雷以諭進德勇決勿回齋以益名文卿雅志我廣其説宜該仁義爾求爾友直諒多聞匡救夾持日陶以薰爾遷爾善飈馳霆迅與天同功日新以進内外交養其益洋洋真積力久有大煇光顧我未能常覺日損賦此銘詩因警老鈍小朱硯銘有引時公年七十四宋寳祐癸丑歳予年甫十有四獲一小硯於同舎友譚伯玉硯鄱陶也修廣三指許葢以漬朱膠而備㸃校者復有一葢以掩塵亦陶也與予相從一周甲子矣晨窻夕鐙考經史作文章未嘗不吾俱也欣喜憂悲酬接宴息未嘗不吾俱也廼至遭罹革命避鋒鏑竄林藪亦未嘗不吾俱也其葢嘗墮地毁為二遄補完之今更毁為三不堪補又强補之書曰器非求舊固也其不忍與瓦礫擿者以其從吾久耳夫物無情人安得而無情一或無情焉充是心以往即竊位苟祿者一旦臨難而君可棄也父母困老病子弟倦奉飬而親可棄也親迎成禮偕老相期及其色衰而愛弛則妻可棄也嗟夫一硯微矣三綱寓焉人安可無耐久情乎既完之復銘之硯以受丹其細三指葢以掩塵傷哉屢毁毁使復全用終吾年久要忍㤀寄吾情焉旁觀謂予成敗勿顧子且朽矣情牽徒苦髙天厚地猶有壊時任運自然舟行岸移傅生墨銘有引昔旴江士大夫評墨競推傅雲心製作精實色黟而光瑩雲既歸岫墨難復得乃不知祕傳膠法巳付其宗人某矣頃予仕閩是子嚢所製求售好事競市謂勝雲心予時欲為作銘弗果也村居小暇輒予之銘誰琢元玉繄雲心翁翁去子來杵製彌工貢蓬萊宮定有賞識揮灑玉牋一㸃如漆水雲村稾巻六
