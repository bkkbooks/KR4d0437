body:
  text: 水雲村稾巻九元劉壎撰啟上通謝丞相上丞相印早從緑野之游隨使者車來問洪鈞之轉行矣肅章服而進期於曕繡衮之光齋心通名頓首納贄某官真古人傑為今名臣以魯論致太平夐邁管蕭之匹用周官立法度上嫓伊呂之間揆路三年盤石四履正歴階而趨宰輔欲平地而作神僊遂挂神武之衣冠甘樂清音之鐘鼓减聲伎省騶從未數唐人之清居鼎鼐無樓臺儼若冦公之儉於惟名徳簡在淵𠂻時咸思西蜀之英公復從東山而起寛夫百許嵗重來軍國之平章君實九分人寧忍園林之獨樂某沗聨宗籍浪竊世科閉户讀書亦既蹈寒餓之水火硏朱㸃易頗欲窺廣大之乾坤適飛輓之眷知以畫諾而辟置幸際洛社耆英之㑹輒修韓門弟子之恭念昔先人曾是相國之客訖至今日誰憐中散之孤歸誠三台徹福再世華竹秀而野將窺五畆之園風雨安如山終庇萬間之厦曕依匪逺歸倚彌深通楊提舉掩袂壚亭曾共聽於夜雨分符侯甸喜采映於福星遥瞻禮樂之光願託蕃宣之庇某官三湘竒氣四海高風志在春秋學問傳素王之正名若日月器能兼諸子之長以嚴明為蒞政之規模以莊肅為飭躬之本領翩雙鳬之入覲儼丹鳯之來儀粲粲道州之聲汪洋楚水皇皇周原之望洗濯瘴煙且將接大微之躔乃復屈澤國之節我聞在昔人亦有言謂關西之畏四知宜司食貨若龜山之救一半合在朝廷然時方急於諏詢故政姑煩于豈弟載嘉醒瞶有偉將明競傳歛散之適宜屬無患矣亦曰澂清之竦聽職有利哉惟中朝方啟於太平恐外服難掩於顯用激西江之斗水已聞盛積於腐紅朝北極之一星遄見入聨于荷紫某力微心在志廣才踈奏上林子虚之篇激昻已倦聽貞元供奉之曲感慨徒多身還黄葉之邨夢斷紫薇之省敢謂清朝之垂念俾分巨屏以承流既體統之相維豈禮文之敢缺贑石三百里所願息於歎愁廣厦千萬間終有祈於覆幬其所謂敬不在斯文通謝都大暉騰鑄冶兼提數路之權職忝題輿逺藉萬間之庇乆願締交而微介紹今欣備數而効走趨誰為先容殆有黙相某官鍾靈台嶽挺秀相門季方難弟元方難兄允謂一時之傑太傅在前少傅在後相承數葉之芳獨推左戚之賢最著右丞之政凝香而森畫㦸藹黄龍循吏之稱入省而襥青綾偉貞元朝士之望惟時議政重在豐財子母相權毎病阜通之無䇿君相共簡咸欣斡運之有人暫違立玉之班往課流泉之績文閣峻遷於寓直使軺廣統於提封方日鼔於洪罏遄山積於朽貫生財有道行彰坏冶之勲播物無垠式廣鈞陶之業某素無宦譜頗讀儒書一科不補于辛勤老將至矣半世殆成於流落命亦安之適了邑勞遂佐郡事翠浪玉虹之佳處似有宿縁紅蓮緑幕之舊游已成陳蹟雖自喜經從之熟若為俾觀聽之新尚獲私於帲幪庶其免於顛沛鐵九州而鑄錯苐懷躍冶之羞丹一㸃而成金願溥在鎔之惠通趙大帥開元帥府於昭鈇鉞之威隨使者車宻邇旌幢之䕃雖號分臺而涖事實均列屬以受容遥瞻邃嚴敬叙歸嚮某官機神明鑑文武威風蚤振江淮之名丹心若月生禀岷峨之氣定力如山指麾已失於蕭曺比擬自謙於樂管龍節英簜鎮真揚之提封燕寢清香壯金焦之形勢乃陞華於邃閣乃導㫖於機庭適長江風寒之區方嚴裏彍若要地雲屯之戌宜重中權資詩書禮樂以折衝覺營壘旌旗之改觀洗足入船上岸擊賊從容制敵之規釃酒臨江横槊賦詩燕適巡邊之樂鼔角讙亮波濤肅清𦍑人服趙將軍永絶羽書之警遼吏畏司馬相歡迎繡衮之歸某筮仕無竒承家不競椉下澤御段毎自安於平生呌閶闔呈琅玕覺難諧于當世頃幸邑灘之涉謾尋計幕之游顧皇華之在原何資畫諾適紅牙之開閫喜近照臨諒不忍於壑鄰尚或私於鈞播詣大府而受約束溯風悵隔於一江裹章服而謁上官何日獲瞻於六纛苐嚴修飭遥聽指呼通徐提刑褰帷入境聳瞻直指之威贊幕充員謬主將輸之畫實幸相維于體統敢云各異于司存矧再世以辱知輒三熏而修敬某官瑰偉宿望卓犖通材抱送麒麟生全光岳之正氣巍登龍虎早垂宇宙之大名踐敭華資培植雅器凝清香森畫㦸藹然循吏之稱開黄道拜紫宸藉甚望郎之譽宻勿漢廷之侍侵尋雍橐之聨適當錢楮之相權阜通是尚深軫官民之交病緩急失中肆命儒英丕宣帝㫖殘以寛慢以猛恃平允恊于權宜下適重上適輕執法畢伸於寃枉不待效薶輪之舉自足彰持斧之尊小試澂清遄歸獻納日麗崆峒風酣章貢姑暫駐於翠軺雪殘鳷鵲雲近蓬萊已催朝於紫禁某故家薄宦平世凡材昔我先君雅締陳雷之好惟予伯父復陪温石之游不圖氷幕之贅僚又𨽻霜臺而受察豈造物曲憐其流落亦機縁適契於㑹逢恪共走趨惠祈涵育孔融叙膺門之好願私敬故之恩重耳徼楚國之波尚溥及鄰之潤誓鞭鈍質祗服明條通史提舉六轡觀風共仰學齋之望一官贊畫濫陪計幕之招雖各異於司存亦均聨於體統某官五史名家四蜀竒氣益州自蠶叢而後于今幾年臨卭從鶴山以來惟公再見堂堂人物表表聲猷聨太微之積星出澤國之簜節春攽秋歛奏報不待於申寅左鬻右饘喧呼了無於庚癸於此見真儒之政夫豈若俗吏之為遹觀長材因感時事天地中間莫不順紛南北以來同國家閒暇及是時宜中外之有託以仁義之澤塤箎羣有以道徳之威泰華四維豈繄重名不列要任宋三百載方重啟于太平蜀第一流盍遂登於顯用某生聨屬籍壯忝世科閉户讀書坐閱十年之光景硏朱㸃易欲窺三聖之精微詎期星使之禮羅亟上天朝之奏剡使易彼以就此將舍舊而圖新遂令海霞島霰之縁轉作山雨浦雲之興有嚴告至願在受容楚材而晉用之盍歸坱圠秦弟則吾不愛也諒蔑町畦行赴臺參先修函摯通趙府判昔拜龍門曾近尚書之台斗今隨牡轡或依别駕之屛星一見如平生之歡相與篤再世之契論心幸甚舞手躍然某官珪璋名流詩書道味凛清白操不染紈絝之塵為文章家自是衣冠之秀共惟先正夙號儒宗徳望名聲獨冠端平之諸老言論風㫖卓為元祐之全人由學妙於極先故名高於世表人仰善政知王氏之必興天昌忠良果臧孫之有後是先世徳丕闡先猷維今朝野之升平將為禮樂之制作有如公等宜在帝傍孤鶩落霞之邊暫分風月金雀觚稜而上行曵星辰將宏試於經綸用丕昭於風烈某十年濩落一第沈淪林下讀書覺難甘於小隠牀頭有易差未至於全貧詎期星使之禮羅忽上天朝之剡辟俾司畫諾適近照臨惟吾翁而翁曾共論於莫逆今兄子猶子諒未忍於棄捐尚借餘波庶全末路我雖異事覬聞藥石之規豈無他人願廣本枝之庇通黄提刑繡衣出使新風采於大江以西油幕從軍望顔色于崇臺之下幸末路遭逢之巧在洪鈞陶鑄之中銜䄂不文摳衣而進某官大名掲乎日月直節凛于氷霜為天地立心實本經綸之有學使鬼神破膽咸知操履之無瑕偉哉三館之英儲信是四明之瑞禀抽書金匱抗疏玉階陳孟氏仁義之言不負所學嚴昌黎佛老之辨欲正人心引裾力冀於囘天拂袖勇移於分月遄被十行之寵來行千里之春富文忠大活飢民恩深青社狄梁公盡除淫祀聲動河南使華兼領於千倉帝意灼知其五善乃若春朝之元㑹畢然天筆之恩言謂吾民以食養生固資斂散惟本朝以仁立國尤重平反申命諏詢丕昭欽恤於粲崆峒之日不移益部之星然而時變罙艱事功何限峴山雲黯京觀未築於鯨鯢蜀道天高介冑乆生於蟣蝨欲折此虜湏用真儒甘泉論思㑹趣登於顯用天章條奏願重致於太平某晚出單人早親諸老半生迂拙欲潛窺往聖之精微末第沈㝠已消盡少年之意氣錦正慙於學製琴乃使之改調比及三年齊𤓰之告熟乆矣今既數月庾梅之獻笑隨之辟代巳上於奏函禀命實承於閫檄惠徼夏庇謹侯臺參一道之瞻福星出處幸均於臨照百榖之仰膏雨始終端藉於生成儻畧等威尚私鍳哉通徐資相碧幢列屬誰為東道之主人緑野棲賢賴有南州之高士昔歿身於化冶今頓首於師門不虛此行敢恭所事大資相公四海典型之老兩朝文獻之儒偉節清風叔向古稱於遺直全名盛福季昉見謂之善人固宜顓銀臺批敕之權當玉堂揮翰之選豈特鴻文鉅筆一時鼔舞於風雷毎聞梗論危言千載煇光於日月抗疏破限田之議騰章折閹豎之奸天為動容人皆吐舌至今談者咸仰鳯凰之朝鳴想在當時能息鱔鰌之晝舞薦紳楷寫汗簡流傳雖申公老成舉世方推其華皓而疏傳止足浮言莫得而磷緇亟挂衣冠甘安杖履然而不有君子何以慰望治之心所謂伊人詎容袖調元之手帝方注想公盍遄歸矧思青宮羽翼之勞宜正黄閣股肱之任獨樂園荂竹之趣固適雅懷天章閣筆札之陳乃關世運亟其來只毋或浩然通鎮江守趙總領帝命王人就臨重鎮官稱内史遥附屬城執摯有嚴修辭以進某官兩朝開濟之業一家忠義之傳文武威風西平有子機神明鍳南嶽鍾靈若稽元勲疇似先正總八州而作都督屢立奇功率三軍以定中原期攄宿忿載旂常而孔偉辭衮繡而弗居有鼎彛未了之功留塤箎後來之秀器能是佀善慶彌長古風蕭蕭乆無此魁壘鴻碩之望世徳繼繼乃萃為倜儻竒偉之豪四海仰氷壺之名一時如泰山之重其仕郡國則稱循吏其立班行則謂端人羣公仗治辦之能當宁倚榦方之畧六師餽餉賴周使臣千里蕃宣為漢刺史眷南徐之巨鎮號東土之雄藩自本朝建總臺實受江淮之財賦以名家兼郡紱宻䕶京師之本根相望廣陵城一水之間尚想信國公千古之烈宜恢偉績增煥先猷豈惟表裏于山河終藉經綸于社稷通繆吉州大藩易鎮仰韋寢之凝清底幕服勞依儉池而泛緑以宦路驅馳之始在化鈞陶鑄之中遭逢甚竒歸倚惟謹某官接永嘉諸老之𣲖在咸淳君子之流真實身心寒露清氷之凌厲光明正事秋霜烈日之肅嚴聲華甚都步武孔碩曉趨閶闔方陪荂禁之朝日逺長安遽請竹符而去試觀汝川邇日之政允為江右列郡之魁治狀既上於清朝恩㫖俾遷於巨屛雲間幡蓋移來白鷺之洲雨外䵓蓑欣聽黄龍之詔方開藩之伊始屬艱糴之隠憂富者擁紅腐而坐觀貧者擷烏麻而假息解劍指廪矧春夏之方交炊沙作糜恐朝昏之不保賴有仁牧蘇此疲氓聞道途之傳誦謂規畫之精宻文潞公置糴場一十八所惠及成都富丞相活饑民九十萬餘功高青社仰明公救菑之政得前賢濟物之心共惟聖明遹求俊又謂結軰治郡國固可蘇舂陵之氓謂長孺在朝廷始足奪淮南之氣趣登禁近共贊昇平某鐙火半窻齏鹽六館仕未能信乃俾著從事之衫誰適為容竊幸入大夫之幕念平生恥同於俗子茲一旦獲事於吏師誓氷檗以求知望風霜之見赦推官理事不倦嘗景慕於昔賢太守決郡如神尚庇存於下吏通趙制置大閫宣威屈金狨坐偏州假守依玉麟符念先世嘗事於名門喜今日復歸於化冶歸心台斗頓首轅和某官文武威風機神明鑒有大力量實鍾南嶽之靈號真英豪允謂西平之子功名赫奕忠孝光明自端平和戰以來至開慶艱危之際寛先皇之宵旰多名父之勲勞軍入洛陽雪列聖在天之憤威行沙漠折諸戎猾夏之心屬峴首未靖於風塵而江面頗嚴於㷭􅥂金陵江南佳麗關上顧憂使君天下英雄賴公臨鎮感激受詔慷慨建牙總數路之賦輿授諸將之節制延州有小范西賊膽破於歌謡江上用魏公烏珠色動於荂押號令嚴肅氣色精明方將輸治法而出征謀亦且儆國人而討軍實深溝高壘繩聨而珠貫壯士大馬雲集而蝟興丕建駿功於昭先烈百年父老爭誇小忠獻之威風三世祖孫行繼大申公之相業通淮東制使李端相宣威舊鎮丕昭斧鉞之光分牧屬城遥借旌幢之䕃昔甞忝走趨之列今仍依節制之尊敢以一箋徹於六纛某官天人風采王佐規模出隻手以扶乾坤成功不有噓寸膚而起海岱潤物無聲身繫國家之重輕名動關河之逺邇任兼將相而愛善類若圭璧身居邊境而惜民力如體膚兩晉以來惟羊祜在仁人之目三代而下獨孔明用王者之師頃從渚宮暫謁洛社屬㷭􅥂徹乎江上而氊裘徧於淮南上興拊髀之思公重致身之義朔方將士想子儀之重來西夏𦍑胡懼希文之忽至感激受詔慷慨渡江大幕府之宏開平山堂之增重嘗聞昔日廣陵坐鎮者十年其在當時淮上不驚於一矢今復借福力之鎮壓果又見邊塵之肅清方將輪治法出征謀開誠心布公道無日不討軍實而申儆迨天之未隂雨而綢繆相視時機恢復疆宇通呂保相崇臺督餉兼隆鈇鉞之權凋壘承流媿負摩符之寄疇昔仰威名之重乃今竊庇覆之私遥望旌幢肅陳竿牘某官名滿九牧氣蓋三軍傳六韜書能笞箠於𦍑虜佩四將印欲纓繫於單于自結髪以從軍毎枕戈而待敵百戰百勝志洗天河之甲兵七縱七擒聲震江淮之草木登壇受節杖鉞督師首巴蜀膂荆襄所至捐軀而自效腦夷吾髓沙漠誓不與敵以俱生頃者平瀘之功與夫援鄂之勇書之史䇿紀於太常將入贊於機廷尚出臨於統府豈風寒數處正欠蔽遮而天險一江實資守禦非藉老熊當道之勢孰折佛貍飛渡之謀肆勞元勲誕膺重寄竝授諸將之節制兼總數道之賦輿屹萬里之長城增九鼎於吾國自西陵至白帝咸無羽檄之驚若蜀道上青天亦遂農桑之慶行鷹揚於銳旅即虎視於中原人思子儀若父兄直取神州赤縣之舊天生李晟為社稷峻陟斗樞黄道之間某簪橐故家衣冠末緒摩盾草檄屢隨出塞之行說劍論兵漫愛從軍之樂兹忝分於陋郡幸遂𨽻於和門雖方嚴邊鄙之防諒亦念民社之責給餽餉而不絶尚少寛程督之威安田里而無愁當勉竭拊摩之力通交代鄒通判展驥足為别駕將催荂底之朝遺鯉魚有素書來促𤓰時之代結好允期於奕世納交本自於通家爰致報函肅迎都騎某官寛裕有君子之徳通練擅能吏之名慶元掄魁故家宛其文獻武陽山水勝處鍾此材猷通籍明光之庭奏最河陽之縣集玉京騎麐鳯宜著祖鞭汎僊槎問斗牛乃題陳坐春臺四境沂海一歌比者以長史之賢居然行大守之事興弊補廢適成凋瘵之餘醒聵膏萎頓復升平之觀行且被絲綸而朝矣何遽拂衣䄂而去之厥今日月清明六龍在御風雲際㑹羣鳯來儀雖雅懷固在於愛山恐優詔未容於專壑神明佐郡深諒父老之思剛正立朝行慶公侯之復通許船場刳木為舟有偉重臨之績載書入幕謬陪畫諾之游誼重同寅禮恭先甲某官志在利涉才若順流扣舷高歌不逐浮波而上下轉拕有力欲平大勢之重輕興念故家旌陽之僊來訪古洪督府之勝時惟海宇未靖濤瀾野渡而横孤月孰為樘柱江河而亡維楫寧勿淪胥行疇治艦之庸丕顯濟川之業所願聽渡江之擊相與觀越河之焚連檣五千雙已辦舳艫之銜尾破賊八十萬要令帆艣之飛烟某身世轉篷利名輕葉牽輓不上如摚果老之鐵船積壓空多不過米家之書巻素昧藏壑之志率常載月而歸誰畀招旌俾參輓畫獨我從事正望中流之得壺及爾同僚毋若共舟之敵國行將繫䌫即遂摳衣通謝廣西帥胡都承桂府价藩方重宸旒之南顧棠隂舊部徑煩牙纛之西行新受隆知冐申私賀某官辟歴手段光霽胷襟特立獨行鬼神亦為之破膽大公至正天地實賴以立心四海仰石壁之名一時如泰山之重孔明制夷人之變允謂知兵無忌輔晉室之興咸云似舅蓋衡嶽獨鍾於正氣宜長沙多出乎偉人觀所至之設施見平生之聚辨比下青㝠之鉞來臨黄木之灣𨽻節度二十二州仰鄭尚書之威徳焚淫祠千七百所偉狄梁公之英明海浪頓清瘴雲不翳適五筦謀詩書之帥衆切去思惟九重知文武之才就資移鎮自東徂西而靡憚由近及逺而翕孚將士歡迎喜我公之未老兒童歌舞誇吾父之重來仁義前驅威聲丕聳元戎啟行十乘小煩鎮於帶篸宰相禮絶百僚行見催於繡衮某苦無竒骨空有壯心說劍論兵漫愛從軍之樂摩盾草檄屢隨出塞之行甞力戰以全蜀城亦偏師而當敵騎幸逃萬死已老半生薦假寵以試州俄纒悲於陟屺三年枕凷身待盡於邱園一旦援琴恩許依於香火忽有來於吉語辱下采於孤蹤念方辭西閫之招似難赴南轅之役冐致箋題以謝遥瞻旌節有嚴顧關公辭曹雖莫效驅馳之事然蕭何薦信終不忘特達之恩敬在下風以竢他日賀包尚書除學士知平江府兼淮浙發運使從雍輟班臨吳疊組曵尚書履方資顧問於清朝佩太守符乃總轉輪於諸道帝屈儒臣之重民欣舊牧之來輔藩增雄國計頓裕某官學臻聖處名滿世間中庸九經為國家本原甚正論語一半治天下績用彌彰講明禹稷之事為鄙夷管晏之功利獨殿諸老以覺斯民持藻鑑上星辰茂著立朝之績濟巨川作霖雨思宏澤物之功適時有餽糧之憂以公當督餫之寄搴華媯閣宅牧蘇臺蓋將用周典以阜民詎止如漢人之給餉矧是重來之城郭允宜潤及乎京師田野頌包家式表功名之留逺中國相司馬遹觀道徳之成强某辱出師門欣傳帝詔顧東南之民力竭矣孰與賜一分之寛今天下之大老歸之願毋急十年之蓄敢因私賀輒述公言賀包尚書除端明樞宻峻陞紫殿宻運洪樞來大老於海濱丕聳華夷之望用真儒於天下誕和朝野之瞻兵本尊强廟謨宏逺某官擔當宇宙力量掀掲日月聲名有孝肅公剛方得大臣體由象山翁傳授為學者師兩朝咸仰其儀型八坐獨高于獻納淮南憚汲長孺頓寢姦謀江右有王茂洪何憂世事蓋踐履素根於誠實宜觀聽易見於感孚方聖明臨御之初聿新治化念耆舊凋零之後尚有老成播告大廷超陞樞府人望翕服皆酌酒而賀范韓天聲奮張可制挺而撻秦楚然而國脈未壯時弊日滋進取良難固無復神州陸沈之責太平自叱或者咎江沱宴安之非况救楮之䇿已窮而通財之務尤急仰惟魁壘之夀俊必有經濟之逺圖成長治建乆安初不出四書之外荷美名都顯號㑹當躋三代之隆某辱在門墻欣傳綸綍洪鈞轉一氣所願入於化鑪黄麻似六經尚竦聽於宣布賀鄧侍郎除待制宮觀賜金帶辭榮荷橐均秩蕊宮花底退朝寵畀環金之飾松階候對寑聨鳴玉之班偉聖主之優賢許從臣之請老某官禀天地中和之氣襲聖賢誠明之傳若范忠宣一生祗用二字如司馬相三代而後一人循良播重湖以南清節照普天之下頃興思於宣室遄趣對於延英從容九陛之前宻勿四幾之奏華光勸講嘗啟沃於帝聰吏部典銓妙裁量於人品論思未究決去何輕甘辭天上之班聨歸作山中之法從詔札宻封於泥紫服章光映乎腰黄緑野午橋月伴尋僊之棹青山流水春迷宴夀之堂方將苦節以養高且復觀頥而自樂園林窮勝事入京洛九老之圖丹青臆老臣踵申潞二公之拜某莫迎歸騎敬走賀郵不善惟恐端明知正祈覆錦言仁相從先生後願在執鞭賀曾侍郎三除隆興兼轉運使三錫綸函重臨繡部甘泉上雍世瞻筆橐之尊南浦西山習見節摩之熟藩條誕布使指有光某官魁從嫡傳公台偉器蚤仕承平之世諳練典章薦更煩劇之司兼該流畧執筆宻禆于公衮荷囊遂復於家氊有偉踐敭無厪贊述思昔先正拂衣不附於權門至今清名垂旒猶簡於世冑適寇盜馮陵於江右歎士民疲敝於兵間疇咨伊漕之良往綏凋瘵歴數在朝之列孰可鎮臨肆起耆英俾安黎庶䆳殿峻陞於論譔价藩就督於轉輸雖園林勝事鐘鼔清時方適午橋之樂然宮殿微風旌旗暖日已嚴丣詔之頒煩駰度於周原喜馬諳於舊路昔閱道重來於蜀郡人羡棠隂又魏公三判於相臺衆誇枌社如公此出視古畧同所希布寛大之書亦冀攬澄清之轡激西江活涸鮒共仰台府之尊嚴集北斗騎麒麐即侍禁廷之宻勿某短檠鐙火太學齏鹽羣試别頭深懼有司之見棄偶逢具眼乃超諸子以先登莫鑽刺於旁蹊尚陸沈於債邑風波之所激射湯火之所煎熬殆哉岌乎慨其歎矣兹幸二天之可恃庶期百里之小安誓竭庸材恪遵明訓賀曾運副除寳章閣待制陞轉運使峻陞次對仍總轉輸立西清法從之班光華維舊鎮南昌都督之府號令重新益彰臺治之尊式表使名之正某官傳家文獻經世材猷數端平諸老之餘誰其存者負貞元朝士之望公獨巋然敭歴孔多設施有偉都司學宰相宻禆贊於鈞樞吏部掌銓衡蚤翶翔於禁橐燕適園林之勝優游香火之縁俄九重之興思侈三錫而出命鹿轓夙駕指朱簾畫棟之間牡轡載馳自太清紫霄而下福星所照和氣如春適兹滿嵗之期特畀進班之命寳儲上映於奎壁超陟松階龍光仍射於斗牛倍添棠景苐恐聨飛於綈緑又將催侍於赭黄聽文徳之麻亟正一相處中之任續宣靖之譜遹駿兩朝定䇿之勲某喜聽褒綸莫趨賀廡地方千里江山又借于照臨我獨二天風雨端祈于覆庇賀張侍郎宮觀恩榮銀信班峻琳宮人亦有言何損仲尼日月公歸無所盍依漢祖風雲曕緑底之飛來表清𠂻之簡記某官人品第一學問函三有王佐材在廷無出其右真宰相器非道不陳于前方曉夢之聽朝雞忽浮雲之變蒼狗文潞本無嫌于質肅顧于我以何加元稹實自憎於晉公姑待天之少定暫巻班于碧落且尋勝於清時遄興宣室之思誕畀真庭之禄行趨劍履入覲柧棱君王問長卿衮歸不逺中國相司馬環召繼來某欲趁庭趨恨拘官守芙蓉隔楊桞之路問訊無從江梅託桃李之場生成有望心思所及手筆莫殫賀吳提刑起家拜詔出節詳刑禮樂遣皇華風采自生于牡轡兵衛森畫㦸先聲已振于虎城既就第以建臺即啟途而行部某官匡廬間氣洙泗正傳數我朝自韓呂以來故多名族獨諸吳如王謝之盛世有偉人積正心誠意之工夫裕尊主庇民之功業政事造化學問發皇何未聞廊廟之登竟復擁節麾而出維上所屬望公甚深謂一夫不獲予之辜惟良折獄若終身可行曰其恕有徳惟刑是資丹筆之春以廣紫雲之訓倂鎮臨於統境兼節制於連營天落絲綸晝行錦繡褰帷以廣視聽想父老之聚觀登車而志澂清聞吏民之聳動豈惟萬物之吐氣遂令千里之宅生山為翠浪水作玉虹式布宣于寛大花入紫微柳連青𤨏行趣召於禁嚴遂以中庸大學之書入贊慶厯元祐之治某銀津冷𣲖鐵硯寒生十年讀書不可謂無心於學一行作吏竟莫能換骨而仙徒慨慕乎古人頗見憐于諸老為饑所迫試令此來湯火既極于煎熬瘡痍又難于摩拊幸逢繡斧之直指法當弩矢以前驅往拜崇台有隨桞傍花之樂願傳心印便吟風弄月而歸仰止高山有如白水賀印安撫除樞宻都承㫖江西帥顯奉明綸宏開大閫天樞維斗班通霄漢之間軍聲如雷歡動江淮之表帥垣既建敵膽自寒某官儒而知兵仁必有勇二難兄弟真為萬里長城一時公卿不恃千羣武騎慷慨赴功名之㑹笑談清邊鄙之塵遹觀厥成卓有所立方敵兵之飛渡致鄂渚之重圍環而攻之直有鞾鑯趯倒之意確不抜也誰收隻輪弗反之功惟内有賢牧以固軍民之情惟外有膚使以趣水陸之陳翕貔貅之賈勇息鴻雁之哀鳴韓愈傳宣遂解深州之難李囘督戰立成三鎮之勲由今而觀視古何媿上蓬萊殿宜侍翠華黄屋之傍駐琵琶亭猶坐碧油紅斾之下遥導機廷之㫖誕增帥府之光豈但為第二層之規模要當立上一著之根本必如陶侍中之機鍳必如羊荆州之綏懷必收人心必壯形勢總十國而為連帥方重事權率三軍以定中原式觀逺畧某嘗䝉軫念欣𨽻走趨吾皇皇將何之自甘流滯視耿耿者尚在未忍沈㝠觀鈇鉞之遥臨屬櫜鞬而請事殺賊奴取金印顧雖非天下之竒磨盾鼻草檄書政可說軍中之樂苐陳忱悃敢畧佞諛賀李都大輟班立玉持節鑄金贊㑹計於版曹增暉郎宿主阜通于圜府又煥使星昔辱出于師門今沗陪于辯幕摳衣前賀銜袖具陳某官兩朝文獻之英四海典型之老斗牛寳氣所禀得造化之清鳯凰羽儀其出為國家之瑞顧前軰凋零之甚矣獨後林突兀以障之固嘗禆贊鈞衡綜覈國政亦且參陪幕府諳練戎機厯麾節者幾遷佚園林兮累嵗天固留之為耆夀俊國亦幸哉有魁傑儒比馳原隰之六絲往訪瀟湘之八景動搖山嶽衆方仰于丹軺慶㑹風雲思趣還于粉署雖申昔命實表殊恩觀日鼓于洪鑪遄山積于朽貫於惟宿望素穆具瞻誦周訪落之詩屬更圖于新政聽唐供奉之典矧寖少于舊臣上方疇咨史有故實炭隂陽銅萬物式彰坏冶之勲霖旱嵗舟巨川行廣鈞陶之業某夙嘗嚴事羞更重陳交大雅大忠辱深諒平生之素念小慙小好尚未明力學之方甘安鉛槧以校書乃綴銅曹而贊畫當某戒書冊祗戌之日適公持英簜出使之時若有天焉孰為地者故園桃李自欣春色之重來晩節栢松誓共嵗寒而不改苐嚴修飭祗服馳驅賀李提舉皇華司庾紫氣隨車一道瞻為福之星光為東壁六月遇可書之雨潤溥西江念昔沗于侍朝幸今依於屬部具嚴削牘往候建臺某官六館儒宗九霄奎宿廬山高幾千仞挺生人物之英太白後三百年逺紹文章之𣲖不入洛蜀諸賢之黨宛有乾淳大老之風共為名流夙載華問清藜照夜已鄰碧落星辰皁蓋行春乃賦蒼州烟雨試數近日循良之牧孰知當世慈惠之師治狀既徹宸旒恩㫖遂遷簜節馳一椉傳風行江右山川求千斯倉歡動田間父老時和已協入境之始年登可卜攬轡之餘歛散適宜澂清有偉然時事正難於經濟而清朝方倚于弼諧為提舉而活饑民固願繼紫陽之政績位宰相而識大體盍亟恢文靖之家聲丕闡儒猷式扶世運某耕閒有味起廢無心為南豐香而一來森兵何樂負東籬菊而再出食檗粗甘歡傳駕牡之新臆共聽雞之舊服在趨走惠徹庇存消田里歎愁當勉效民庸之課聞山嶽揺動終尚希使指之寛又肅擁皇華來詢紅腐東壁之星主圖籍曾是望郎西江之水活斗升新迎膚使曩幸接同朝之步武今恪恭屬部之等威褰帷所臨騎屋爭覩某官璧水儒英之傑出廬山僊侶之重來先朝重李昉曰善人典型是佀前軰稱文靖為名相學術可傳仰平生抱負之不凡信所學宏深而有用謂時賢多持論者徒言窺姚姒逮莊騷若吾儒不知政焉何必引䕫龍陳堯舜是以甫班學館則去而佐岳纔登祕邱則出以典藩流畧兼該體用具備帝深嘉於郡最詔特畀乎使華蓋江右當千里旱之餘地力瘁矣使田間無三年蓄之恃民命伊何上厪顧憂妙選諏度惟明指固莫先於斂散而先聲則尤繫於激揚晦翁為浙右之行式觀偉績張相自京西而召丕對殊褒遂挾豐年歸報明主某違離輦轂困躓林邱滫瀡凄涼永矣斷人生之樂土草饕齧居然忘塵世之思清朝未忍於棄捐便郡仍叨於關決絶歎贅員之落莫忽欣行部之照臨記嘗陪漢闕之衣冠幸今事周原之絲轡非敢恃舊知而攀附正深虞新令之森嚴拄笏㸔山其敢效晉人之放飲酒按事終尚希冀部之寛賀安撫盧尚書起鎮价藩宏開大閫班高八座本北斗喉舌之司權重十連臨南昌襟帶之地忝佐偏城而受察敢于記府以通名某官其學為諸儒之宗所立在勝流之目嚴霜烈日中涵天地之和威鳯祥麐出作東南之瑞標凖一世羽儀兩朝凡聞梅坡之名真若泰山之重識其小者僅夸餘事之文章見而知之當攷平生之節概揮豪𤨏闥曵履禁班可繼袁高李藩之風能典伯夷后䕫之事謂且踐台斗而上矣胡遽巻霖雨而去之然嘉謀嘉猷上方思于啟沃而至清至直衆咸息其退閒誕攽絲綸俾立牙纛接衡廬分翼軫歡迎仁牧之來說禮樂敦詩書丕聳元戎之令惟是時事之艱棘正賴儒術之經綸歐陽修何處得來式觀謀斷慕容恪為憂方大有賴折衝聽笳鼓之歸來步璣衡而直上某苦無竒節薄有虛名綴慈恩塔上之題怳疑隔山厠貞元朝士之列已是中年明時未忍于棄捐便郡仍叨於關決堪嗟淹滯喜際照臨輒自布其腹心敢僭希于羽翼共月千里誰憐吏隠之寂寥得厦萬間終託帥垣之寛大賀鍾運使觀風駕牡練日滌龜自江以西咸仰澂清之畧從天而下有隆飛輓之權昔嘗沗于走趨今復私於臨照是嚴削牘以賀建臺某官有憤世疾衺之心有學道愛人之政節操氷檗直欲障流俗之瀾號令風霜端足落奸諛之膽頃辭𦂳路來守偏城聽斷精明吏饕摧折拊摩切至民氣發舒其敏足以剸劇而撥煩其亷足以律貪而起懦條教肅而大姓不得以朘貧弱繩束急而羣譁不得以賊善良以至弛鹽禁以便民出帑藏以惠士凡此異政俱可大書帝嘉渤海頴川之庸峻遷簜節公辭淮右湘南之役甘遁里門茲移奎壁之躔來𨽻斗牛之野雖無心于浪出奈有㫖以趣行必將酌緩急以通轉輸權有無而通糴餉聳動一道激昻羣心畫棟鳴鑾方歡迎於膚使紅雲立鵠㑹入簉於侍臣某涉世似癡信書成誤壯年意氣欲驅馳天地之間中嵗功名覺沈墮塵埃之境賀費總領除將作監峻陞繕監巍建總台斡江淮之賦淵連營給足寛東南之民力數道歡呼辱𨽻照臨僭陳慶幸某官天西瑞氣斗北大名老泉論事而比賈生精通世務師魯知兵而從魏國諳練戎機所立煥乎前規其學根於絜矩固嘗更迭麾節談笑鐙棊山岳動揺應東國福星之見川雲飛泳喜西山爽氣之囘朝武寖穹使華有燿適鏠鏑之未靖覺調食之孔艱萬竈雲屯炊沙之飽難恃千金日費破釜之䇿何時軍聲欲解於王事少煩於苞栩爰領外農之寄仍遷大匠之班王人所臨邊兵咸喜劉晏畫笏算鞭之智亦可行乎陳恕題版押字之規正優為耳但使木牛之相踵㑹㸔鐵騎之和飛隨笳鼓以歸來步樞衡而穏上某夙懷奮厲竊嘆棲遲有味扶䵓頗自適寛閒之野無心懷綬乃强臨凋陋之邦茲幸事於通儒諒俛矜于拙守湟中之粟萬斛願寛程督之威杜陵之厦千間終賴覆全之賜賀孫提刑衣繡祥刑褰帷問俗青綾夜直方催北闕之朝丹筆春流丕暢西江之福風霜高潔原隰光華某官端厚而高明疏通而詳練出塵標韵旁薄於玉京十二樓之間滿腹精神流動于鑑湖三百頃之上才望夙推於俊偉文章是特其緒餘踐敭華資培植逺器貳郡歌騰於沂海立朝班峻於太微自請漢符肻臨蕃國清香衛㦸御屏侈循良之書紫界宮牆優詔趣望郎之入乃就攽於使節俾巍建於刑台蓋惟江右憔悴之氓居多茹枉湏賴天下端直之彦庶可洗寃六轡所臨十城丕聳必將奉宣帝㫖慰懌民情振風采以戢奸貪嚴教條以束豪猾威稜既肅刑政自平毋使一夫之向隅當令萬物之吐氣風酣章貢姑少駐於翠軺雲近蓬萊遄催登於紫禁某奮身寒苦與俗酸鹹臆當年鵷鷺之行怳疑隔世負終身烏鳥之養空抱餘悲清朝未忍於棄捐便郡仍叨於佐貳堪嗟淹滯喜際照臨輒自布其腹心敢僭希於羽翼深慙不競負濓溪夫子之家聲所願前趨師泰山先生之正學賀建昌魏守轉官因任恩來褒璽名在御屛河南治平之聲冠於列郡膠東勞來之賞賁自九霄既遷文品之崇式表藩條之煥某官儒雅飾吏平易近民生貴游家無塵柄唾壺之習凛清白操有囊螢雪案之功倦熏畫省之香來領紅泉之勝埽空吏蠹勸課農桑二千石惟良寖以詩書之澤十萬户受福靄然田里之春乃增秩以示恩仍凝香而因任關中既留蕭相喜遂所依朝廷深知弱翁行聞有召即繇選表入陟論思某欣聽除綸阻趨賀廡天子明見萬里共贊先皇之知人刺史入為三公願繼漢朝之盛事賀魏建昌改知袁州疏恩曉殿移鎮春䑓碧澗銅陵正藹絝襦之詠紫泥金印又催旌斾之行地望冞崇事權增重某官謙以自牧和而不流笏比甘棠克增光於祖烈國非喬木蓋有謂於世臣由省府之握蘭來盱城而分竹民依愛日吏立薄冰方兹蹈徳而詠仁何期以大而易小雖仍飲西江之水覺難親北斗之光羣兒迎細侯尚想無邊之風月二州爭杜老莫留有脚之陽春苐弱翁深得於見知恐寇恂未容於乆借不煩席煖又拜詔温森㦸凝香更布宣於寛大簪筆持橐遄峻陟於禁嚴某莫造賓閎敬修賀幅鵾鵬運海悵難逐於扶揺犬馬戀軒終尚祈於顧盻賀錢建昌除直祕閣課績名城通班邃閣圖書寓直於東壁朝武寖高旌麾留鎮於南旴藩維增重詔鴉翻濕寢燕凝香某官寛以有容威而不猛發奸若趙廣漢吏莫能欺擊强如諸葛豐民有所恃桑麻千里襦袴萬家微而殘疾疲癃舉無歎息愁恨民曰太守器能真當世之少雙帝有恩言政事為所部之第一峻遷中袐式表外庸金闕碧門遥接蓬萊之雲氣楓林楚水遄聞長樂之鐘聲某欣聴褒綸阻趨賀廡宣室已思賈誼雖喜見於席前河内願借冦恂幸姑遲于璽召賀方寺丞除知建昌覲天子所佩太守符衣冠拜紫宸親奉九重之問兵衛森畫㦸試行千里之春竊自賀於照臨實不勝其幸㑹歡迎五馬逺致雙魚某官文獻相承風流是侶引䕫龍陳堯舜甞吐露於昌言窺姚姒逮莊騷克表章於世學竊觀新史厯載名臣當端平間豁隂氣而開日月偉鐵菴老攄鯁論以抗雷霆由平生言論而觀皆斯世綱常所繫厯陳幾疏獨奮孤忠四方傳誦其奏篇萬代深嘉其名節是生令徳丕闡先猷適時旴母之江遹資良牧儀圖召父之政疇若端人將出擁於旌麾先入瞻於旒扆得循吏布郡國有同漢室之盛時詔刺史至京師爰舉唐朝之故事想見殿廷之對務求田里之安仁聲載馳羣聽丕聳兒童候郭伋雖共欣皁蓋之來君王問長卿恐留侍紅雲之側某昔曾拜履今喜開藩竢及境以前迎豫飭函而往賀作中和之歌頌已沸歡謠宣寛大之詔書式觀新政賀段南安移鎮建昌朱轓移鎮紫氣隨車襦絝騰歌春意滿梅荂之國旌麾改觀恩光新竹使之符棲身幸在於為僚頓首敢恭於執贄某官本領端厚材具恢宏心如明鏡之當空奸袤惕若家有怒笏之傳世忠義凛然其學則根乎典謨其政則行乎江浙蚤合鵷行之綴游勞鳬舄之飛夙聞諸老公言雅敬大賢偉節謂顧凱之為劇邑宰勇於愛民謂富鄭公當新法行剛不奉詔一端甚美千載可書劃天日之開明儼風雲之際㑹意且近積星而上矣何遽逺層霄而去之乃奉十行寛大之書而播千里治平之政發奸摘伏峒落震驚醒瞶膏萎田里欣暢徳化既深於横浦仁聲轉入於旴江竊惟聖朝豈不望明公之入言念凋壘正渇思賢牧之來姑煩汲汲以拊摩寧使徐徐而朝覲㑹有政績大書貞觀屛風遄近清光親給天章筆札賀建昌柴通判入朝天闕出擁星屛乘柯山雲靄而來光生朱韍分旴水風月之半喜動畫堂自欣列屬以為僚敢僭代庖而䕶篆棲身庇覆頓首候迎某官志業昭融器能恢偉筆端有口吐五千書傳之香胷次無塵鍾萬疊谿山之秀簪黻暉煌於奕世塤箎倡和於明時垂髫試中書堂盈箱盡讀唾手取進士第揮翰如飛定當窴台閣之間乃薦勞州縣之内既飛鳬之直上猶展驥之平遷信知儒者安行之規不為世俗速化之舉旴為支壘故自存曾李之書公駕别車端足佐龔黄之政然時事正艱於經濟而清朝方急於招來言觀温綸靡待煖席某奮身良苦為學亦迂毎嗟勛業之棲遲濫魁晚榜空閱年華之晼晩來坐寒氊適逢關决之虛强任攝承之責方虞躐等竊喜戒嚴敢敬摯於箋函冀亟驅於騶從遥瞻紫氣行當奉印綬而還願挹春風諒許侍屛篂之坐水雲村稾巻九
