body:
  text: 水雲村稿卷十一元劉塤撰書翰答諶桂舟論銘文書某辱賜書賜挽章意厚甚哀感彌甚某幼孤事先母四十年天怒其不能盡孝一旦奪之㷀㷀疇依痛毒酸楚既葬既小祥思親之淚未乾罪逆愧悔弗釋也人事俱廢不特取疏先生先生哀憐愁苦勤勤惠綏不孝孤曷克當謹忍泣叩首以謝高文下教若以某為可與於斯文者益佩深情承欲為鄧尉作銘此意尤古闡幽垂遠固朋友責故舊雕零中年增感某亦嘗欲為三數知已發揮平生恨學淺筆力弱未能為先生幸慨然為之或辱教某以共為或互相為冀萬一或有傳也某固不善為儻先生教之或能為毋問其傳不傳要亦盡吾心逾於不為耳竊嘗謂古今文籍以來凡數千百載聖哲豪英凡數千萬人聲蹟磨滅富貴湮沒所建立操挾乃無一足恃恃者數行之銘託之金石歲月悠長土草翳蝕石泐字漫乃亦復不足恃恃者文學之士録之書册昭垂不朽世無千年之石而有千年之書故乃世代寖逺聖哲豪英猶可倣佛知其心想其人者以此近世韓歐曾王多為人作銘章雖其名甚微其銘刻已湮漫而後世閲其集猶知有其人者亦以此巨人碩士藴抱瑰特不忍隨世浮沉刮條振迅以自舒展或出意氣立事業皇皇焉為民彞世教計期以久傳者又恃有此也傳不傳不足計願命之曰人與鳥獸異矣為其有足傳也概曰不傳不力於善為鬼蜮為梟鏡為狐鼠為虎狼為天地蠧為民生賊諉以堯舜亦死桀紂亦死取快瞬息甘為愚鬼莫之恤是莊列氏怪誕陷人心之說吾聖賢位天地福生靈意不如是此春秋作而亂臣賊子懼也天地無全功能生人不能使斯人之有傳傳者以文章耳文章造化當與天地造化分功文章在世間顧可少哉熏天炙手翕赫震動曾不能當數十年日月之運寒暑之變炊糧未熟夢已覺矣回視平生竟何所得想見千載英魂亦自一笑惟陳編墨蹟炳然如見爾則文章在世間乃誠不可少矣而託文章以傳者又必其人德義志節無忝銘筆乃幸或恃以傳韓歐曾王節行配古人德業著當世世託之傳者以此也乃亦不獨文章也近世陋俗以名位求文章不揣其本署銜位列名氏直寸晷矜寵終不傳也則又不若山林枯槁德義志節之士大公至正誅姦發潛如是而為之銘乃足恃以必傳也夫其富貴權力之不足恃而賴金石以傳金石不足恃而賴書冊以傳必傳矣顧非德義志節有足恃文章亦不傳也噫其難哉噫其難哉某自少從諸老學為銘章老矣而無成今先生志乎是而德義志節高隱山林乃適與某之言合而某亦山林枯槁也故願相從以成其學焉哀疚中不作他文近為人銘二墓未知有合於盛意否也故因復書以請正焉某叩首再拜內幅近世銘筆推永嘉葉氏為宗某少之時因諸公宗尚嘗熟復焉十數年來深味其文乃有不大愜於豫心者往往崇華藻而乏高古不免止是近世文章爾若夫獨步千古方駕班馬則愚謂止當推昌黎一老而繼之以南豐先生而已尊見以為如何回宜川黃親書某罪罰痛毒中辱展親甚寵止哀讀來教數四何謙勤也古人於所自出每篤敘焉而不忍遺班班書傳詩歌間熏然其慈謂不復見今也乃幸於仁親見之昔我先老姑之適順伯氏也是生尊夫人以歸於尊公而執事生焉義至厚也某生也晚幼也孤不獲侍先老姑其於執事又以異縣而不獲親某則愧矣書焉先之意繾綣甚蓋今世以為迂濶不切而高朋娓娓若不能以寧豈其詩書同原風味自别某不惟愧也感慨係之盛心古誼已可想見清材敏識固應不羣以仁義培其根原以事物錬其智識惟不失其艮貴與造物游雖緼袍環堵自然常伸於萬物之上豈必紆青拖紫號當世公卿而後為貴要之政亦何足貴也拔起西江萬灘中共垂不朽吾親勉之某也未五歲而為先君所棄事先母踰四十年不能盡孝天遽奪之倐越期祥哀痛徹骨恨不即相從地下屬有三兒二甫冠一垂髫閉門味書老意轉拙疇昔獲交海內魁奇鴻雋固自負風雲萬里之氣今則心堂堂而髮種種矣蒼蒼儻私我更幾年住世間或可有以藉手見古人不然自分與草木俱朽而已雖未能見君子以寫我心幸因復書而得以論心猶未若覿靣情話為慰此心也賤纍辱問多感併此附謝因書來忽臆先母談笑間有時述先姑及尊夫人令德歷歷在耳乃今言不可聞俱化而為土矣執筆愴然淚墮而廢不備答友人論時文書客中薦承訪問良懌繼承時文新作下教尤懌今承惠書徴贈言則某愧懼不復能懌矣文固文而時非時君何情而猶工之不置愚又何說為君贈邪念君意厚不可負亟細讀盡卷贍麗如雲敷空圓熟如丸應手儼然景定咸淳程度儻國不亡科目不廢挾此鼓行芥拾青紫惜也賈用不售蓋特可曰舉業而不可曰時文矣愚竊有以廣君意夫士稟虛靈清貴之性當務高明光大之學然為昔之士沈薶於卑近而不獲超卓於高逺者蓋宋朝束縛天下英俊使歸於一途非工時文無以發身而行志雖有明智之材雄傑之士亦必折抑而局於此不為此不名為士不得齒薦紳大夫是以皇皇焉竭蹶以趨白頭黃冊翡翠蘭苕至有終老而不識高明之境者可哀也今幸科目廢時文無用是殆天賜讀書歲月矣尋求聖賢㫖趣洗濯厥心先立其大豈不油油然有顏曾自得之樂顧復沈汨於此則宋人拾鄭人之遺契而曰吾富可待者也而又有重可哀者南唐書載金陵被圍亡在旦夕後主猶命伍喬於圍城中放進士孫確等三十八人及第史臣反覆哀痛謂其不識事勢每讀使人殆無以為懷而比歲襄圍六年如火益熱即使刮絶浮虛一意救國猶恐不蔇士大夫沈痼積習君亡之不恤而時文乃不可一日廢也痛念癸酉之春樊城暴骨殺氣蔽天樊陷而襄亦失矣壯士大馬如雲輕舟利楫如神敵已刻日渡江吞東南我方放解試明年春又放省試朝士惟談某經義好某賦佳舉吾國之精神工力一萃於文而家國則置度外是夏又放類試至秋參注甫畢而陽羅血戰浮尸蔽江未幾上流失守國隨以亡乃與南唐無異悲夫愛文而不愛國恤士類之不得試而不恤廟社之為墟由是言之斯文也在今日為背時之文在當日為亡國之具夫安忍言之今君之言曰吾非樂為時文也吾平生長技止是舍是無以自見且無以應庠序之季考也此言逾可悲耳學以明理文以載道其妙在乎自得豈為衒友朋校短長計哉誠不得已而應課試姑用君所已能正亦自足奚必自苦而求深求深而擅場正不過三數入中取一魁亞正復何可語人人亦誰復推重吾儕一等俱非妙齡壯齒此去日減一日歲月幾何不於聖賢高明光大之趣求得一二乃汨汨焉為是不切於用者以迷其本心益可哀也已異時將書以示後日有時文幾十篇行於世則可乎君姑卷懷而從事於上上者愚將觀其進焉不宣與趙儀可書某生長江西僻左處五十無聞劒炊矛淅愧不與孤竹臞仙東海高士翛然六合塵埃之外顧忍慚苟生為天壤間棄物目眵頭白行且謝世緣而同太虛矣獨斯文盛心曾未塵土每睹海內奇傑灑灑可人意輒篤嗜若飴蜜然至嗜之甚則必博訪其人之年貌與其志節以想見其為人其人居逺而不得見則或倚危䦨登高峯目極飛雲以寄其一日之思而又甚者即雖素昧或通尺書焉以納交噫地老天荒今夕何夕甚哉若是其迂也或曰是奚迂天理民彞之正然爾某所以冒焉致書執事之意蓋如此日社友陳君南居之歸自鷺洲也衝風雨過我水雲村中某迎問之曰是行見異人乎曰見之誰也曰某人某人而執事居其一又問得異書乎曰得之發其篋得青山初槀一帙以示時莫田已夜色亟篝燈熏香以讀讀一二惟恐其盡一讀竟又反覆讀至夜分讀不忍休不覺瞿然語諸兒曰是古心老子復出邪何甚似也士登古心之門者多而文之似者蓋寡往往高自標致無鹽效顰正未必優孟之於叔敖也執事之文則似之矣夫文似他人未足貴似古心乃有貴於他人者是豈易與俗言且近世以文鳴何可勝算簡潔華贍典雅雄豪雖各極其天分之所到人自名家而古心乃為獨不可及者以味勝也雍容委蛇豐潤暢達不磔裂不奧澀時有斷崖崩湍㸃染呈露終不礙河奔澤滙之勢雖其奔逸超絶處正如天驥籋雲橫視無際而其歸沈欎倡歎雋永牙頰何其㫖也今執事之文抑揚開閣縈紆起伏淸不浮奇不怪簡不失之碎深不失之艱是皆不必論其所以尤可愛者亦以味勝也新意坌涌恣態百出而沈涵吐吞一節三致意讀者有無窮之思甚矣其似古心也某甚敬甚慕甚恨未一識故介南居致書焉昔歐曾蘇黃皆不逺千里以文字相師友此事今無執事其或振之也新著想益富便中希寄不宣與陳中方教授書某從地上望百尺樓突兀霄漢幾年於兹恨不獲一攀附比者夏五宗濓為容不自意得進臯比左右慷慨意氣促膝傾懷走也何自辱此豈坐上之嘉小異故邪病且還山惜不再詣欽企重欽企斯文黯􅓹久矣名儒碩師模楷盱庠如臨淮入汾陽軍中旗幟營壘俱變精采流風餘韵及我鄰封咸願與講下章縫均承教育秋堂風露絃誦益淸坐使澗泉如在洙泗某重拜稽首某敝車朽槖為天壤間棄物慨思平生與海內豪俊游所志謂何五十無聞乃困躓歷落之如許雖其心堂堂而髮種種矣惟進學求道一念與時俱長亦惟見賢思齊一念與時俱長甚願立下風請所以教顧未之能適友朋過從謂將布武堂下敬乘便奉書寫别後懷仰心西風欺人意度蕭颯不佞願聞金石一語以自壯答陳將軍求諶先生銘文書某冗阻造詣實深懷賢桂舟先生神遊物表寖逺寖忘誰復動死生交情之念獨執事哀憐苦心欲志其墓此宜孝子慈孫之所汲汲而執事先焉聞者曰足厲薄俗真古義士矣此宜屬之大手筆乃下采於區區廢惰之人聞者又曰託非其人矣永惟執事相愛之厚老先生相知之深俱有不可辭者抑承命半載不及下筆非慢也一則以老先生乃江右大詩人二則以金石文一字關書法又俱有不敢輕者近方脫槀敬以上呈其間不止為老先生發揚且為唐宋二代詩家統紀略存大概未知果可拈出否昔歐陽公作范文正公神道碑及尹師魯墓志竝招物議王荆公銘錢公輔母夫人亦然彼二公皆大賢名筆也猶所不免況僕乎儻招浮議惟在高明察之歐公有曰此文所以慰吾亡友耳豈恤小子輩哉不宣與朴齊黃宰書某託斯文綢繆之好踰三十年道同而言莫違心切而迹罔間所謂景仁兄弟也姓不同耳書館分席文場共鐙每一追思如墮夢境昔若彼其密今若是其踈也何居逸少有云感慨係之矣比者兩辱書兩具答往往皆江湖遞送能無浮沈否即辰春暖伏審亨涂有相台履多福雅學盛名宜列華要屬拘近制聊此斜飛伏聞省台諸賢交誦名德將有擕上崝嶸者其集烏乘驄快我心目某衰朽踰六靜味更深獨嗜學一念至老不衰亦不自覺其無所用也竄伏深密顧景淒然每思乘興一訪知巳又若有物厄之者學生來洪敬上起居問併敘渴心我悲所欲劇談者不勝道也說與傍人都不㑹杖藜㩦酒看芝山紙盡且已愧不宣展通臧廉使書時維孟春草木生意恭惟亷使相公魯山先生正直所格神明翕扶台候履端多福去秋上狀後遄往寧都逼臘才歸歸而㑹憲甫知州言相公榮被除音移節名部浙民何幸吾江西之民何不幸也輒成拙詩前寓贊揚後寓依戀伏希電燭惟是禮覆之請上纍鈞陶蓋日夕俟之天下偉人斯文宗主舍是何所依歸者苐恐吏舍有望無力計置全藉相公維持恃以無恐憲甫知州仲春授代此時或追送至洪首圖俯伏階墀以謝不宣再通臧廉使書月正三日李舍人行嘗附拙詩以進越三日憲甫知州出示珍染乃知相公軫記孤寒已為入選何修何飾如取如㩦此生恩未報他日目不瞑謹誦此語以謝區區前任為例革故短少月日若接補滿考本自不須再行禮覆苐去歲嘗諜之省房則曰前度禮覆文書未為盡善恐入選有駁須要重行禮覆相應六字完備方穩有此疑慮是以冒昧攀祈而不知止今賴相公維持入選無駁何幸何幸然再三細思終須過此一關實欲乘今明使者在司特達成就即目合用即用否則存留起咨失今不圖異日寧復有愛士如珠若明公者乎閒冷蕭條出門如礙既不能奔競計置惟仗盛心古道曲成不遺爾去冬鈔到儒選名字惟袁之萍鄉州瑞之新昌州二正今猶未差恐有機便望相公於內造就一處則闕期近而士習純或可藏拙待滿為告咨地相公其圖利之敢肅拜以請年時不肖嘗以屬之理問白公得報云候文書到選當為出力繼又聞參政尚公廉正不阿憐才重道二君子皆相公所厚儻星聚次及之尤幸平生淪落晚遇諸賢子犯曰天賜也敢再拜以請通李左丞書即辰麥秋淸潤恭惟左丞相公龍川先生牙纛所臨神明擁祐鈞候動履多福某墮身流水村中安閒守分何日非雲庇所及也年時里商來汴嘗附拙詩轉眼一春益勤穹仰相公德望勳名朝家倚重宣威布政驅馳靡寧繼今以往必判中書不然其由鄂而還洪乎西江士民引領望之某纍年困頓不能奮飛近者魯山廉使到州一見歡然特加愛念許為出力造就親索一宗文字去後隨䝉分付省中入選正商量間而此先生移節浙東事機相左又成渺茫幸今相公造化在手儻念門牆桃李之舊宛轉鈞播拔之泥途不負大恩有如皎日今因程府便謹奉此上候起居復有拙詩一章敢塵電覽江鄂相近甚欲一詣省下參拜少敘渴心雖行止非人所能然此念未嘗一日忘也浩有欲言别容嗣狀不宣通趙桂陽書惟使治在湖湘深處而鄉邦又在江西僻左處兩地懸絶夫是以尺書弗獲時至左右也永懷取疏其顙有泚一日耕樂翁過我共談乃知天杪歸帆已駐雲浦胥覿有日迎風躍如伏惟老手作郡敏健精明戢姦如束濕救弊如沃焦民曰太守百年幾見而或謂惸嫠之所安者非譁猾之所便也雖然愛民一意從滿腔惻隱中流出是為上不負天子下不負所學仗通天之肺腑行大地之風波夫焉往而不自適彼造物者豈亦若世間盲人哉六月一息七日來復矣其盛氣以需某辱知心四十年如老兄弟誼當走數百里圖快覩以濯鬱陶門巷清寒貧病交阻亟墨此紙畀兒輩以候前驅明公將暫還獨樂按行華竹乎抑將舍廬陵而居潁棄眉山而居常乎環召匪遙壽福三祝謹上狀通問浙東臧廉使書廉使魯山先生閣下自使星移躔江浙道逺屢欲修敬亡由也嘗於有司榜文間知澄淸所至神姦掃空為之贊歎不已又為之引領以望重臨蓋江西父老皆然非特區區然也新秋漸凉伏惟正直有相台候多福某杜門著書蓋羈困窮愁之所不赦前載獨荷鈞陶為致賤名姓上於省去載已獲咨上於朝今春已入於選未知銓注之何時儻霑一命即水木本源一出相公所成就無可以報報以淸苦自厲不辱師門而已嘗竊自謂平居無營或藜糝不繼或緼袍不完然且噤㾕苦忍以俟命若果得一受敇教授月俸廩粟視州判丞簿不大相逺足可養廉吾將守氷檗以保名節其尚求多於造物乎某有一親友欲圖進身未有其機敢恃師門愛厚輒以籍貫具呈干大造為立根腳文書乞從所轄諸府取一保解就告體察完備移牒區用可乎盛傳使節升除江右荆湖果爾尤便當令斯人隨馬足就鈞陶也有資由徑者大率結貪濁之奧援無力發身者止得投公廉之主人惟明公哀寒畯之湮淪為開前程俾得自見是公成就無上功德贊歎何窮不勝歸懇之至不宣與劉國瑞書春中辱訪甚恨匆匆承許午節重來何為爽約也豈非進學之志稍倦耶韓子曰業精于勤切戒倦惰象山陸文安公曰我這裏是刀鋸鼎鑊底學問富哉言乎蓋必如是乃能折逗牢關徑到悟境若是半間半界乍前乍却恐終無所益也博參碩師詳擇勝友毋以目前小見自足而求進高明光大之域其庶乎詩文數冊久留左右早望發還為妙不久入盱足下何時來州若得㑹面數日更佳也答胡教授書并録來幅來書云長孺之來盱也蓋嘗數承過顧又示以所為文章雖知其有意於古然未敢以為絶異於衆人也夏五月家僮自錢塘來持故人雪澗陳文書至具言為令南豐時與執事甚有交誼而其績文操行衆所無有某然後瞿然不足於心以為前此知執事者淺也作教授窮僻之邦言語不為當路所識察然何以為執事道苐今者又病更數日即滿告期行且去此徒負故人丁寧意慚恧而已而雪澗老且病餘日長短不可知某與其同産弟張養䝉為友其拳拳之情不可不令執事知謹以其書一緘二幅納去旦夕即遣人還浙幸以手書報併示元書也病憊草草餘惟以吾道盡珍重理不宣某敝車朽索為天壤間棄物鄰翁社友或不相聞忽枉謙勤示以雪澗公翰墨别四十年隔千數百里猶拳拳於棠隂之一介士古道顏色已不可及執事申以顓函增其光價是與人為善者也滋不可及恭惟盛心有感無斁追思澗翁之始至僕旅進退於廣衆中朴訥韜潛無敢自異不意此翁何以得九方臯之法拔躋上賔是時邑政淸肅威嚴若神雖同寮上寓非公謁毋敢進獨某以斯文見親重如兄弟然氷雪相看始終無間以迄於今世已易而眷不衰侯嬴曰人固未易知知人亦未易安得不愴然思悠然感也元緘歸璧獨留內幅永以為寶時閲其字如見其人就有一緘附往聲謝使介復來更得其數字尤慰猝猝奉酬容侍臯比以謝謹上狀不宣通問雪澗陳提舉書并録來幅雪澗興胡石塘書云處久仰恃襟度宏開輒忘僭躐直布忱悃未言先懼治下南豐郡有儒人劉兄名塤佳士也四十餘年不見之矣今亦不知其人尚無恙否曾出仕否處久壬戌癸亥間試令南豐時每與文字交此兄筆端俊甚與之周旋兩年餘未嘗有分毫事相干撓此最為難得至今敬之嗣是各景東西兩下不相知無從訪問生死兹幸老先生典教此邦處久可藉是徼福通名以丐餘波之及處久不勝大願願先生以區區之請多為詢問其人安在處久以其年推之恐亦踰耳順矣或此士尚在乞從路學賜一公檄下之所屬招之使來先生試憑几扣之恐亦不在籍湜之下特賜提撕振拔之造處久拜㑹實同他時其人或不如僕所舉甘受欺謾之罪不勝皇愯之至召使提舉雪澗先生閣下塤昔幸甚以㕓氓事君侯辱盼絶異雖日月如流閲世已隔每一念及便覺神馳赤城霞霧間然自明公班授鹽城時獲一交書書不再寄久而閲邸報見盛名與菊泉大司馬聨辟欲寄賀書終不可寄蓋天旋極折矛淅劔炊出萬死得一生雖相邇猶不相聞況浙水江雲渺隔如許邪近歲間有方外自浙來者首以門牆為問問亦多不能對惟今夏有宣城沈德載自杭來亟以此問其人云孰游溫台似能言陳侍郎府第事至詢及雪澗昆弟動履復不能對於是倚危闌望長空淒然悵歎者久之乃不意石塘廣文忽以書至繳示親札見而驚驚而喜喜極而又悲賀知己之無恙辱念舊之不忘光風霽月飛動翰墨間持玩數四猶明恕堂侍坐時顧天壤棄物與俗背馳比鄰同社鮮有問子桑者明公四十年之别千數百里之隔歲寒心事不遺琴堂一舊客且憂其泥途期洗濯而振拔之蓋始望所不及也或謂當於古人中求抑求之於古正未有也感激盛心沒齒不朽恭惟貞元朝士既壽且康鳩杖蒲輪㑹有溫詔苐不審丙子以來曾為時出否亦止高臥看兒戲否宅府安靖否莊産有增無虧否蘭玊有幾年今幾孫枝有幾年今幾有仕者否有在京者否令弟舊為臨安稅官者今為官否菊泉公康寧有佳子弟否盛幹如尹如盧俱存否尚願聞之慰此懷舊若塤則風叨雪虐鼎烹爐煆之餘一不成而萬有餘喪使滌其創痍假之羽翼豈不略可自見於世抑今世所共為者或不能為或不可為不敢為且不忍為故亦惟安於無為惜也心堂堂而髮種種矣甲子别後至丙寅春宏齊先生入政府約與俱以母老辭其年秋丹山先生鎮虎城道南豐復約與俱又固辭戊辰秋邑以寇燬移家盱城永嘉木史君天駿實客之矩齊曾西淸竹溪易瓊帥交相延致庚午科舉忝魁亞榜決意明年赴京補期見明公於輦下有㫖分試江西竟不果來是時後林李漕使邀往湖湘而南村潘史君起豫又邀入閩兩辭之已而木史君起饒州中山陳先生漕江西俱招致亦兩辭之獨與菊山趙史君周旋於建昌者兩年便養也甲戌荷留逺曾公與䝉川劉尚書易牒俾塤試胄闈值母病又不果行乙亥春客趙撫州依制使黃端明賜以官屋一區器具咸備其冬盱撫危急拔家還豐劫奪一空僅以身免丙子七月邑有變北師屠燎無遺幸而免甲申毋亡己丑長子亡庚寅汀冦延蔓逼州又幸而免去年冬拙婦亡何災難愁苦無寧歲若是也命矣夫今存者二子三孫闔門百指山田數畝雖豐歲猶不足兩喪未葬百憂熏心六十五翁更復何道閉門著書堅忍清苦而已所幸平生粗識趨向未為鄉論所貶而時僚之賢而相知者率溫存而禮敬之歲在甲午州庠缺官當路不以為不才强使承乏既幸善解纍歲退休前年亷使臧公巡部訪問哀其陸沈慨然為致咨保於朝廷已入選未卜銓注之何時然使獲一教官正亦不滿知道者一笑賤迹出處大略如此明公有問故及其私石塘云有杭便然且急故信筆作家人語不修詞急故也願言以道自壽丕衍期頤嗣有便郵尚冀雲烟一幅以自慰不宣備再與胡教授書二十七日才領所還尺牘亟加補完同日轉發未知猶及使介之便否萬一不及計華翰中亦必道甫問訊意矣州里某人士也秀美而文且熟吏事往年操數寸管𨽻台下監察者以為能擬署憲吏廣東廣東使者義齊公之道金陵也嘗納拜焉今將南逰而四顧傍皇既無曹丘生為之揚名又無鄭當時為之推轂事濟否未可知明公雅厚義齊公而春風如海愛士如珠又人士所依賴不揆冒昧為此兄請伏惟一緘九鼎弊帚千金使此士稍遂始願是執事有大造於西也此兄盛年好修家粗溫飽當不至迷繆以誤推奬二碑委教甚寵乃知大手筆世自有人而士類所以斂衽名下誠有以也李密見秦王安得不服他日當摳衣而請焉與程學士書竊惟主斯文之齊盟必屬之當世之宗工明公大名震乎海宇鴻名行乎中朝蓋南北人士倚以為吾道元氣者執文盟之牛耳微公其誰歸某今者不揆淺陋著一二書以傳逺而懼其未足傳也各欲干明公印正謹録所以著書之意副幅具在雖其書浩博未潰於成然念明公趨朝之日近懼書成而不獲薦聞於左右且無以得公之印正也不得公之印正何以重吾書是以敢三肅而請焉人間萬境萬事猶槿華石火曄曄俄頃間不可拊玩惟斯文長幅或可千載不朽耳僕以千載望明公明公忍不與塤共千載乎或謂子單人匹士也其為若此也幾陵節抑太史公謂虞卿非窮愁不能著書自見於世陋哉斯言知道者所鄙笑著書垂世乃論窮達乎四書行世如日月豈弭貂衣衮者之為邪塤不佞願聞金石一語以自壯不宣與胡教授書惟奎躔移次之日久騶從市糴得無艱乎雖耿介絶俗固有以自處而使從者同其淸苦則鬱鬱於我土地者某之所以顔忸怩而心不寧也薄奉餼稟助徒御之一炊而非以為執事獻且區區之私非取諸學高明在所勿疑蘧伯玉恥獨為君子僕敢拜手以請迓蕭學正書某幸甚壬辰歲獲遂初識於洪繼幸甚壬寅歲獲遂再見於盱蓋挹光霽聆博約之日舊矣今復大幸臯比巍峨重我鄉校而不才適承之得以護紅篆率青襟以待君子至非機緣之厚邪恭惟英濟之才深醇之學山城何所乃屈範模將非天啓良㑹使窮陋之學舍零落之儒風從是而一大更新乎夜者東望奎光燭天若近在吾百里間者竊意前茅其將壓境喜而不寐亟裁尺牘授閽𨽻疾驅以俟馬首心香引領公來勿遲巳飭諸生洗濯神觀祗迓州東門外伏祈委照通李左丞書左丞相公龍川先生去冬欲詣參謁陳兄傳奉鈞㫖云往湖口慮成背馳遂止開年臥疾又未能動僅數百里間一見之難如此更逺其又何如重可歎也春寒伏審鈞候多福令器監丞必已超遷次令器萬戶必已回任相公新除必有成命矣敝州時僚幸多賢民間安靖昨自相公撫治以來田里晏然盜賊不作十七八年於兹矣然生齒日繁田收有限雖當豐歲猶有散食於外方者大德四年至今連歲不熟蓄積俱空上年蟲傷特甚截長補短僅及半收輸官之餘所存能幾新年雨雪連凍市無可糴鄉村尤艱且窮原之地舟楫不通春耕在邇秋成正遙待哺嗷嗷景象蕭索見已告州申省乞行開倉賑糶惟是下情末由上通耆老百姓知塤素出門牆懇求呈告不勝大願願相公興念舊嘗親臨整治之地百姓懷恩靡忘早晚省官㑹次乞賜鼎言為民請命左右司官當該省掾併丐不惜一語贊決早與行下糶糧賑饑使民命獲全免致溝壑流離之苦且以潜消意外之虞是相公有再造于豐也因倉官齎文解赴省仰恃鈞愛僣達民情不宣與永嘉葉教授書某間從諸公後講論斯文統緒知水心公家學有傳縉紳左次雅欲立下風考問乾淳文獻而遲莫囚山未獲布武於堂下殊慊也淸才雅望範模盱庠臯比談經多士德色餘波及鄰而不自知何時親承沾此教雨某家盱南水雲之村名迹湮微無以自通於時産適有瑣瀆不敢以未面為嫌而介吾友趙君以請於下執事曰往景定咸淳間東浙之英有宰吾邑者相知厚凡二人焉其一天台陳德可即思道張學士同産兄也别四十年不相聞心常思之前年忽䝉令代石塘公為轉致其書念舊甚勤甫具報而聞陳公仙去殊用悵惋其一平陽楊山立也别亦踰三十年不見聞思之如思陳而亦無由問訊今年乃知與執事同里也聯姻也某不勝欣幸幸假便以致書焉一緘奉納儻有専使丐為傳郵他日更得其回字尤幸干聒匆遽非所宜言然交游情也諒不為罪稍凉入盱當趨講席以謝與胡石塘書願挹光霽有如渴饑都尉經從滿期親炙而偵伺不謹乃不知夜度昆崙為之悵歎無及伏承志在康濟靡憚暑行此其視饑由已之思溯千古而與之合世固有在其位不謀其政肥瘠秦越獨何心乎如公賢勞使我心敬深以弗獲一見為恨敢奉尺書問安併謝不及候迎罪又與胡石塘書伏審神龍護舟祥鸞棲枳誼當走百里以餞衰晚棲遲不能以筋力為禮謹奉書以慶以别蘭玊留後當數有郵便期時貢安問亦望毋愛片幅相溫存也承問僕所著書大概放正宗例然正宗止乎唐今則専主宋以接乎唐者也獨惜山州屢經兵燬咸無藏書故心雖勤而事不就年時嘗寫與曾兄德進欲於城南尋斗室假羣書日夜翻閲去取度三兩月便可了事而蹉跎至今竟未能動且筆札浩博非募書手不濟又所選文字有關繫朝綱國政者必須略載當時事蹟首尾以示千載自謂此書若成則三百一十七年間元臣故老巨儒雅士鴻文大筆雲合星聚粲然不朽於宇宙間或者世道之小補也東望紫氣神情黯然願以道自珍倚膺特台不宣彭正心提舉曾月崖教授祠祀學宫請陪位書嘗聞古有鄉先生者其存則人咸師尊之其殁則祀於學禮也先丈某官令德雅望允為達尊掌教鄉校具有勞績而祠祀未舉是謂缺禮塤承乏攝官爰修曠典擬以二月朔旦為先丈某官設位於州學之西廡歲時祀焉夫古人制此禮以待鄉賢蓋慮世代悠逺人事不齊惟託之學校庶克永久宣聖廟祀萬世不廢即鄉達尊祠祀亦賴以不廢然則此舉關係重矣豈止尋常瓣香巵酒斯須之敬而已今者豫告有文煩為焚白於家廟神靈有知庶其來格至日薄奠奉安敢屈昆季陪位諒孝子慈孫所樂聞伏希照亮與丹徒陳教諭書僕家江西君宦浙右信風馬牛不相及也然世好交情則與君有甚舊者孔李千載猶敘通家况親承尊翁之訓教而忍自外於象賢乎請陳如左昔景定壬戌癸亥間尊公雪澗先生之宰吾豐也塤實受㕓焉邑士如雲無一可其意者獨塤以斯文受異知其意氣孚協形迹兩忘蓋平生未有也别四十年隔二千里嘗相思不相聞輒為之悽愴不自已忽甲辰夏五建昌教授胡汲仲轉示尊公癸卯歲所賜書訪問死生哀憐沈浮不啻若骨肉然塤讀而感感而悲即具箋幅託胡教轉附入杭亦既久矣一旦忽以書還具言尊公已仙益為之悽愴不自己又久之乃克奉書自通於執事而就以郡志所刋尊公題名及政績呈納蓋乙巳年事今者胡教報云其子至杭已將所附書託劉聲之携至赤城聲之報以足下已赴丹徒新任囑之守舍者轉附未知達聽覽否也適有朋友便舟過京口念此良便不可失敬修此書重申鄙悃大概俯叩前書之到否乃若心所欲言已具前緘不贅也六十老客光景寖穨知此生機緣能獲與執事一見細論再世情好否又重為之悽愴也有便寄書餘惟珍重不宣內幅南豐先生曾文定公有弟文肅公布嘗為右相出判潤州既薨後不復歸里留葬京口二百年矣煩為傳詢葬何鄉村墳墓存否其家子孫田宅猶有世守者否敢望詳報如有後裔宜與之言南豐先生位下子孫久已零散有别位僅存其一亦甚淒凉惟纍世墳墓菴寺儼然無恙歲時官為修祭不廢也南豐文集曰元豐類稿郡守新刋甚整謾知賀承㫖程內翰書內翰承㫖相公閣下春中展敬菴墅辱留欵意甚勤光霽傾懷談到太極昔之親承諸老也嘗若此四十年來無此樂矣乃始復見於公安得不躍躍自幸山房有約尤感不遺擬自洪歸即陪杖履乃不意抵洪而病病且劇滯留元妙凡七旬復不擬銀信鼎來聞命就道當台斗小駐洪泮時僕正委頓中欲力疾一謁弗克欲奉字一問亦弗克又安得不鬱鬱自悼也兹審􅭍坡導㫖麟筆續經眷注彌隆弼諧有待不勝欣贊之至江西自南豐公被異顧典五朝史事踰二百年無繼者今明公獨當之平園公由承㫖登政府踰百年亦無繼者今明公將又當之疊是二美重我鄉邦塤雖耄昏尚期書盛事垂不朽前值端便亟奉此書為斯文大亨貞賀又為吾道有依託賀也內幅薦友塤久安蕭閒官境無夢延平闕到迫使之官雖精力粗支而舊學都廢安能出新意與俱生談經析理乎徒以閩地差暖稍便衰殘爾荷令器少尹為我差聲將以菊後馳驛梅前視龜輒有片言或足為明公助伏承獨受簡知提綱史籍甚盛事也然昔之開建史局者往往妙選時才以自助溫公修通鑑則有劉道原范淳夫諸人元豐修五朝史則有陳后山邢和叔諸人寶祐修高孝光寧四朝史則有建昌張平齊與僕族兄劉信翁諸人蓋不惟集衆思成巨典而亦因是奬拔一二人才於以廣豐芑之澤此昔賢愛君盛心也古今異宜固不相襲而近覩睿㫖其間一語亦及於此即未嘗不與古合有如公門桃李夾袋姓名南金北珠隨取隨有孰敢議其無人獨以山林耳目所接則前輩不存後進不競其堪是選者寡矣史非他文比也彼或沈錮於程文流連於吟咏馳騁於小小文詞安足語此昔人論六經謂尚書春秋經也實史也則史豈易言歐陽公新唐書世猶議其不及於舊南豐公秃秃記何愧遷固顏魯公祠堂記道山亭記直史筆也及夫太祖皇帝總叙則與裕陵聖頌不契矣史豈易言姑舍是即所知聞略評時材可乎草廬玊霄已原缺相若不堪鞾霜待漏矣若原缺寧海主簿胡汲仲博洽不羣史學尤僅今所罕見夫史者所以明夫治天下之道垂憲於後世曾南豐嘗謂唐虞之世豈特任政者皆天成哲士蓋執簡操筆亦聖人之徒也史豈易言書生好論事老矣習氣不除故論薦至此幸母曰子誠齊人也抑又歎景逼崦嵫且固寒喘非復田光盛壯時使減我數年少操觚翰從諸賢後則識馬周於逆旅㩦浩然于禁中豈無一知已者今已矣尚何言尚何言引筆姑止是勿罪水雲村稿卷十一
