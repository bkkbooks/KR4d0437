body:
  text: 水雲村稿卷十三元劉塤撰雜著記夢丙戌歲秋孟暑盛一日書困假寐夢偃仰小榻上氣奄奄欲死旁若有言者曰死矣已乃氣果絶而死死時亦無所苦惟覺神意飄飄然如行雲如飛烟騰上太虛間不知晝夜明晦不見山川人物鬼神形狀不食而不飢不飲而不渴不扇而不熱不衣而不寒鴻濛汗漫蕩漾寥廓而亦無附麗倚著者久之忽爽然自悟曰此其死耶於是小立於無人之境而凝想乎平生自襁褓鞠父母之懷而至於總丱至於冠且婚且生子而且將老矣其間若仰事俯育幹蠱承家親師取友讀書作文運智謀競名利其瑣瑣者若求田問舍蓄書備器日用飲食貿遷有無又若經涉亂離酬應世故生死聚散哀樂憂懼百種千態意必有一足恃以為長且久者乃今口欲一言而不能發手欲一操而無可伸平生積纍竟無尺寸絲毫相與始終即不知四十年營營役役所成何事卒亦何所得乃且併吾之五官四體不得自為之主耶顧今之飛揚升降乘雲御風若存若亡無聲無色者又安知不日久日消寖以磨滅而人世紛紛正徒苦耳因一笑而覺記所夢如此度他日真死不過如此而世人之生死必且皆如此汀冦鍾明亮事略初明亮之首亂也汀州草間匹夫爾非有權位號召世資憑藉奮臂山澤一呼數萬衆斬刈剽敓飄蕩震洶揉江閩數郡之地動江閩浙三省之兵貴臣重將裨校士馬因是物故者甚衆連城纍邑公私供億耗費者甚侈師之所經寇之所及男女老稚被執僇資財廬舍罹蕩燬者甚多上煩廟堂應接諸省奔赴竭數載之力僅得明亮至軍前一靣而詐降無實傲睨反覆氣凌威鑠未嘗獲一交鋒決勝明亮竟偃然得保首領以殁既殁衆猶畏服止奉一木主爾藉其虛聲餘烈尚能統御所部不即降潰彼何道以臻此此之謂盜亦有道者歟幸明亮非有英略霸圖止於作賊不過殺人民驅牛畜擁子女坐金玉堆中假息林藪又幸國方盛强兵力翕合故能磨以歲月待賊自斃儻若前古末造幹弱不支復加他警策應弗及則漫溢胚胎如赤眉黃巾仙芝黃巢之亂未可知也有脫身賊中者具言明亮有威風多智略得操縱譎詐之術似非田野農夫比然殘忍嗜殺異於人類其祭鬼常取孕婦刳剔為笑樂被其虜殺者皆淫刑屠割呼號徹天極痛楚而後得死每言必殺人則人始不敢近而其衆固可全也迹其所為直盜賊之雄耳元凶巨惡腥聞昊穹顧幸佚罰曽不及顯正刑誅寸臠縷膾以謝諸郡荼毒之民大可恨也南豐壤接閩贛適當其衝至元丙戌以來閲歷六寒暑震撼萬狀雖城市幸完然軍馬經從無歲無之至其急也則無日無之驚擾需求比屋俱敝村落殆有甚焉粟空於廩魚竭於池犬雞蔬果俱不得有加以捶縶淫濫視寇虐特不殺而已鄠都石城瑞金建寧諸邑則兵冦兼至禍尤慘烈至於庚寅四靣蜂起明亮邱元之外贛吉有謝主簿劉六十樂安有盧大老南豐有雷艾江之徒乘時響應俱煩省官親提重兵隨處逐捕賊雖終敗而受禍衆矣豫聞故老道州里舊事謂豐於宋為上縣炎紹南渡承平百年民不識兵繁庶巨麗甲江右逮紹定己丑庚寅間劇盜廖十六廖雲廖雷輩起廣昌閩冦劉四官輩又薦食汀劒邵武諸郡久而益熾出犯我江西己丑歲十月十有六日廖寇由廣昌來犯西門王宰日宣備禦無策斥堠不嚴賊已入關至三聖堂前一跛僧猶問曰賊在何處俄被一刀死人始知賊至居民奔潰幸其僅留一夕即去且不縱火故逃竄不前者或伏匿得全上司調江州兵百屯安禪寺戍守十有二月又調馮將一軍至屯西門甫解器械衣裝小愒十三日冦猝至石背舞皮繖張青蓋持木扉以蔽矢石馮亟前迎拒而軍逺來疲乏未熟地利復衆寡不敵馮被殺所部潰奔多死寇長驅入郭是時居民恃有軍來無恐逃者多還而不虞寇至也由是死者無數火官府民廬幾盡數日乃去攻建昌明年王宰以失守罪被劾罷選南城楊尉應亷來涖邑楊廬陵人也號才能吏招集流逋以漸興補逺邇賴之朝命御前諸軍副都統制夏訓武友諒將池司步騎至又命蔡將某將荆湖步騎至又命張總管將江西步兵至進屯廣昌賊遁松梓山池司兵攻破之時又起復陳工部韡知南劒州兼福建提刑江西招捕之職掎角平冦陳公有威名多方略招致廖冦俱𨽻戲下賊衆被官軍勦滅者不勝計亂遂以平而陳招捕之名滿東南矣楊宰應接軍務撫摩創痍為尹六年百廢具舉輯荒殘為繁庶化杌隉為安平自是豐復為壯邑二十餘年雖嘉熙庚子有上石謝八屠之亂淳祐乙巳有廣昌符五十之亂淳祐辛亥有新城關社之亂然禍不至邑邑得以全逮寶祐戊午歲新城李尉復來攝邑郡吏賴青臨之督月解錢帛峻甚青紅由帖徵催東濕加以大家三談二趙苛虐諸佃咸不堪命攀龍耆有張半天何白眉者嘯聚起木瓜山石牛洞五月二十日餔時率百衆冦邑首吏余璋急斷浮橋賊愒水東官民賴此得逃逮昏賊始渡留一夕焚談之廬延燎城隍廟一帶居肆明日乃歸巢諸司調撫贛旗馬軍合寨尉卒進討擒其魁渠赴建昌凌遲梟令繼治激變罪李權宰以劾罷二趙徙潮惠州家屬分徙劒邵沒其資以贍軍三談罰米贖罪賴青杖脊黥配死郡獄妻子徙外邑亦沒其資逮咸淳戊辰夏諸鄉水災乏食始則發廩劫禾終則嘯聚弄兵永福作善耆有羅動天詹花五者率羣凶起峽村八月八日清晨以百餘衆破邑駐半日焚治寺民居市肆殺略而去諸司又調兵討平之魁渠俱凌遲伏誅治失守罪縣令楊從政曄以劾罷首吏歐實死郡獄甫七年逮德祐乙亥歲十有二月江西諸郡受兵大執震擾尉寨凶卒乘時略邑而賊首陳捷江七龍輩起中和保則擁衆却村落是時南北未一有司招安之假以虛名使散其衆明年丙子歲七月初吳制置浚即廣昌開梱府聚兵興復諸邑咸應陳捷為制置司都統制率鄉丁戍南豐江七龍從之八日晨興有北兵七百馬三百自建昌掩至陳江拒於東郊大敗走其死於兵刃者甚衆士民之不及避者死尤衆橫尸路衢府寺民廬廛肆一炬幾盡自有邑以來兵火菑患無甚於此承平遺蹟掃地盡矣才十餘年生聚未復而鍾邱相挻又如此距紹定已丑庚寅整六十載其間禍亂相仍肝腦塗地令人心酸有不忍言者何吾豐生靈獨不幸至是哉因紀明亮事併載故實痛定思痛歷歷眼前後賢覽觀尚憮然而三歎也大德戊戌歲四月上吉聊述事略而其詳則具於嘉禾禦冦録云鄉飲酒議按古禮冠昏喪祭有射有燕有聘有鄉飲酒今射燕聘廢已久矣冠禮間有行者然甚少昏與喪祭雖不廢然不盡如古其準古盡合惟行鄉飲則必謹焉三代之禮僅存止此可歎亦可喜也鄉飲酒始於周以鄉大夫主其禮故曰鄉周禮天子六鄉鄭司農云百里內為六鄉外為六遂司徒職云五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉則州為二千五百家鄉為一萬二千五百家也曰鄉大夫每鄉置鄉一人其次每州中大夫一人為州長其次每黨下大夫一人為黨正又其次每族上士一人為族師又其次中士一人為閭胥又其次下士一人為比長而鄉大夫則總之者也諸侯三鄉卿二鄉大夫一鄉各有鄉大夫天子諸侯之鄉則君其國有其地也大夫士非國君未知鄉在何所鄉有鄉學鄭司農云鄉大夫飲賔於庠序尊賢養老謂在學也鄉則三年一飲州則一年再飲黨則一年一飲凡鄉學取致仕在鄉之中大夫為父師取致仕之士為少師處於學中名曰鄉先生以教鄉中之人每年入學三年業成升於君若天子之鄉則升學士於天子諸侯之鄉則升學士於諸侯凡升必用正月將升必先為鄉飲之禮鄉大夫與鄉先生謀諸學最賢者使為賔次者使為介次者使為衆賔鄉大夫為主人與之飲酒而後升之故周禮鄉大夫職云三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之蓋古者年七十而致仕老於鄉里其為父師少師而教於學也常知鄉人之賢者是以鄉大夫就而謀之以為介賔將獻其賢能則與之飲酒故鄉則三年一飲也然鄉飲禮有四若養老賔賢者特二事耳其三則春秋習射因而飲之以州長為主人故州則一年再飲也其四則國於大蠟祭而黨中於學飲酒黨正為主人故黨則三年一飲也俱謂之鄉飲酒立賔以象天立主以象地設價僎以象日月立三賔以象三光三讓以象月之三日而成魄四靣而坐以象四時故鄉大夫選其老而賢者立為三賔而立介以輔賔立僎以輔主三賔之外年高者為衆賔六十者坐五十者立六十者三豆七十者四豆八十者五豆九十者六豆主人親造三賔者之家速賔及介而衆賔自從之主人拜迎賔介於庠門之外而衆賔自入三揖而後至階三讓以賔升主人盥洗揚觶賔與主人升堂主人北靣再拜於阼階之上曰拜至拜訖洗爵而升賔再拜於西階之上曰拜洗拜訖賔又拜於西階之上以受爵曰拜受主人拜於西階之上以送爵曰拜送賔飲酒既盡而復拜曰拜既然惟待三賔則然介之禮省衆賔又省主人尊賔故坐賔於西北而坐介於西南謂天地嚴凝之氣始於西南而盛於西北體天地尊嚴之氣以表賔之尊嚴也主人坐於東南而坐僎於東北謂天地溫厚之氣始於東北而盛於東南體天地之盛德以見主之仁厚也故曰四靣之坐象四時也其禮則有祭薦祭酒嚌肺啐酒卒觶致實之目其樂則有升歌笙入間歌合樂之即其官則有司正之職其儀則有賔酬主主酬介介酬衆賔之序而終之以沃洗又終之以說履升堂飲酒無算然後賔出而主人拜送為禮之終序矣蓋飲酒之初皆立而行禮未徹俎故未說屨及旅酬沃洗既畢降階而說屨徹俎而坐堂行爵無數至莫而不廢事故經曰節文終遂安燕而不亂也黨正飲酒則一國若狂無不醉矣樂歌之節其始則樂工入升堂歌鹿鳴四牡皇皇者華每一篇而一終謂之升歌三終其以吹笙之人入於堂下奏南陔白華華黍每一篇而一終謂之笙入三終其次笙歌既畢而堂上與堂下更代而歌堂上先歌魚麗則堂下笙由庚堂上歌南有嘉魚則堂下笙崇邱堂上又歌南山有臺則堂下笙由儀謂之間歌三終間者代也謂一歌則一吹也其末則堂上下歌瑟及笙竝作若工歌關雎則笙吹鵲巢合之若工歌葛覃則笙吹采蘩合之若工歌卷耳則笙吹采蘋合之謂之合樂三終然後樂工告之樂正樂正告之賔曰樂備工遂下堂而出乃立司正謂樂既備賔欲去為有懈惰故主人使相禮者一人為司正以監之將留賔而行旅酬也其用詩之意則嘉魚者取其以禮下賢者賢者纍蔓而歸之與之燕樂也山臺者取其愛友賢為邦家之基民之父母既欲其身之壽又欲其民德之良也由庚崇邱由儀今亡未詳其義愚謂必亦取其萬物得宜如魚麗萬物盛多為太平之世可以待賔而興禮樂也賔必南鄉介必東鄉主人必居東方謂獻酬之際主人將西賔將南而介則瞷其間也瞷音間厠之間竊詳鄉飲大㫖主於尚齒尊賢以厚風俗以明政教而已古人歲歲行之以為常後世間一行之以為異即見今之不如古矣淳祐丙午歲建昌嘗一行之時則郡守王公侑為主人今六十年再逢丙午部使者始令再行之其難如此宜乎尚齒尊賢之風不接于耳目而民俗日偷也孔子曰吾觀於鄉而知王道之易易也夫王道大矣夫子乃因觀於鄉飲而知其為易何邪孟子曰堯舜之道孝弟而巳矣二帝之道猶不過於孝弟况王道乎宜乎以此為易易也鄉大夫三年一獻賢能先與之飲酒則宋代鄉舉鹿鳴宴蓋鄉飲之遺意而其廢又三十年并此意不復得見矣古人制為此禮法天地象日月三光四時至詳且重亦有過於煩縟者則拜至拜洗拜送拜既之類是也謂宜於親速賔介迎拜於門三揖讓升堂之後稍節其拜則簡而不倦矣且今一舉禮其費甚夥有司以為病不知古人歲舉此禮費當何取當考大德丙午歲閏正月間盱庠奉憲令將以姑洗行鄉飲因考古而議其略若其詳則見本義策問四問易曰積善有餘慶積不善有餘殃書曰天道福善禍淫又曰作善降祥作不善降殃聖經以善惡判禍福理也先儒謂其言兼報應何也大學曰貨悖而入者亦悖而出理歟亦報應歟報應釋老之說也聖賢不廢歟有曰報應若有神司之者纎微必察誅賞不違何冥冥之擾擾也此殆以人事擬天道固不足論或曰禍福無不自巳求之者惠迪吉從逆凶惟影響人自為之天理順逆之分即人事吉凶之判是矣而亦有為善未必福為惡未必禍者何居或曰善惡未熟爾熟即驗矣審如是顏子之善不熟乎何其夭且貧也盜跖之惡不熟乎何其壽且富也不寧惟是鄧攸棄其子而全兄之子亦可謂篤於善矣無兒之悲使人流涕張湯杜周酷虐何可當也而乃俱有良子且爵位尊顯至建武杜氏爵乃獨絶史謂蹟其福祚元公儒林之後莫能及蓋訝之矣善惡之驗竟如此此君子所以憤天道之無知撫遺編而浩歎也羣疑滿腹願從諸君質之二問古者仕進之途蓋非一矣周以鄉舉里選為正途至漢則孝亷賢良明經唐宋則詞章科目皆正途也然其間有以資進者雖由徑亦多通顯何歟輸財助邊納粟應令猶為有說進瓜果人亦官之何義歟宋待進納者最有節不過假以浮名使由場屋特優其取豫差易進身爾不使驟入流品也非公私兩利者歟無亦曰多田翁捐所餘數百斛計直幾何即獲與正途常選齒不䙝吾名器歟一蹴而躐升則彼之賢勞鞅掌積日纍月者得無觖望且寒畯乏資者復何由升歟自古奔走才能鼓舞豪俊惟名器爾昔有以官頗易得人思僥幸為世道憂者非以其輕名器歟懼其輕加裁制焉將以抑奔競也或曰昔嘗急而求豫矣今若此不慮後日復有急乎吾將微奬以示其信虛榮以慰其求則又曰數且夥其輕猶故也將若之何敢問三問學者之於書致疑多矣大者未易悉數也略舉其細有言語背馳者有紀載失實者有稱謂差殊者試與諸君商之夫子曰言忠信行篤敬子張書諸紳言行之重如此而孟子乃曰大人者言不必信行不必果異時夫子亦嘗以言信行果為硜硜之小人是言行不足為重矣無乃言語之背馳歟門人曰子罕言利與命與仁利與命夫子誠罕言至于仁則屢言不一言未見其罕也無乃紀載之失實歟唐虞夏周國號主一未見其有二也繼夏者殷宜直曰殷而已然詩既曰殷士膚敏曰殷鑒不逺矣乃有時而又曰商之孫子曰肆伐大商書既曰殪戎殷曰勝殷殺受矣乃有時而又曰商郊牧野曰商王受是一國而二號當時之人不知何從梁本魏也孟子之書易魏曰梁而齊晉則異乎是何於魏獨然無乃稱謂之差殊歟三者雖淺近其疑則一敢問四問理莫難明於鬼神矣謂為無邪傳曰幽則有鬼神謂為有邪孰從而究其迹也夫子曰焉能事鬼不過謂其未能事而非以為無也子不語怪力亂神不過不形之言語而非以為無也蓋有之矣然求所以有何其茫如邪畫歘嚘嚶世固有之抑以理而推有形而後有聲曰有聲矣必附於形形何在歟曰無形矣聲何所附歟好言鬼神莫若左氏世多譏其誕至伯有之事又何若是著也然歟否歟審如是可謂之有矣乎中庸謂洋洋如在其上如在其左右如之云者其有無之間耶智不足以通幽明之故願袪其疑詩說至元辛卯秋豫與故友易雪崖閒遊南城鄉至歐橋訪小溪周文郁名從周淳祐丙午中鄉舉因過坡下訪綵野黃衛道名闌登科仕為興國軍通判除槯院就往金溪縣之曾坊訪平山曾仲材名子良咸淳戊辰登科仕至嚴州淳安令三先生者皆豫舊識也前修雅望綽有典型從容說詩各得一論足以補後學之闕漏今二十有七年矣雪崖翁壬辰歲先逝三先生亦相繼仙去宰木俱拱惟豫僅存而亦年近釣璜懼來日之有限前聞之易亡也因托其說載家集以示吾孫小溪翁曰昔在行都訪白雲趙宗丞參詩法因問何以有盛唐晚唐江湖之分趙公曰此當以斤兩論如齊魯青未了如乾坤繞漢宫如吳楚東南坼如天兵斬斷青海戎殺氣南行動坤軸如白摧朽骨龍虎死黑入太隂雷雨垂等句是多少斤兩比風暖鳥聲碎日高花影重即輕重見矣此盛唐晚唐之分江湖不必論也已而訪蒼山翁曾子實以趙公語質之曾謂趙公言是適有一客從旁竊笑心怪之而未敢叩異時徐問客何為笑曾公曰有故蓋白雲之說雖當顧其自作則起末皆未是客之所以笑也文郁請問歌行曾公曰凡歌行止合以老杜為法其後又謁看雲翁黃希聲參詩黃公簡默莊重不事莊辨止云詩止如此做做來做去到平淡處即是又曰詩貴平淡做到此地位自知耳三詩人之所以語小溪者如此小溪以其說授豫白雲諱崇嶓字漢宗居南豐之東門嘉定壬午登科仕至大宗正丞卒于朝有子雲舍仕至撫州太守蒼山諱原一字子實居寧都金精山前仕宋為南昌縣丞看雲諱文字希聲淳祐庚戌登科居建昌城內仕至浙西提幹舟覆于嚴州城下遂溺死豫訪綵野黃榷院年八十有四矣精健不衰氣象溫雅有乾淳遺老風致忠厚之味藹然從容談詩有曰詩貴平易自然最要血脈貫通有倫有序因舉梅詩牆角數枝梅云云又舉月詩騰騰離海角云云此二篇血脈貫通次序不差是一樣子也越二日往金溪訪平山曾公作詩多雄健於近世詩深取蒼山翁且云少謁蒼翁於行都翁曰君作豐大合作顛詩一番然後約而歸之正乃有長進問何謂顛詩曰若太白長吉盧同是已然性不喜為此體竟不果學今老而思當時儻不以已見橫於胸次而從前輩之教用工一畨則吾詩當不止此歎息久之豫以諸老前後言語參玩乃知前輩作詩俱有節度如今人率爾五七字湊砌成章遽名曰詩宜其不足傳矣學不廣聞不多其何能淑豫竊愧夫造詣之不深而又慮夫前世之不傳故纂其所聞以為詩說也日或嗣有見教者顧雖老憊猶願讀書延祐丁巳重陽日記於東軒記安晚二字顏蠋與齊王游食必太牢出必乘車妻子衣服麗都蠋辭去曰玉生於山制則破焉非不寶重也然而太璞不完士生於鄙野推選則祿焉非不尊遂也然而形神不全蠋願得歸晚食以當肉安步以當車無罪以當貴清淨真正以自娛宋丞相鄭忠獻淸之晚年倦祿自號安晚蓋取諸此東坡嘗謂戰國之士未有如魯連顏蠋之賢者也然而未聞道也晚食當肉安步當車是猶有意於肉與車也晚食自美安步自適取於美與適足矣何以當肉與車為哉坡翁此論尤高但蠋蓋有為而言之與曾子彼以其富我以吾仁彼以其爵我以吾義一例亦不害其為聞道也水雲村稿卷十三
