body:
  text: 水雲村稾巻二元劉壎撰碑參政隴西公平宼碑大元運神武以制六合任仁賢以福諸道江南既平閱十有七載南北一家烟火萬里海澂嶽静風恬日熙彼有負險阻萃淵藪嘯呼萑苻或一二見不旋踵而崟㩻以平杌隉以寧由皇威丕暢遐邇率服厥亦惟蕃得人綏靖有方方式克至于今日休至元二十有五年畬宼鍾明亮起臨汀擁衆十萬聲揺數郡江閩廣交病焉猱健豕突草萎木枯血肉填谿谷子女充巢穴有㫖進討輒僞降以欵我師明年邱元起廣昌與明亮掎角彌漫浸淫遂及我豐豐民素弗貳顧力不克拒則有被脅而從者焉勢張甚又明年春賊大至陳河田陳九陂又陳小萊鋒交熖熾勢益張遂犯州州南門實闞江賊乗橋攻門是時諸軍甫集出營黃原城戍單弱蕃垣蕩夷事且急乃斷橋以拒之守兵飛矢露刃州民擿瓦投石適雨暴江漲賊阻深引退既退勢猶張焚戮村落亡虚日州惟閉闗自保雲沈雨凄官民惴危老穉悲戚救我者誰一日隂霾劃開天宇澄霽則叅政李公來號令新和氣回軍聲壯風采肅乃啓城闗乃發倉粟乃寛刑辟乃緩商征政有便民者罔弗舉民始有生意賊亦望風鳥獸散於是責官吏以招來分師旅以討捕悔過宥之負固誅之州境畢清則率諸將擣邱元之巢殲其渠離其黨輯綏其流亡振旅還州州人香旗歡迎感極且泣曰生我者父母全我者叅政也自邱元敗而明亮孤不數月賊悉平嗚呼公之功偉矣公端人也其仁如春其淸如氷其誅賞公平如權衡其在軍中手不釋巻雖羽檄紛馳猶崇學校修祭禮非其本領正識慮明曷克若是昔公先太保武愍公來救旴旴民嘗刻碑府門今豐之危視旴彌甚而公之德視武愍有光焉是宜碑顧碑亦未足以彰公之德也陵谷遷易此德不磨日月晦冥此德不掩肉腐而骨骨朽而土此德不㤀屹两碑以相煇垂千載而有永姑借是以寄邦人之思公名世安號龍川家世河西徙居燕為江西等處行中書省叅知政事有年矣勲名著聞新膺特㫖因任云頌之以詩曰維元受命誕揚厥武有偉混一卓越曠古東洋西崑北漠南溟星拱雲從疇敢弗庭蠢彼汀畬乃作疥癬蚍撼不量虺毒肆吮暴骨成邱流血成川浸淫旴豐釁積兵連宼環于疆孤城岌岌幙燕釜魚孰紆其急德人惠來遂活吾豐其人謂誰参政李公威惠翕孚謀斷兼足國手雍容立整敗局昔公未來民與死期公既來止和氣春熙昔公未來嘯阻篁竹公既來止妖氛夜肅㓛成而東舟載月明父老太息孰如公淸公恩弗替人思弗已紀德于碑名父名子豐峯峻極旴水深長我士我民千載靡㤀豐郡三皇廟碑鴻濛分天地位貞元絪緼之氣旁薄鬱積而無所泄有聖興焉是為大皥氏逮夫停藴寖乆貞元復㑹即有火土之瑞者出焉是為炎帝又為有㷱氏世俗苐稔聞璧合珠聨口誦習熟謂伏羲神農黃帝實接武以相繼逮考古志乃世之相後先殊逺由黃帝溯神農中間相去已三百餘年又溯而上之葢不可知亦悠逺芒芴之極矣而三神人者或顯卦畫辨隂陽以露神機或嘗百草品藥性以開醫道又或著醫經制鍼法以救民生俱能夀斯人欲絶之脈補造化不及之功世咸尊稱之曰三皇三皇於江南故未有廟至元混一令郡邑俱建醫學始立廟南豐繇縣陞州二十載猶未廟也春秋祭朔望拜率僑寓于館驛于佛堂僉曰弗稱顧卒無念及者太守隴西公之來也謂此弗祀非所以承詔令尊聖神得故主簿㕔廢址於州東北隅卜之食誅茅運甓募匠市材捐已俸率醫人致助大德庚子春始構創中為正殿旁為两廡外為醫學門又外為櫺星門明年廟成衛以梐枑環以垂楊甃砌潔整丹堊明煥三皇塑像南嚮四正繪像東西嚮公常躬程課無倦意月朔望公常躬奠謁無廢事命醫官諸生審究脈病證治交暢互闡雍雍于于又明年公政成衆慮其久而㤀也請紀諸碑予嘗嘆流俗淺識類目醫為技術乃未知醫之濟世功配天地何也天地生人而不䏻使人之無疾人而疾籲天天漠如也叩地地黙如也疾弗瘳則必反而求諸醫醫得人焉則痿痺蛘痛者止羸瘠者盛壯而垂絶者不死也曰㓛配天地非邪厥亦惟三神人者發天之機啓醫之教然後雷扁和緩仲景華陀叔和思邈之流與凡厯代名醫得以繼作迭興極神聖工巧之用救虚實冷熱之偏脈有訣藥有方十三科有傳億兆生靈之命有賴家祀祭而戸尸祝禮亦宜之侯邦實司民命可不祀乎是故太守倡義剏建按令式嚴祀典于醫道有光於禮亦宜余嘗獲從公陪祭清曉班庭中月星朗燿柧桷翬飛覩殿上燭光揺曳靈風肅然獻官盛服端笏降登祼薦如禮羣執事無不恪恭就位訖燔瘞罔敢惰余歎曰盛哉祀繇廟興廟由公興顧未有表顯之者今諸君慨然碑焉益盛己因語之曰廟存祀存即公名常存抑未也繼公者心公之心修完繕飾俾勿有壞廟存祀存亦與公之名俱存諸生曰然其述此以志不朽乎遂書以授之李公名彛字憲甫安次人嘗僉浙西憲事今以奉直大夫知州事云係以詩曰三皇聖神開天建極肇基醫道躋世夀域洗疴濯痼植仆膏萎造化同功萬國祀之自豐曰州醫未興學賢侯涖止新廟是作廣殿崇陛威顔凛如生徒在廡時講方書廟千萬年名與俱乆勒詩堅珉式克勸後大田廣佑王廟碑廣佑王發靈樵郡之西乾其廟于旴江之鯉湖嘉禾之聿水之大田則支分者也王歐陽其姓祐其名隋時為温陵太守受代歸舟次大乾而溺因𦵏焉地人遂奉之為神受王封列祀典世傳其溺時事特異余不䏻述述今事而巳大田之祀葢自魯氏始旱澇宼疫禱輒應往紹定己丑嵗暨至元丙子歳著靈尤偉妖氛以清生聚以完賴王之佑且數十年顧祠弗建羣心鬱焉魯之族恊謀由馬鞍山遷祠于村心富者捐貲粟貧者輸力役經始于丙子之某月落成于某年某月里中士侯君在復為之加丹雘峙閎墉猶以為未惬也謁余文記其事余惟聖門家怪力亂神不語余亦安知夫世有降靈附語帕首曲踊遂號之為神者余獨證諸實理即傳有聰明正直依人而行之説在曰神矣無形體無聲臭也隂房鬼火古木鴉聲晝歘杳冥黙若響答者何居曰人耳人而神則神也又何居曰心耳是謂神舍是謂靈府豚蹏盂飯俛伏呫囁叩若應視若臨庸非吾方寸妙用實為之而荒庭古屋繪形象偶直其寄也今夫大田之地不接于西乾王之馬足不踐于茲土乃肸蠁著明之若是無亦人賴神而安神因人而靈人心信奉之弗替即廟祀亦千載勿替可也大田之人勉乎哉若夫侈神之靈有貢士侯君舜舉之述在余故不書特為賦樂神之詩使歲時歌以祀云詩曰大田之山兮青青大田之水兮泠泠神其來兮駕西乾之雲息兵兮殄疫時雨暘兮多稼無蟊螣有永千秋兮于兹廟食鼓坎坎兮舞蹲蹲帣韝鞠􅎽兮羅薦芳馨神人相依兮百世是承貞元萬夀宫碑道觀僊宫有甲于南豐者曰貞元萬夀葢故靈都觀也其初則魏真人元吉祀𤣥女肇建觀號貞元於宋治平中改賜額號靈都於今則大德庚子歳陞觀為宫仍靈都貞元之號而加萬夀焉兹其建置沿革之大畧也其址則據州治之東挹江山倚闤闠夷曠軒豁爲諸觀宗其派則支分於桑田而建觀者號長生又分於石谿而建觀者號棲真甲終乙繼咸祖靈都兹其始基與析派之大畧也慨思往昔觀闕岧嶤像設儼肅徒侣無虚寮而經誦罕暇日盛哉久矣孰知夫丙子刼運南北兵交金文玉字還于大羅月地雲階幻為焦土僅存者寥陽一殿爾環顧闃寂惟覺景之異心之悲則有隴西冲真師出而拯之當榛磔荒殘中鞅掌儀圗誓復舊觀願力感夫神靈誠意動夫檀信由至元戊寅訖大德戊戌是營是度弗完弗已卒䏻俾修廡翼如端門屹如三元殿羣道寮整如即今之碧甃丹楹雕珉藻棁昔之斷礎荒烟燐螢棲息者也今之昬鐘曉鼔香薰燼煇昔之空庭日永人物罕景者也兹其興衰復古之大畧也師服勤至矣乃思長生為觀實我同原顧穨靡弗修乆即益圯於是欲加葺完而命其徒李以觀嗣焉復念棲真煨燼則命其徒謝庭芝起廢焉一宫二觀鼎峙崇隆論者無不多師之功余亦謂師誠有功也一日其徒來前曰吾師之功信然矣後千載孰有知其然者乎干文施垂不朽以觀夀也敢請吾聞聖經有曰人䏻𢎞道又曰苟非其人道不虚行然則人其道樞矣乎非宫曷闡是道非人曷興是宫吾故為師著之復作詩以侈之師名逢慶字冲真厯本郡道正今提舉本宫為道教首詩曰溟涬寥廓大道之原其宏也人昭晢天淵於皇𤣥元教衍億世彌乆彌昌惟其有繼曄奕真宫誕鎮吾豐昔何靡靡今何崇崇門闕穹華徑塗坦闢琁題干霄金鋪燿日僊真列班天丁衛閽威鳯盤旋騶虞徼巡西掖專祠𤣥女吕祖两廡分祀百靈疏附瑶壇整潔琪樹鬰蒼人靜月明笙鶴來翔霞服星冠朝真禮斗磬挾風清皷騰靁吼誰克登兹惟冲真師劫運際逢身翼衛之啓後光前流煇著譽繇師願力威神協助恢衍遺派長生棲真由師指授繕飾咸新衆庶罔㓛帝德天覆老臣稽首永祝聖夀水雲村稾巻二
