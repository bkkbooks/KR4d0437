body:
  text: 水雲村稾巻十二元劉壎撰祭文代祭陳樞密文嗚呼鉅人長德孰盛盱邦猶洛社英巍巍堂堂宏頤二老淸節直氣朅来太晚弗逮執摯惟矩齋翁如魯靈光亦復不久歸白雲鄉猶幸千峯作擎天柱魁樞正明風悲䪥露公有鴻文寛平且柔儼類其人冠佩優游公有達識著龜先見斟酌肯綮與世舒卷公有盛福四顧鮮儔富貴備矣澹若無求嗚呼四願之疏世許以正晚節告君人心天命五羊之歸南物不擕明月滿舟見者嗟嘻心懐魏闕老益弗釋匪為衮裳為國一出古音拙出必調鼎乃遽騎箕造朝幾何丹旐翩飛僕也何人適仕洛社屢瞻履舄布武堂下幸依耆雋驟失典刑傷嗟諸老接踵凋零公之不出世遺感矣亦既出只哀哉止此椒漿桂酒敬酧一尊公兮歸來為歌招魂為吾母祭舅文嗚呼人生至痛莫如逆境以老哭壯情何能忍兄弟同處踰六十年如足如手曾無間言我遷郡城相距百里山川雖隔心則孔邇旬無音信我思懸懸豈其病邪憂慮萬千避難來歸幸聚匝月憐汝病深我心如噎尚期小瘳怡怡優游竟夢一枕長往弗留我老心孤望汝送死豈料此歸乃反哭汝嗚呼兄弟四人今䘮其三老懐悲酸情何以堪我有疾苦毎告吾弟我有肴核亦毎逺寄凡得汝書我再四觀我書復汝聞汝亦歡汝常來城惟恐汝去汝别我歸我泪如注而今而後永絶往來望斷天涯獨雁聲哀三奠永決傷哉倒置桮中之酒皆吾之泪自祭舅文嗚呼幼依侍側事公如父公雖方嚴視甥猶子歲在丙寅甥方締姻蹟則異處情誼益親戊辰如城公不忍别我每思公音問不絶公實愛我凡事必咨我毎感公奉承弗辭去臘兵戈避地還里復欣侍公公則病矣公雖伏枕見我輒興口不能言心若歡欣公疾已亟猶顧謂曰以藥救我世無盧扁遂隔古今我實負公痛悔彌深思公平生淚不可忍公如可贖何愛九隕垂三十年甥舅圑欒永懐公恩令人心酸放牛馬走為助䘮望報公止此逾覺悽愴素車在途丹旐在門高堂空空誰能反魂一尊永決灑泣釋手哀哉此酒能復飲否祭母文嗚呼母子團欒四十餘年母今往矣兒無母憐兒憂誰知兒病誰臆生我劬勞欲報罔極念昔幼日孤寡㷀然撫育成人酸寒萬千孰知此悲惟毋與子兩心相通何間生死母恩甚厚母望甚深兒學不達莫慰母心養志多虧媿負吾毋兒罪通天天誅以斧日吉時良歸於髙岡母不可留兒割肺腸母子平生決兹一奠哀哉痛哉泉下相見祭涂教授文名清甫惟公古心直道碩學雄辭臯比儼臨士喜得師共期三載教雨其滋天乎奈何奄忽止斯悲夫藥餌缺於奉侍棺斂出於有司雖定數之莫逃亦人事之多違内交一年荷公心知遽隔幽冥泫然傷悲沿檄承乏暫踵蕭規祖奠柩前檥舟江湄家山匪遙魂兮來歸已而已而哀哉已而尚享水雲村稾卷十二
