body:
  text: 水雲村稾巻七元劉壎撰題跋家藏太宗御書賜盧多遜太宗皇帝御書敦朴為天下先六字遒勁醖藉雖工書者莫及且立國之初便以敦朴為務葢知所先後矣宗社命脈由此出彼盧多遜何足以知之度皇御批令㫖付藏一所有陳世崇詩文稾都好可再簡幾首來在來日定要千萬千萬四月五日辰初批付陳藏一御押恭惟度宗皇帝聖學緝熙垂衣而治為咸淳太平天子者十年此其在東宮時令㫖也盛年潛躍無園囿狗馬博塞之娛獨汲汲斯文豈漢唐末世昬主所及葢列聖相承以古文為家法然爾宸毫飛動􅅅牆如見萬世其永寳之惜也不遇園綺羽翼乃下訪藏一父子之卑陋不遇伊呂周召為輔乃仰成於亾國之似道嗚呼悲夫跋安子文丙楊子淵巨源誅吳曦矯詔詔曰敕門下惟干戈省厥躬朕既昧聖賢之戒雖犬馬識其主爾乃甘仇敵之臣邦有常刑罪在弗赦太尉昭信軍節度使利州西路安撫使興州駐劄御前諸軍都統制四川宣撫使兼陜西河東路招撫使吳曦早馮世祿久綴朝班以其為三朝忠孝之家必無反側故授以四川宣招之柄俾䆒設施乃陰結於敵人遂竊窺於神器將士成功而吝賞搢紳獻議而弗從委棄四州焚燒積聚廹脅多士列置官僚僭名號以自居裂衣冠而不恥既挾干戈而背君父且盗疆土以予冦讐静言思之孰可忍也彼敢效敬瑭劉豫之作朕寧無絳侯曲逆之臣自奏報之忽來即寢食之俱廢痛心疾首拊髀噬臍不圖家賊之難防遂使蕭牆之遺患尚賴祖宗德澤之未冺與夫軍民心志之未離况今江南諸軍巳著平淮之勲業眷兹坤維列郡寧無思漢之謳吟想皆左袒以為劉咸思舉笏而擊泚隨軍轉運安丙可特權四川宣撫使陜西河東路招撫使招集義士誅戮叛臣有能仗義以奮呼即與旌忠而顯擢王封節鉞次第褒嘉庫藏金貲盡皆錫予於戲趙奢之有趙括猶止殺身霍光之有霍雲豈期滅族慨歎勲庸之後尚存涵愛之仁吳曦一門凡附於逆黨者並皆誅戮其餘脅從置之不問除巳命帥分兵西討外故兹宻詔想宜知悉右安丙楊巨源誅逆曦矯詔也建紹中興二吳有大功於蜀蜀賴以存者百餘年曦以世將墜厥勲名是時朝廷無事邉隅解兵遽聞警報俱失措巨源益昌人以右選為忠州管下合江之倉官宻與丙謀舉義此詔葢彭子申所草或曰白某竟用合江倉印誅翦逆儔再造四蜀廟堂方議西討而㨗書至矣朝野動色夸頌雋功丙由是擅勲名極富貴以終其身此舉實自巨源發之乃遄為讒疾所殺然區區一倉官能作如許事信竒特哉細讀此詔至今凜凜有生氣題李翰林像錦袍玉色神游八極真崑閬蓬瀛中人落月照梁誠非虚語醉眼一視殊有傲睨萬物態似是金鑾灑墨命力士脱靴時貎也跋顔平原怗魯公筆法妙千古戲作草楷俱自成妍今觀此帖凜有生意豈忠義梗梗散入翰墨故與天地相長久邪其怒筆處令人毛髪俱竦想見呵叱李希烈臨死不屈時氣象題干祿字書晉以前字書醇樸至右軍首出新意盡變古體如神龍駿馬超妙入神故千載而下以王書為第一厯六朝而為隋唐書學日靡穠纎競勝魯公出而救之盡本古意一變至道如純金美玉見者貴尚故千載而下又以顔書配王書俱為第一書家謂數百年之間質文相救惟此二賢而巳然魯公之屋漏㾗即右軍之錐畫沙同出一法各極其工是故欲學王請自顔入跋石洲詩巻余嘗從耕桑隴上見耋穉追隨熙熙然鼔腹以游又嘗經叢市别村遇元宵鐙火鼓吹歌舞毎恨真趣佳景無能摸寫今閲石洲詩巻風味何甚似也富哉詩乎石洲不自李杜更求贈言余生幾年猶未知學詩也何言抑嘗聞之師曰詩不易作亦不可苟作且當使胷中有數百巻書韻度不俗乃可下筆子歸試取六經子史精讀之又取諸傳記百家雜説博讀之又取騷選陶韋柳與李杜盛唐諸作國朝黃陳諸作熟讀之山谷先生所謂用一事如軍中之令置一字如闗門之鍵涵泳變化優孟似叔敖矣子若然吾言士别三日更當刮目否則請謝曰卿自用卿法云景定甲子時公年二十五九皋蒼山詩選後九皋蒼山兩詩翁生同時學同志吟同調者也皋之詩少於山而工過之其清峻不塵大略相似而風骨勁峭興味沈鬱則龍翁鐵笛似勝湘靈鼔瑟知音試其評何如跋阮子良孤嵐集流水村中秋風落木無聊賴時讀阮君孤嵐絶句如初月出雲新篁解籜明潤不塵可與言詩巳矣由是而之焉軼四靈軋半山並唐人無難也余尤愛其集中句如中秋云今年看月依前好一片清光總屬誰聞鶯云清吟不改平生調似笑南人學北音嗚呼是又未易與俗言可為痛哭流涕者此也甲申仲秋跋時公年四十五題古心文後古心先生江文忠公文章名節重前朝淳祐中彈擊風生號真御史今讀其文想其人正自凜然故吏部侍郎矩齋曾公嘗語予昔丞都昌日公新擢第授池陽敎授歸里識之軒然魁碩氣葢一時嘗廣坐劇飲大醉吐卧茵席上巳而醒醒復引滿縱談也曾公稱子逺豪士豪士噫是固偉然者而今巳矣予幼獨酷好公時文毎見一篇熟玩不釋夢寐猶記今見公古文尤喜手鈔焉要之萬世不朽者不在是乙亥畨䧟公誼不辱自投池以死逺近忠之葢近年進士為宰相能守節作全人者二人焉潔然清流而不汚者公也毅然朔庭而不屈者文山公也安得聨二公之文而題之曰宋朝大忠集丙戌八月十有八日謹題時公年四十七書南居陳君丁亥集後天地為鑪金石並流時南居詩伯以丁亥集示展讀覺清風徐來怳然坐我水僊府也風雅宗㫖古今世變君皆探賾造微妙入梱域故為古為律愈多愈工獨嘗以用兵觀詩淮陰漢大將以背水一戰傳公瑾江東豪傑以赤壁一㨗傳謝安石風流宰相以淮淝一勝傳傳者不以多也中其􅈕綮以是收名定價有餘若項羽之百戰百勝陳慶之之四十七戰皆㨗䆒其所就視前二三子何如衆皆羡君之詩多而工僕獨願見君之詩工而少也世有識者當曰雍之言然題曾厚可詠春集擺脱江湖窠臼接續大厯元和氣脈前十數篇無可擬議近後間有渉俗境者恐當删去使少而精乃善昔雲舎桂舟論詩時僕嘗得周旋其間當日二公若見此編亦當與君分席雪笠詩跋雪笠翁曾元伯詩精麗妥帖各當其體而樂府尤工琢句如長吉鎔意如飛卿殆駸駸逼籍建校今同社夫誰與敵輒為料簡令兒軰鈔焉而元伯方徵予評其詩予曰古體乎唐律乎抑樂府乎古也律也予雖不武猶能出偏師陳平原為魚麗鵝鸛之勢與君相當否則短兵接戰未知鹿死誰手樂府也予有深溝髙壘偃旗仆鼓而巳君當上馬掀髯揺手曰不戰而屈人兵矣因相與一笑而還其帙南居五志跋日予觀南居四志羡其詩工且多别財半年又觀五志則彌工彌多彌可羡予自别君埃氛滃結清趣枯落强吟不上十數篇甚矣吾衰也抑君航南浦帆螺川皋比鷺洲水竹間江雲送迎山霏映罩宜詩思如百川之赴海若予者乃且龜縮蓬茨下日惟見咫尺天與熟靣谿山草樹顧吟思何許得來因念史記一部在天下名山大川非誕妄也韓將軍多多益辦彼不過能將十萬者非特羡爾且將媿之巻錦以還敬志歳月己丑五晦時公年五十李梅谿燕臺吟跋潭州人梅谿詩秀句層出不染塵土更豎風骨使沈著痛快味深以長則騷壇百級人人左次讓先登矣然其人極髙誼憐才居然有湖海襟度雖微詩猶將使人愛重之不巳况吟筆如許哉今客燕雲彌使人逺想竟日月厓吟月稾跋月厓范君去非被服寳璐雲行太虛俊頴勝特宛若晉宋間人宏齋包公嘗稱其精神如鸞鶴風韻如飛僊與予為文字友十餘年死别且二十餘年思其人味其詩古體肖古唐體逼唐清麗圓活言言冰雪今世以詩鳴者喧啾聒耳何曾有似吾故人者噫茫茫九原愛莫起之歳在癸巳孟陬月歸自鍾陵杜門謝客因閲吟月稾書之猶想玉立翛然如在其左右時公年五十四跋朱梅邉西湖欵乃集日落雲昬西窻翦燭玩梅邉欵乃集正似出涌金門行湖光山色間柔風媚日畵船細柳開元事分明在眼展轉三復情致流麗句律妥熟奕奕有富貴氣非三家村中夫子語葢治世之音如此視唐人挑野菜摘山柴氣味萬萬獨惜未見蘷州以後作也噫此士落江湖熟思令人癭琴泉詩稾跋扁舟載愁寒水四碧予晝卧白雲堆中正恨無可人共語臨川鄧德光以琴泉集來意特快甚客謂德光灑落人也喜接四方豪俊㸑尾三尺雲根一泓日陶寫得天趣宜其詩和平無暴氣清醇無險語儻更振纓濯塵入悟境奪活機世間好語盡當奄有少陵曰讀書破萬巻下筆如有神天風雁翎新句頻寄畫梅跋寒梢凍蕊居然奪真華光補之復生不能敵也一客從外來徴予判斷予曰形神俱妙只欠香耳客笑曰此語雖癡此畫妙矣象山語類題辭象山先生陸文安公語錄一冊遺訓二冊門弟子各為編次語多複出幼兒為倣晦翁語類分門鈔纂然後複出者乃盡見而刪之始稍可觀壎三肅而歎曰先生真天人也單辭片語洗凡破陋其英悟超卓足與孟配顧其學不如朱學之盛行者葢先生不夀文公則髙年先生簡易不著書文公則多述作先生門人不大顯朱門則多達官羽翼其敎是以若不逮而䆒其實則天髙日精千古獨歩文公有言江南未有人如陸子静八字著脚誠哉是言今世道更時好泯公論且定矣陸氏之學將大明於世彼薶頭書冊尋行數墨尚襲故説以詆先哲則蚍蜉撼樹井蛙觀天者爾嗚呼悲夫題曾留逺作陳遂初墓志後管幼安避漢末之亂渡海居遼東三十七年乃歸歸而隐於田廬不受魏命年八十四而歿史稱之遂初陳公亦避亂安南竟客死不得歸哀哉公為太常寺主簿時輪對一疏譏切當國賈似道惡之棄官去當時巳稱重名節曾公雖與之俱避地然大節殊不及殆似老韓同傳題趙大年小景此大年趙氏所作小景也秋蘆鴈集雪柳鵲棲雖縑素故暗野意依然天家公子多才蓺可愛哉玩斯畫懐斯人想斯時為之凄然廢巻劉春谷行稾跋讀春谷文贍蔚中竒崛錯出如陳列平原魚麗偃月部勒嚴整乃時出竒兵張兩翼繞出匈奴後讀春谷詩新意湊集而氣脈端正上接風雅如鈞天廣樂故是僊家節拍至八音諧處真可令鳳儀而獸舞予幸三年宮槐泮藻間日常快讀讀竟予輒謝曰退三舎服矣其行也索予評予就徵所未見君出行稾使讀且笑曰賣菜乎求多也予曰不然旌節吾自有之直要長安本色因復一笑而書之大德壬寅菊節跋時公年六十三題楊妃齒痛圖昭陽殿裏一齒痛馬嵬坡下一身痛漁陽鼙鼔天下痛昔人以此評太真齒痛予愛其語俊拈出共賞良工善丹青者能併後二痛總作一圖垂鍳萬世即此圖不朽題懶繡圖晝長院静孤倚繡牀放下金鍼支頤似病此畫手堪入妙品抑予嘗寳一圖曰伏女授書孟母斷機又一圖曰木蘭代戍凝妻斷臂今亡矣未知校此孰勝也客謂予毋多言且為此圖賦詩手託香腮倚繡牀一庭綠蔭映紅牕停鍼脈脈知何意欲刺鸞凰怕見雙屯田貟外郎劉公敕黄後跋中書門下牒鄉貢進士劉嘏牒奉敕宜賜同學䆒出身牒至准敕故牒景祐五年三月日牒工部侍郎參知政事李右諫議大夫參知政事王尚書左丞參知政事程戸部侍郎平章事張門下侍郎兼兵部尚書平章事張七世族祖屯田貟外郎廿四府君嘏江樓居士八府君次子也景祐五年三月仁皇御殿親試舉人賜呂溱等及第出身公在其中宋制士人登科即授敕牒以厚黃紙書之名曰敕黃然後赴部銓注給誥授官自是脫韋布而列簪紳矣昭陵以乾興元年壬戌歳二月即位明年改元天聖至是年戊寅距登極甫十有六年宋極治時也公於是時擢科入仕榮慶可知范蜀公鎮是歲為禮部第一人殿廷賜第在七十九名實第二甲尤為一榜之重是月也王陳二相隨佐堯罷政押敕者首相張鄧公士遜章郇公得象也三參政不可攷程疑諱琳是年十一月庚戌帝郊見天地改元寳元而元昊僭號西事蝟興自此為康定為慶厯皇祐為至和嘉祐雖韓范杜富進用而擾擾多故不得如景祐太平時矣中渠宗人十一兄世藏此牒踰二百年雖敝弗失此家寳也出以示壎輒加補完而歸之追想盛時宛轉淒斷大德癸卯孟春謹跋時公年六十四宣德郎致仕劉公轉通直郎誥跋宣德郎致仕劉况右可特授通直郎致仕敕朝散大夫致仕李書等天以八寳貺朕使增重社稷宗廟而為神民主故恭受於正月之吉又推天貺以敷錫百工廼自九品以上進秩一等雖仕而告老者亦與焉惟率德厲行俾里人有所矜式以助朕風化則予汝嘉尚其懋哉可依前件大觀二年十月四日中書令闕中書侍郎臣林攄宣奉中書舎人臣俞㮚行奉敕如右牒到奉行大觀二年十月五日侍中闕太師兼門下侍郎京門下侍郎執中給事中崈十月六日戌時都事康繼隆受尚書令闕尚書左僕射京尚書右僕射闕尚書左丞深尚書右丞闕告通直郎致仕劉况奉敕如右符到奉行左司郎中亮大觀二年十月七日下屯田公四子長曰六府君溉不仕次曰八府君湜皇祐五年癸巳歳三月鄭獬榜進士仕為南劒州都曹又次曰二十府君洵終儒林郎新建縣主簿幼曰廿一府君況通直公也元祐六年馬涓榜授潁州文學八年為寧德縣簿尉崇寧中為泰寧縣主簿久之誥授寧德縣令以宣德郎致仕大觀二年徽皇恭受八寳敷恩四海轉通直郎致仕此其誥也中渠宗人七一兄於通直公為七世孫藏其家寳洊厯世變不失殊可喜誥綾髙闊八寸長近七尺白色小花紋精瑩如新字畫印色亦猶煥然背以皮紙䕶以褐綾有脱落處為粘綴而歸之通直公父子兄弟聨翩祿仕可想當時門戸之盛昔嘗拜其遺像朱衣象簡凜凜如生𦵏于中渠堂封猶突兀葢昔所謂南莊者也因併志之大德癸卯孟春謹跋以示我宗盟之後來者又跋宋制中書造命門下審駁尚書奉行故中書省有舎人主書黃行告詞苟命有不當即不書謂之繳黃舎人書行矣然後過門下省有給事中主讀黃苟命有不當雖巳書亦繳駁謂之留黃葢以維持紀綱杜絶僥濫也故今誥中有三節初日造命則書名皆中書省官次日過中則書名皆門下省官又次日告行則書名皆尚書省官至是乃為成命其付出者左司郎中郎尚書省屬官猶古之丞相掾也其時又有三省同奉聖㫖之法此則命出即行無復論駁意謂三省官同在榻前事有難行一時議定矣因閲此誥併記舊家典故如此宣德郎後改宣敎郎葢論者謂汴都有宣德門臣子宜避故易之題友人詩稾凡作詩天分頴脱加以篤學無不超然與古人並君資質既不凡又自六經以來至諸子百家晝研覃夜鈔纂融䆒通暢宜下筆有神如此若僕則老且病巻旗櫜弓久矣君盛年壯志其亟進師築三受降城使凡學者投戈靣縛僕雖憊猶思洗濯圑華舊袍提偏師從大將旗鼓後君如許我即賈餘勇期折馘摩壘否則三揖而退曰朔方老將風流在不取河西石堡城送法怗與曾原青就跋法帖五帙頗古雅或曰絳也景定中龍興通守雲洞趙公時奚以獻矩齋侍郎曾公趙葢虚齋端明以夫之子精字學有古風巻中朱字其親筆也侍郎公知予嗜古帖轉以見畀藏之四十年今以授其姪孫原青得所歸矣君家所有更贈君其永寳之連城璧勿換也跋平逺樗稾寒雲愁慘中掩闗擁罏聞剥啄亟倒屣一客下馬氣吐如虹乃吾宗平逺翁以樗稾示快展疾讀如玉壺冰露不受纎塵如千峰峭立雲光霞采絢爛五色最妙處擺脱窠臼自作標致江西詩國不為兄築將壇乎前軰有識詩人於庫務中者今亦寧無顧鬱鬱不惬飄然棄去自此詩當大進深入理窟異日寄示續稾僕應反走兄應一笑曰季咸巳被壺邱壓倒矣大德甲辰仲冬聊記歳月且當雲萍時公年六十有五題盗馬圖右盗馬圖盗者七人馬十有五匹追者四人人騎馬一匹人馬態度俱精妙有意惜不著何人筆爾沙場渺莽千蹄踶跂何可邇此媮兒善奪而去若素所控馭無一逸者竒巳然不知追襲踵至又不知描畫詒羞至今也其縶之捽之廹而墜之情狀皇窘正似可憐而亦無足念者世有乗駿擁騶魁岸貴倨而有為亦若是眡此巻將無同安得名筆出新意作神品曰媮兒在此再題代黃雲白草間追風瞥電之狀居然飛動心目其襲逐搏執處意態更活豈畫師前生嘗在其隊伍中故神㑹天得落筆廹真邪雖然昔有勸人勿習畫馬者謂恐墮驢胎馬腹中去况盗乃三戒之首可留情乎若見斯人當喚醒曰急須改蓺休誤他生南豐朱氏家譜跋南豐故多文獻家曾朱為盛曾自沂宻至文定公叔季下逮金谿一派貴胄蟬聨如昔韓呂朱亦筆橐節赫奕明世雖視曾差劣其在於今朱氏雲來猶習詩書别利善如近世道山翁耆艾典刑為里模楷其子德升更秀立傑出世其家聲閲所著世家本末志在光昭足以動孝子慈孫之念名家望族流潤遺芳有不在乎祿爵田宅而清風古氣自有一種令人貴重者豈光祿公種德深長故賢子孫彌逺彌不乏歟嗟夫光祿公以二十五百之錢而能易數代之富貴又能易代代之賢子孫朱文公云天人之際不隔毫釐誠哉是言記予少時行郭西門外見巨木一株蔽芾江滸好事者版書釘之曰朱光祿陰德樹正其捐貲活命之地而海桑既易樹久不存每過其所未嘗不裵回想歎以寄無窮之思而仰朱氏之世德也因併志以補闕大徳乙巳歳日南至時公年六十有六跋王清觀所畫姚玉像併詞景定間公年僅廿餘所賦花間僊集今亦不存王郎妙人貎麗質填新腔為姚華出色諸才子敲金戛玉從之天風何來醒我病目便如坐花前聽檀版因憶景定間老照為旴城諸名伎寫真成軸號花間僊集予時年少與秋潭月觀月厓月林共賦焉今非用此故事乎觀獵心情筆翩翩復欲下顧夕陽在山慨然而廢未能免俗聊附氏名寄語王郎幸勿笑曰汝非西州皇甫規何為恥不入黨大德丁未夏五時公年六十八跋王清觀題洞賓醉桃源像邯鄲夢裏武陵谿春色醉㝠迷花壓帽檐欹謾嬴得紅塵滿衣青蛇飛起黃龍喝住纔是酒醒時和露飲刀圭待月滿長空鶴歸太常引此詞斵冰積雪不翅如自回僊口中出王郎真妙筆也持此見解亦可學僊題五忠侯禮文後予里世事五忠侯甚謹然莫詳所始也相傳侯發靈於南安之五昌峰初有義兄弟五人剛正雄勇俱以忠死死有靈邦人祠於古樟下稱曰樟槎五郎又或稱曰五殤南豐古未有廟宋慶厯間邑宰周公燮家所嚴事為建廟於河東之張公巖時未受封泛稱曰五昌威烈侯靈響赫奕常見虎跡淳熙乙酉秋旱邑宰陳公隆禮迎侯至公庭雨四日周浹為新其祠邑士彭紀為文刻碑焉其後又分靈於西理坊之江濱嘉定中始賜廟額曰靈顯久之始頒五忠之封又久之始加五昭之封開慶己未歳先舅掲公明叔客南安拜其祖廟錄封誥以歸然後知五侯俱有姓名有姓周名安邦者有姓劉名安世者於今不記其全矣咸淳戊辰歳五月洪水決堤西理之祠濱江漂蕩壬申癸酉間徙祠於安禪寺之右今祠是也歳以六月十九日為忠嘉侯生辰咸修慶典而文詞缺州有禮佛㑹嘗邀五侯為監壇㑹友吳居士以予居宻邇求予文莊嚴予侵尋稀年才盡筆弱既不能發揚明神之威烈又懼無以副居士之盛心勉綴蕪詞為一章命吾兒麟瑞書以授居士佛㑹千載而不廢廟祀百世而永存斯文與之相長久矣又記丙子年為侯作籖五十首以應士民之卜祝屢經世變籖不復存里人欲予修理而未能何里人汲汲於此乎并載於此以寄一歎大德丁未六月十有八日書於水村道院時公年六十八跋戴松牛戴牛品入神妙然世逺難得真此巻縑素故暗四牛二童幾不可辨及凝視逺覧居然有趣似春林烟霧㝠濛無限意度殆真蹟邪昧者病其深晦乃不知此畫天趣正在蒼茫杳靄中可以神㑹難與俗言也謂予不信請質之九方皋大德丁未歳為傅君跋所藏巻末系以詩曰誰貌春欄觳觫閑糢糊難認色犂斑庖丁成佛田單老飽卧輕烟薄霧間時公年六十八羅季文詩跋北窻秋静發故篋得蔡忠襄字書一幅明潤婉熟筆意可人正愛玩不忍置忽季文以吟稾示亟讀盡巻亦明潤婉熟趣味甚似此日何日乃二美適相遭如此明日閲書評又見書家最重屋漏痕鐵鉤鎖推為顔筋柳骨即君謨筆意未是止泊處噫此特學書法耳而以語為文則將曰吾於解牛得養生焉傅庭茂詩跋庭茂詩和平醖藉雲閒靄潤雖未潰於成而巳識雅人深致評者俱謂乃祖通守公六義正傳流芳至此信哉憶咸淳間從矩齋武城侯夜宴於來薰亭聽通守公與雲舎趙撫州説詩槩以讀書為本領其言深嚴微婉具有節度而於尋常容易者無取焉君家所有更贈君敢舉此語庭茂宜猛進深造以鉤其元㑹見擺脱窠臼超入悟境侯誠翁清嘯集跋誠翁為人温柔敦厚有詩人資質為詩清麗激壯合詩家律度閲清嘯集星煇霧靄醒人心眼而古體更有風味至若賦獨孤琴䑓序甘克俊詩則造詣益深餘子落下風矣誠翁吾同里也同庠也又世契也而見君集獨晚烏得無媿抑予老氣鼓不作願為深林不語僧久矣君如不棄尚時起予不然請謝曰無人為視昭華管自捲秋蘆片葉吹跋道堂壁間詩門前盡日走黃塵夜叩山房寄此身在太極先元有道除神僊外少閒人沙填方石千年夢水繞南䑓幾度春縱得桑田誰解守海枯塵起更傷神右至大戊申元夕後四日霽景清酣詣南山訪友信歩陟巘愒玉虚寮見壁題此詩風味可人因記而鈔之不著姓氏友曰某人作也顧某人者村中一譁民乃吟筆如許故曰不以人廢言附錄宿南䑓道院門前滿眼是黃塵夜叩山房寄此身在太極先元有道除神僊外少閒人沙填方石千年䜟水到南臺幾度春縱得金丹真不死海枯塵起更傷神記十年前閒歩到南臺僊宅見壁間新題一首不著姓名興致髙逺句律清雅恨不知為何人所作又不見其他作春賞翫桃園邂逅危誠可出示吟巻首篇即前所題始知出翁老筆余愛慕巳十年矣捧讀盡巻余北靣欲和翁首篇而筆秃墨殘誠難對壘因一笑效歐公語曰且敎退之獨歩云官文翁所作性命論跋性命雙圓之妙大明一錄披剝見髓萊山官兄静徹妙悟融二敎而為之評圭堂復生一笑首肯然二圭四真重闗宻意從何下手盍為我言之今世妙齡俊秀無不䝉頭塞耳鑽入汚泥中尋死窟子獨超然自拔求脱杻械所謂百花閙處松千尺羣鳥聲中鳳一鳴抑細玩評論似傷浮虛刋削就實乃善近見王月田一詩談性命簡實可愛他日當錄寄為一助跋吳貫道所藏鄧月巢與吳雲卧書月巢雲卧二先生俱昔江西詩伯也月巢冲澹閒雅雲卧簡潔清修而詩各如其人焉予生晚猶幸獲親二吟翁而月巢奬愛之尤深夕陽在山風吹海立安得復見鄉邦有如斯人者貫道示予此幅懐舊淒然猶想風流老淚一灑跋吳雲卧與包文肅公薦士書雲卧翁清髙簡澹翛然如蓬閬間人學問精深為包門髙第弟子文肅公特敬異之此書真淳篤實見前軰風範而拳拳薦士意尤足厲俗矣計此書當是寳祐戊午春公以祕閣修撰為江西轉運副使兼守隆興其夏以事歸里云徐孝子詩巻跋建安徐氏子和幼有至性嘗刲股愈二親疾以是得孝子名時賢為詩文美之是誠可美也而或疑於聖門毁傷之戒矣予曰事安可執一律論邪孝經所謂毁傷意其為鬬狠危父母者言非必為㤀身救親者言也親疾委頓命縣絲髪醫弗痊禱弗應為子者驚憂震慄旁皇窘束不獲巳而出此庶幾伏一念之誠延一旦之命而遑恤其他天地鬼神猶為之感格回生起死如鼓應枹誰忍復以毁傷議之其得孝子名固宜或又曰為是事者天知地知鬼神知然不必求人知楊則陽覆瓿集跋則陽楊君臨汝名士也里居與吾旴壌接猶台雁然予故知君未識君識君乃在劒谿上相看俱老色矣恨見晚也出所著覆瓿集示予予快覩疾讀其文如廣長舌談微妙法橫説豎説奔霆巻海而理趣特深其詩如老將持重之師營壘部伍各按節度而時出竒兵邀截取勝執此以往繅藉圭璧薦之清廟宜矣顧曰覆瓿竊所未喻擬起吾家歆於九原而詰之延祐甲寅中秋時公年七十五黃蕖屋𥙷玉樓記跋記玉樓事唐人寓言爾黃君為文以補闕寓之寓也辭清意逺真若登丹霄而與之遇良工心獨苦哉然反覆玩閲辭有賸處更刋落鎔鍊峻潔峭𦂳即神聚氣完又盡善也贊以詩曰白玉樓成記不傳至今人惜錦嚢仙羡君獨歩蕭臺境攜取瓊章下九天文丞相家傳跋舊鈔文丞相紀年一帙正與此同今蕖屋此編比舊加詳豈當時相從兵閒目其事不忍遺從而附益之邪丞相至公血誠貫金石而燿日月居然與張許二顔分席追數仗節死義之年倐閲三十有三矣昔人有云中原之於晉日逺日㤀思之令人隕涕恃死不朽賴存此編其廣傳之使忠臣義士流芳千古非民彜世敎一助乎噫可哀也巳延祐甲寅三月晦題時公年七十五跋曹忠達公守汴竒䇿宋靖康中金再入冦既渡河御史中丞曹公輔奏謂去歲敵寨城外西北地勢卑下不知決水灌之最失䇿今宜分城中兵數萬出據東南劄連珠寨以接外援候敵營西北引水以灌必獲利欽宗以為然宰相唐恪曰水可決兵留為根本不可出公曰兵留城中用兵之死法爾恪堅持不出兵反先決水灌西北而東南乃無兵竟被敵據遂絶外援以致亾國悲夫曹公之䇿竒䇿也奸臣誤國顛倒妄施可勝誅哉公字載德南劒沙縣人龜山楊文靖公時志墓書此事足以發千古之憤志又書汴失守後敵再邀上出郊議未決宰相何㮚奏事出云車駕翼日出郊公遽云敵意不可測此行恐與前日不同㮚厲聲詬公公又率馮澥同説葢謂澥乃㮚同鄉且齒長冀幸一聽㮚不從及駕幸敵營帝果北狩然則二相廟謨若是棄君賣國俱奸臣也後百世忠義士猶宜奮筆誅之時公簽書樞密院事爾詎能奪宰相之議或謂此時駕欲不出亦不可得葢事勢潰决至此巳無可為者其失在不用公之初議出兵據東南引水灌西北此為誤國之大者延祐乙卯九月晦日書其家傳後以寄三歎時公年七十六梅湖道人墨梅跋自和靖香影句傳天下遂令梅增萬世重乃知西湖寒碧是此華成名處今老僊濡毫吮墨為此花寫真而以梅湖自號葢是本色展巻一覽粲粲萬玉神采逼真只形色緇素别爾客復徴予下一轉語予無語只朗吟曰近來黒白無分曉墨作梅花賣得行題范蠡泛湖圖老范霸越沼吳功存宗社葢一代智士也世論率謂有大勲勞宜享大富貴顧乃慮及烏喙翩其鴻㝠不旋踵棄鐘鼎等敝屣何大早計邪噫以功名自見易以功名自終難古今功臣弗令終正坐挾勲吝權不思勇退儻此老亦然即黃金之鑄將易為屬鏤之賜焉得智易曰知幾其神乎蠡也得之老子曰功成名遂身退蠡又得之展巻快覩神采如生故為之賦詩曰霸越功成早見幾春風一舸泛鴟夷丹青半幅人千載勝似黃金鑄就時趙宗丞奏稾跋大宗正丞白雲先生趙公崇嶓忠鯁如漢更生詞華如唐太白幼嘗挹其光霽蓬瀛崑閬中人品也記寳祐乙卯歳犬馬齒甫十有六時朝野推公奏牘切直願見弗獲厥後臨汝侯髙安公從容出示屢見之今雲居翁卓犖濟美重加緹襲又悉取陛對封事鈔纂弗遺復使愚得見而垂白巳望八矣慨鄉哲之益逺幸遺稾之僅存直氣稜稜重我哽咽不覺形之咏歌且語翁曰此君家隋珠和璧也非君不能存此惟君之曾元能永寳此後或有編前代直臣傳者將采諸此其詩曰六十年前夢渺茫宗臣諫稾墨猶香夕陽影落腸空斷門掩東風看海棠曾從道詩跋年時閲曾君思道詩愛其珠明玉鏘心目為快今又閲金昆從道詩覺元豐稾更勝曲阜集何曾氏羣從多材藝也荆華萎㽔重我吟社細讀五古佳處造詣似韋七古佳處部勒似韓杜律雖小劣句亦多佳雖則云然予更有肘後為君助混合陶韋柳三家以昌其五古孰復少陵諸大篇以昌其七古則又取法少陵五律以昌其五律取牧錫渾滄諸作以昌其七律如登華嶽不止於中峰寺解包駐錫必登絶頂望見滄海日出處不亦善夫屬有逺役無暇劇談他日歸來畀我新句題淵明漉酒圖若復不快飲空負頭上巾逹論也然亦何至用巾漉酒不避汚垢漬薉邪韻人勝士託此寓髙致乃認為真即癡人聽説夢耳微茫杳靄中露頂運臂急酒之狀宛然一展巻知是名筆動人醉興舌本流津濟川吟稾跋吾州諶氏多詩人有南牕澹稾有桂舟遺稾今又有濟川欸乃集盛哉南牕興致雅澹不尚雕鏤桂舟功力精深妙入梱域濟川兼二體而時出之且徧遊南北名山洞府與僊官貴神黙㑹紫霞翠霧中故新吟更挾清氣唐宋詩人山出棊置率一鳴即巳今獨諶三世有集豈非盛哉予生晚不逮識南牕老詩伯幸識桂舟翁其與予講評毛鄭詩必上溯江沱汝墳下逮匪風下泉探索深音神情傾豁今老矣詩巳束閣讀濟川集灑然曰周禮盡在魯矣題陸生貴山吟稾貴山性情集韻度清而句律妥鎔鍊所到無欠無餘予客閩久罕見善吟若此問何人曰尤谿陸某也問何在曰年甫二十有五歿巳三載矣悲夫不及半靣也靈葩異卉不耐風日此李長吉邢惇夫軰所以令人悲憤慨惜者乎生兒難兒能詩尤難詩工而夀永又大難吾意憐才覽巻欲淚延祐丙辰孟秋陳子正出此集因志數語聊慰九原魂如有知當曰幸逢身後知音更勝生前識靣時公年七十七蜀江圖跋右潁川德英父所藏蜀江圖也廣僅半尺修踰四丈西起威州東訖江陵跨十有八郡其間山川城壘人物聚落僊宮梵宇風颿浪舶厯厯在眼真竒筆也憶少日閲輿地志極愛西州風景形勢雅欲溯巫峡闞劒闗周視古英雄争戰處略慰胸中之竒顧蹉跎浸老付來生矣展玩傷懐因寄一歎併賦之誰挈坤維入畫圖東西川合匯荆湖金湯夾岸提封接玉帛連檣貢賦輸劒閣幾煩豪傑夢錦城曾是帝王都如今混一兵氛息聞道烟花漸似吳讀曾丹潭夢吉家譜名申本里人徼職余家宅西里與先哲曾南豐先生子固南軒相距數武自江樓居士以來與諸曾世講有婚媾之好焉一日夢吉元吉昆季歩余水雲深處叙寒暄道今故已出世譜視余曰此我祖文昭子開先生元豐所手編而從祖文肅所參訂者也追惟遭罹衰亂分崩蕩祈園廬荒廢舊業蕭條獨是編出入必俱巋然靈光某等紹承無狀藉此少逭不孝之罪公其為我序而存之俾我子孫世有攷焉予三薫沐讀之則見編輯犂然整比有紀至存獻一錄悉當代名公鉅卿之作披對不覺起敬顧謂曾君曰斯譜之存人事乎天道邪夫以有宋仁厚之澤垂三百年大經細目綢繆曲盡非有浚削也一旦風飈慘動半壁誰撐豈無文武大吏張韓岳陸之儔效命賈勇九死不回乃竟弗能留祥興之社之不屋何也豈非皇穹易嚮人力無如何哉公家哲祖父既謹緘謄固扄鐍力豈盡軼諸君子上而用能保全永世者天贊之矣余居同里閈知公家世以忠孝長厚相傳繩繩勿替間嘗一再展文昭祠下精爽昭回與谿光相映發祖德孫謀真可為百世祚天之黙相曾氏豈有量也既書其尾并錄展墓詩遺之水雲村稾巻七
