  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0437_WYG_004-1a, image: WYG1195/WYG1195-0369a.png}
body:
  text: 水雲村稾巻四元劉壎撰傳趙撫州傳宋撫州使君姓趙氏諱戊岊字次山濮安懿王九世孫也建炎南渡由汴徙南豐父崇嶓嘉定進士官大宗正丞忠讜文華搢紳左次有白雲諌稾行于時使君蚤慧善屬文年甫十七奏名禮部擢淳祐甲辰第授袁州萬載縣主簿需次服父母喪居閒十數年博通經史聲實鬯茂鄧大監坰為廣西經略安撫辟賓州司法調福建提刑司檢法官㑹憸人陳仁玉為其長使君恥不赴官景定初諸道争辟厯江西轉運司建寧府節制司福建安撫司皆幹官以舉者改秩知雩都大庾兩縣著能聲江西安撫使曾侍郎淵子才之辟主管機宜文字安撫歸朝薦于上得提轄行在文思院通判臨安府咸淳十年也賈似道竊柄誤國長江失守朝廷急擇江浙守臣擢使君知撫州措置守禦德祐元年春至郡政績著聞詔加幹辦行在諸軍審計司又遷太府寺主簿以重其任時江西湖南已罹蹂踐流潰迸溢警報日夜急剽冦縱横使君誅賞愜當撫人德之江西制置使黃萬石棄隆興退駐撫名勤王實為遁降計頗嫉使君修守僃數媒孽于朝使君不自安累丐罷九月除大理寺主簿既解郡竟歸里十二月建昌失守遂奔贛州明年二月江西提刑楊孖以贛降使君遷避寧都縣五月朔景炎帝即位福州宻詔吳直院浚為江西制置招討使使君為參議官兼江西運判協謀興復六月吳即廣昌使君即寧都各建治所宣詔反正糾合旴贛諸邑義勇八月制司兵次南豐遇敵而潰使君遣其屬以兵攻贛距城六十里與北兵戰破之俘其千戸乘勝逐北至城下城中兵大出我師失利引退喪失良多九月制司奔汀州十月使君捐重賞募峒丁廖陳六等進取而北來兵益衆使君亦入汴明年春知汀州黃去疾以城降使君解兵隐跡出畬中發疾卒就殯焉使君皇宗世宦而介然無紈袴習清苦問學勤於寒素詞翰政績卓偉可稱既遭時艱志克復事不克就聞者悲之所學尤䆳於易有易解十巻吟稾八巻贊曰何代無才顧時相遇不偶耳彼有器能自表著譽流馨豈其繆巧致通顯哉天與以時然也撫州之才際逢昌時寧不足以為治平之州牧敏博之詞臣宋厯永終黯翳淪謝至弗獲正邱首力田不如逢年信夫後二十年其舊幕屬趙孟濚始購募走汀畬歸其遺骨𦵏里中嗣竟絶嗚呼悲夫詞人吳用章傳吳用章名康南豐人生宋紹興間敏博逸羣課舉子業擅能名而試不利乃留情樂府以舒憤鬱當是時去南渡未逺汴都正音敎坊遺曲猶流播江南用章博采精探悟徹音律單詞短韻字徵協諧性愛梅為賦詞自訪梅至結實凡十有二闋自紅梅至蠟梅凡六闋又取古人梅詠可命題者自南枝先暖至粉薄香殘凡四十四闋總為六十有二鄉寓公僊源趙學士師有為名之曰雪香絶唱且亟稱其紅梅之句曰試問海棠健否海棠雖似減清香又稱其蠟梅之句曰凌空蠭翼逓香來驚破蜜房幽夢聞者以趙為知言乾道丁亥歳用章攜以見劉季髙侍郎岑侍郎負重名靳許可特為之序而稱其意密詞清上達古人用心未到處夷陵尉胡舜良夢賡文士也又序其詞為有所感而發葢亦見用章浮沉困阨託之詞詠往往借梅自况爾其賦此也年踰强仕矣不知又踰幾年而終子孫無述焉悲哉用章歿詞盛行于時不惟伶工歌妓以為首唱士大夫風流文雅者酒酣興發輒歌之由是與姜堯章之暗香疎影李漢老之漢宮春劉行簡之夜行船並喧競麗者殆百十年至咸淳永嘉戲曲出潑少年化之而後淫哇盛正音歇然州里遺老猶歌用章詞不置也其苦心葢無負矣用章善謔嘗坐繫得釋或詢以獄中風景用章憮然曰種種不便聞者絶倒因是里人祖以為俚語至今云詞集久磨滅惟余手鈔一本幸存贊曰韻人勝士刻斵陶冶豈不冀千載之傳曾幾何年掃空澌泯宇宙間若此何限可為永慨也用章詞筆居然罕儔苟不憐其才加襲藏焉誰復知南豐有詞人哉用章同時同里有玉壺彭氏亦賦梅花百詠其半則自作其半則集句寳祐中陳文定公宗禮典中祕書下部使者移鄉郡鈔其詩藏祕府追記其自作有曰一谿烟月無人共吹落棃花曉夢初興寄逺矣里中有刋本余嘗蓄此冦燬失之故老凋零不惟無有存其詩者乃亦無有知其名者益可悲夫義犬傳永嘉江心寺長老祖傑閩人也累任僧錄挾貲豪恣㑹僧選罷營求鉅利得主席江心有知識陳某者家城中薄有資産州縣利其富而懦數因戸役困苦之積不堪與妻謀捐田入寺依傑勢苟活請於傑傑欣諾遂棄里居徙家近寺而身任庫院之職傑頻造其廬窺其妻始猶間往不常久則輿至方丈或累日彌旬乃反妻毎怒罵夫曰初為避官府謀庇身今反失身如此汝為人夫甘忍辱邪其夫固恨乃宻謀逺徙適獲房宇於别島嶼嶼瀕海大聚落也地有巡檢司又有一佛閣竟浮家宵遁近閣而居傑聞其逸大怒訪知所在厚募惡少年十有四人飫以豐饌餌以重賞使往屠之曰截取婦人雙乳來為證惡少年如命夜舟徑造盡殺其家七口懐其雙乳而還紛擾中俄衝曉惡少年怳窘疾趨舟鼔棹去獨一人追逐弗及旁皇失措潛登佛閣隐壁間巡檢聞變亟領卒掩捕茫無蹤踪留連佛閣前里社役首進飯見事主家一犬跳嗥左右不巳叱去復來嗥愈厲巡檢舉餐則又跳嗥大躍至衝散其臺盤酒食衆怒擊犬復不去巡檢起犬又隨後銜其衣襟引至佛閣仰而嗥若欲言者巡檢乃驚訝曰是豈有異乎領卒登閣周視則壁角微有衣露迫之見一夫懐刃立即禽下摉出雙乳鞫問備言傑長老主謀因悉捕其黨送縣引問具伏上於府初府有同知與傑交暇日嘗絶江訪傑傑辭以出同知還至半途遇總管亦往訪同知請無往總管曰我往彼必納也邀同知偕往因復絶江同入寺傑果迎待置酒而還同知由此銜傑及事露同知即議移檄萬戸府遣兵圍寺傑出迎曰吾既能作事豈不能當事官姑少寛我容入房收衣鉢行矣許之傑囊橐充斥既裒金寳鈔貨凡四擎授其徒令疾赴都求内援又取所蓄玉器滿案置堂上語人曰此固吾所愛者事巳至此復何用舉杖一揮墮地盡碎既就逮至有司引伏械送總管猶欲全之故緩其事待京報未幾果聞懿㫖召傑同知令獄卒曰僧姦良人婦又謀殺七人可恕乎汝速處置明當賞汝卒入獄命傑醉飽起立縣枷梢於梁囊沙置腦後㧖其氣遂死人皆快之既死而㫖至無及矣同知以是得名省臺交稱焉延祐甲寅春予往延平延平總管韓君玉國寶之子邦彦從予學一日有所厚泉州敎授林南谷來訪韓南谷永嘉平陽人而總管前仕浙東與林舊是以來也予從坐間屢聞二公談傑長老不巳顧不知其端乃詳叩二公具述如上且謂當日非此犬則失此賊七人銜寃無訴矣故傳其事以愧世人之不如犬者贊曰傳為義犬作也然因是而思斯人避官府虐害而謀遷遷非其所而蹈禍乃至一家絶祀死刃下者七蔓延奸僧惡少死於官者十有五推䆒禍原皆當時官吏驅之入死地也人孰不欲安土而樂生非困於虐政必不逃不逃則奸僧之謀必不啟謀不啟則羣衆必可不死哀哉天道無知則巳誠有知者則彼官吏者伏㝠誅禍後嗣決矣水雲村稾巻四
