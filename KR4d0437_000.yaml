body:
  text: 水雲村稿總目别集類四元卷一賦卷二碑卷三記卷四傳卷五序卷六贊卷七題跋卷八墓表志銘卷九啓卷十啓卷十一書翰卷十二祭文卷十三雜著卷十四公牘卷十五表箋臣等謹案水雲村稿十五卷元劉塤撰塤字起潜南豐人水雲村其所居地名因以自號生於宋嘉熙庚子咸淳庚午本郡試第一入元以薦為延平教授延祐六年卒年八十所著隱居通議頗淹博可取巳别著於録其文集舊有二本一曰水雲村泯稿乃明洪武間孫瑛所手抄大抵雜採隱居通議中語綴輯成編其文亦皆與此本相復一即此本乃其裔孫凝收拾遺佚别加排次者所收各體較為詳備惟原目二十卷而今本祗存十五卷其十六卷以下已闕當由傳抄者失之特按原目此五卷所載本靑詞祝文無關體要之作則其存佚亦無足重輕也塤才力雄放尤長於四六綺麗之製集中所載諸啓劄大都皆在宋世所作考隱居通議自述其得意之筆如代吳浚謝建閫表弔吳浚文代趙必岊謝廟堂啓通丁應奎啓今皆不見於集則其散佚者亦自不少然即所存者觀之下筆鑄詞亦復頗見精采塤嘗自言趙必岊稱其䏻以散文為四六正是片假議論非若世俗抽黃對白而血脉不貫者雖不無誇詡之詞而生平得力所在其甘苦固有䏻自道者矣至其他古文則入元後所作為多灝瀚流轉亦殊有淸雋之氣而間以俳句綺語攙雜其間頗乖典則不免稍遜一籌特宋末元初遺聞軼事時見一二亦足以資考据云乾隆四十五年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
