body:
  text: 水雲村稾巻五元劉壎撰序陳文定公奏議序故資政殿學士守簽書樞宻院事兼權參知政事致仕贈開府儀同三司諡文定陳公諱宗禮字立之初試淳祐殿庭時理皇在御二十年頗事酣宴公對䇿極言人主不當徇逸樂㤀憂勤上嘉剴切擢寘魁三厥後厯學館陞郎闈屢以忠鯁聞逮事度皇由憲府瑣闈以至履班彈劾封駁風采凜凜晚登二府甫兩月薨於位公之出處本末如此公自韋布即以名節自厲嚴介絶俗授徒自給外杜門蕭然不輕以一武詣人葢凍饑自守如后山静重難合如了翁也進列貴仕則素履靡渝丹心彌壯其有德有言者歟予閱公諫稾盡巻率醇潔勁正嚴整條暢而原流經術通達國體莫不利害洞悉詞理俱到有攖鱗逆耳之㫖拊心疾呼之辭忠君愛國油然其味者也嘗聞先哲士大夫之言曰近世論諫惟公為冠予亦竊比之包孝肅劉元城輩人斯論殆不可易公之仕在淳祐甲辰至寳祐戊午間是時右相丁大全狂戾恣肆威炎薫灼世以風子目之無敢嬰觸然特推敬公召為尚書郎兼丞相掾意將引以自重公進朝乃首疏之其曰鳳隱麟潛蛇蟠蚓結者指丁也且以四大願請於上天顔開納而丁盛怒嗾臺劾斥歸田方大全威脅朝野百喙俱喑惟公奮不避禍白發其奸縉紳歡傳以為朝陽之鳴葢自是直聲著矣明年而滸黃渡武昌圍詔竄大全貴州以死公遂登用識不識咸曰此當時正人也而責春秋之備者且曰公素尚風節層闗鐵壁晚輕一出白璧微瑕抑不思大賢為國出處以道咸淳中賈似道久柄國國勢岌岌矣仇視端直寄命憸回校風丁無大異常獨憚公方嚴居然禮敬公多逺引髙卧毎以不能致公自歉一旦聞公翻然治任語兩浙部使者趙德茂以公出故喜動顔靣其欽重若此也天假公年共政而久處摩厲規正之似道必為公動則救敗局回危機將宗社生靈實嘉賴焉不然公平生清約髙簡浮雲利祿閒居埽地焚香而坐顧以七十日居政府為足以凂公過矣過矣公所著詩文甚富今某獨裒其奏議若干巻將刋以行世知所先也俾予序之昔李序韓蘇序歐皆其門人予公門下士也故述其大略焉欲觀公者是集見之公家南豐之千綏學者尊稱曰千峯先生云朱陸合轍序有宋乾道淳熙間金世宗仁厚不用兵復修舊好故大定二十九年東南賴以休息國家閒暇文事聿興儒先森聚理學炳明衿佩雲從接闗洛而通洙泗則東萊呂成公興於浙南軒張宣公起於湘建安朱子金谿陸子則角立傑出號大宗師者也朱陸之學本領實同門戸小異故陸學主於超卓直指本心而晦翁以近禪為疑朱學主於著書由下學以造上達而象山翁又以支離少之門分戸别伐異黨同末流乃至交排互詆譁競如仇敵遂令千古聖學之意滋鬱弗彰矣當是時克堂包公崛起旴江出入二宗師門下其子樞宻宏齋先生親侍講貫每謂二家宗㫖劵契籥合流俗自相矛盾至哉言乎顧踵襲成俗趨附貶駁或者髙朱而抑陸私心迷繆寖失和平同里雲卧吳先生汝一病之考朱子書凡言論㫖趣與陸子同者為一編題曰筦天銷磨黨偏掀抉瞽聵學者各宗其説門戸雖小異本領無不同也夫人惟一心心惟一理羣聖相授繼天立極開物成務何莫由斯孔子曰性相近也孟子曰先聖後聖若合符節豈至於學能獨異乎追懐景定辛酉歳親炙雲卧先生得聞梗槩咸淳丙寅歳宏翁以尚書造朝約予與諸老往辭先生進予坐側警誨娓娓亦及兹事抉去籓籬少正卑滯當時馳心科舉文字之間弗克叩擊及今科舉文字念絶思見鴻碩考德問業諸老亦既棄濁世而游太虛先哲弗作晚節無聞為之惆悵自悼不聰乃取象翁文集手鈔焉且復取晦翁語錄摘其推尊文安者著於篇端以詔來世㑹而通之水中之月即天上之月也蜀日越雪何為者故更名其集曰朱陸合轍云禁題絶句序有律詩而後有絶句絶句至宋而後尚禁體其法以不露題字為工以能融題意為妙葢舉子業之餘習也世之以文㑹友者或用此以騐才思工拙謂之義試詩其為説曰體物精切者詩家一蓺也於是摉幽抉秘窮極鍛鍊其天巧所到精工敏妙有令人賞好不倦者真文人樂事也歟舊時編萃至多亂離之後頗多散逸乃日隨所有遴其佳者時課一題以訓吾兒由是精思儻能觸類而長則通一畢萬寧不愈於飽食終日無所用心者邪夫束字二十有八而景色彰表律呂恊和局於模擬而能超疲於締搆而能靈殆亦難矣雖然是特兒童小技而非詩之極致也賡歌昉於舜廷至三百篇以來跨漢魏厯晋唐以訖於宋以詩名家者亡慮千百其正派單傳上接風雅下逮漢唐宋惟涪翁集厥大成冠冕千古而淵深廣博自成一家嗚呼至是而後可言詩之極致矣善乎劉玉淵之言曰淵明詩之佛太白詩之僊少陵僊佛備山谷可僊可佛而儼然以六經禮樂臨之葢論詩之極致矣學詩不以杜黃為宗豈所謂識其大者且懼吾兒溺於末俗之淺陋以為極致也故因槩舉大者使進焉甲申夏五序新編七言律詩序七言近體肇基盛唐應虞韶協漢律不傳之妙風韻掩映千古花蕚夾城漢文有道病中送客秦地山河等篇意㫖髙騫音節遒麗宋三百年理學接洙泗文章追秦漢視此若不屑為然桃李春風弓刀行色猶堪並轡分鑣近世詩宗數大家抜出風塵各擅體致皆自出機軸則工古有人工絶句有人而桂舟諶氏律體尤精咸謂唐律中興焉故知此道在天地間未易能亦未嘗絶夫律聖人制作之初測隂陽定清濁應髙下和神人一累黍不中不曰律詩亦如之彼範圍五十六字爾清麗或病格力之卑浮沈鬱類困語言之鉤棘亦一累黍不中不曰律故雖未嘗絶亦未易能然熟讀妙品自有悟入選古今律詩若千首置几案間日取諷詠之儻私我百年或有見優孟意是叔敖復生未可知也分前後巻前巻俱古人首以唐賢後巻俱今人首以桂舟氏吁蜀之日越之雪定乎未定也逮時久論定矣乃復有如杜劉許李真詩人者出而興恨不同時之言然惜不令封德彜軰見之耳丁亥暮春序時公年四十八新編絶句序詩至律難矣至絶句尤難矣至五言絶句又大難矣辭彌寡意彌深格彌嚴味彌逺豈比夫大篇長歌可以浩蕩縱橫衍之而多者唐人翻空幻竒首變律絶獨步一時廣寒霓裳節拍餘韻飄落人間猶挾青㝠浩邈之響後世乃以社鼓漁榔欲追僊韻千古吟魂應為之竊笑矣詩至於唐光岳英靈之氣為之匯聚發為風雅殆千年一瑞世為律為絶又為五言絶去唐愈逺而光景如新歐蘇黃陳諸大家不以不古廢其篇什品詣殆未易言世俗士下此數百級乃或卑之昔人天然秀發得獨自髙僕學詩數十年心地汗馬媿無一語髣髴望唐見其愈簡而愈難也選絶句若干首置几案間日取柴門静掩天風獨清老鶴梳翎晴花迎露等篇一諷誦之楚冠南音翁倡兒和想千古吟魂亦復為之竊笑於地下聞詩聲而問子何所得者則將應之曰一洲蘆荻殘風月自作深林不語僧丁亥季春序青山文集序陳君南翁歸自廬陵之州庠示余文一帙題曰青山初稾葢吉士趙君儀可所著也趙君往以舉文鳴於世雖心久知君獨未識君於是閱其記文序䟦數十篇往日所鯁戛未能言君乃盡言之欣然有㑹於予心天表雲際想見其人雖未識也更深於識之矣手自鈔竟南翁俾序諭之夫今世無所謂工於文章者然文章未始絶於今世視昔苐甚少耳惟甚少故能工之也即如往日右文天宇開霽窮閻之子垂巷之士挾典册從師略解㑹率競拈摘拾翦裁揚揚里閭自謂能文信甚蕃也工者幾何今是事校昔固寥絶矣間有工者往往霜摧雪剝鼎烹鑪鍜之餘羈困窮愁槁頂枯須且堅忍清苦翛然神情自謂上帝所賦予者獨厚葢所得甚艱且特甚貴異也誠不忍棄其靈明卓犖與一時瑣瑣相馳騖寧甘澹泊非人所堪絶無怨尤固守古道力争斯文於衰微而著先王之所以宗傳照耀羣疑氷雪衆醉若人者天之景星卿雲地之醴泉芝草老氏之飛僊釋氏之曇華非歟故曰惟甚少故能工之也予讀趙君之文甚工而鮮儷以此葢君所著體裁豐茂新意川赴撫事感愴時有千古之憤故其意緒潛藏㫖趣沈鬱予嘗評其風味在近世絶似江古心先生真可志韓歐溯班馬是語正未必可君意顧予能無厚望哉文也將墜地矣盟壇荒寒誰執牛耳宋文章之盛歐曾王蘇四大家名天下獨蘇出睂山餘三子皆吾江西人則文脈之繫江西也重盛則必衰將奈何趙君與予俱家江西將能無感乎願與南翁商之君名文字儀可嘗試成均為天下所推重今退隐廬陵云己丑歳六月序時公年五十雪崖吟稾序今世雖合百千人與之友往往挾巧競詐貌敬背憎其知心而相得者弗常有也誠有之又或風鐙水漚意長日短暌離淪歿繼之自予少壯取友四方老矣知心而相得者不乏天地為鑪銷鎔就盡僅存如雪崖易君與予定交久號知心相得年小於我逝乃先我使思心成結壹鬱而誰語不悲傷得邪君家南城之竹田辛卯秋約予度谿賞桂因共載山行厯訪旴城耆舊衝霧入雲穿幽透深竟日如行畵屏中是游也極歡將别則為盟曰幸俱蕭閒歳一㑹聚若是綢繆也今年夏君歸自洪復約予城北論文甫半月嬰疾僅數日而卒悲夫交游縁也此㑹乃為此别乎君未病時授予近吟曰為我料簡可存者作辛卯壬辰詩序未及序而君死雖死安忍㤀之君將家景胄也磊落英發勇決遷善其於朋友誠以義合有所匡正辭意竭盡其論古今成敗南北離合援引辨駁議論特出卓卓超人意至其詩則能抑而入理醇雅圓熟一不作怪宕豪險語藹然風人趣味也其為文章充暢閎遂即漢魏氣骨晋宋風度唐宋格法當奄有之以集大成惜哉不逮矣憶嘗與君登峯逺眺竹樹晚凉星河夜橫君索予説詩予為言杜黃音響又為言陶柳風味又為溯江沱汝濆之舊生民𤓰瓞之遺又為極論天地根原生人性情語未竟君歎曰㫖哉敢不勉噫方將與君獨立事外終其説踐其言今已矣良友淪謝白髪煢然寕復有知心如斯人者良用悽愴云辛卯集料簡共五十四首詞一闋壬辰歳十五首其和平山翁葢絶筆也君諱仲信號雪崖仕宋為武節大夫時公年五十三重題雪崖吟稾序雪崖俾序時嘗有言曰毋徒序吾詩序吾父子交情庶有考也今既序其詩於前矣忍不述吾喬梓交情之本末君驍衛大將軍士英子也初將軍以戎功入仕勲立江淮名動蜀廣意氣傾一時士無不願登龍者及得見少傅又無不意滿君固蚤有譽聞繼其家聲咸淳間予避地旴城一日於故人趙撫州坐上識將軍將軍顧予論時事一語契愜謂予有當世志良喜詰朝亟邀予共論滋喜特為知巳不繇紹介予感將軍意良深也將軍之入城府也必訪予或約予細語忼慨家國神㑹意合率夜分不能休特相親重葢定交始此其後將軍金陵之卒予哭焉𦵏於松原予又哭焉海枯塵揚氷雪斷道俊傑之士多不復為時出予方韜閟掩抑常恐聲影落人間不相聞問亦既久矣㑹庚寅春冦起汀畬支黨漫溢遂震驚我豐今宰相龍川公來討賊君以客從予岌岌危懼悶不自聊兵前遇君執手歡甚君入則陪帥出則詣吾廬圍棋賦詩厯厯談世事又談世外事遂相與游石僊禮冷真踰月解兵乃散去其復宻又始此君喬梓交情本末葢如此也嗚呼巳矣序成而君不復見矣自伐木停雲之不歌而友道薄君獨篤金蘭之雅乃復止於此巳矣又何言因志其意金剛經解序金剛經佛書骨髓也達摩西來始傳中土訓釋凡數百家而淺者滯卑近不契經意深者騖髙虚適負經㫖其有如普覺如純陽諸大宗師卓卓超詣葢寡乃復有一種葛藤話屋下架屋牀上叠牀井底窺天牕外窺景使覧者惘然滋益障礙瞿曇氏梯航羣迷願人人作佛意不孤邪吁不自通人孰祛其蔽吾州里有居士曰静菴劉君元璋以儒㑹釋根器不凡隐處雲藹蒼翠間澂寂妙悟直證本心嘗曰西方聖人説經救世本自正大本自明白注家或以竒奥泥之多背真乗不見實相於是攷覈古今訓釋采其與佛意合者而削其不合者參以已意别為直解一日示予徵序予讀焉句分字析刃游縷解持正見執中道淺不卑近深不髙虛八牕玲瓏見者開悟其出新意處雖間用舉子言議而大綱領則與經意無異且復總以一語曰離相明心見本有性嗚呼盡矣儻遂梓行廣布三千大千界中逺傳百萬億劫後咸見本地風光超升正覺此功德應如經中所説傳於身命七寳布施恒河沙界者可敬也巳可敬也巳予自幼知讀孔氏書未知學佛年且踰五日汨客塵往往訒六如為真實了不覺流浪之可哀君獨精悟如此足敵生死予不惟自羞且自悼乃堪為君作序邪抑予聞别傳宗㫖貴在性命䨇圓則身外生身親為佛子曰性君巳得之顯露經注曰命未必不得也能如是顯露否二圭四真重闗宻意君如不祕我請靣參歳在丁酉彌陀生日南豐水雲村散人序時公年五十八無名先生藏山詩稾序先生無姓氏亦莫知何許人或曰世家徐避亂徙江南年孰鄉之西里所居淺村中委巷菰蘆靣江背市得水雲勝處花竹夾徑蕭閒無營勸之仕不應詢其志則笑曰吾將俟時者閒為詩詩不求甚工亦不示人顧時時不輟手曰詩以吟咏性情非以求時人知也彚常所吟詩數十葉鐍寘山竇幽絶處藏焉曰陵谷變遷詩出乃當有知我者衆笑其迂嘗得良金刀及漢之大剛卯佩之人莫測其㫖又以土為器類錘然熏以火和以笛閒吹之則村中草樹禽鳥皆搖曳飛舞曰是謂黃鍾動而萬物潛起者矣果自以其竅鳴倡和者莫不求之人亦終莫測後轉徙無常居不定處僅僅故老相傳如此國朝右文詔郡國購遺書適有野人耕山中得所圅詩上之下博士校論編次篇目由是其詩始大行於世然以莫得其人之姓氏爵里故題曰無名先生藏山詩稾云贈黃道人序樵郡黃道人以地理術名自旴造吾門予竒之為瀹茗談龍穴大㫖未竟一丹士自外至再瀹茗細語移晷頗及燒煉㸃化事丹士不應予卒然問風水事有之乎丹士曰山中若有王侯地何不歸家𦵏祖宗道人凝然又問㸃化事有之乎丹士曰道人若有燒金術何不燒金養自身於是道人奮然大言曰噫誤矣未論風水㸃化事安得言無予曰何如道人曰我十有七歳即知此今四十有七矣頃侍舅氏出入賈平章門下目擊方士造作曰句庚曰㸃茆曰澆淋曰槮製賈公靣試無不成予竊學亦無不成顧利有多寡術有真偽耳安得言無予曰多寡之數真偽之辨可得聞乎道人曰句庚利博㸃茆次之澆淋本三而利一或不及一槮製勿復道此多寡之數也真術不傳邂逅至人得之者深祕而自養間有宿縁契遇即傳而不售售即非真也神化祕訣造化妙用豈若百工技藝可輕傳市區貨物可求售邪是殆江湖騙局耳請言情狀彼有平日知其人之好竒也則先結一同志者游談誘致佯若效忠名曰布水及誘之而中也則先試其術之半以取信然後徼其重賂卜日傳授曰我元傳亦若是也名曰整本則又傾銀以為毋厚貲以市藥爐炭器具酒殽縑帛日費不可勝計及䆒其效則或有首而無尾或屢作而輒敗日引月長產蕩家破矣可憐哉予近寓旴城日見十數軰羣來如狂競談燒煉亦有知吾之能此而乞傳者飲以酒餌以財予竊鄙笑是何言之易也而旴之人有乍學未精相承繆種急於取償及用整本布水之䇿焉張機設穽䧟人不少若是者天刑人禍所不貸甚可懼也我則異於是我雖能此不傳也苟得人可傳邪以心傳不以利傳也此真偽之辨也予起拜曰道人語真實不愧天不誤人可敬巳請序其言以表道人之德道人又曰世間常業自足致財顧命何如耳毋拘燒煉勞且費又多敗闕命苟應富商賈貿易利更廣也嗚呼斯言尤真實矣故併序之彼有以鑪火誘利而䧟人者聞之宜愧死也巳宜愧死也巳水雲村稾巻五
