body:
  text: 水雲村稿卷三元劉塤撰記南豐州鼓角樓記至元二十有一年甲申歲冬十月南豐州新作譙門成書始也始升州也豐故壯邑甲江右歲值壬午隆以州權專決直達與旴撫等邦侯超爾自山東來開藩是時阻訌初息磔壤莽蒼官寺僅完門觀弗峙土垣柴扉過者平視侯曰嘻崇閎麗譙所以存制度聳觀瞻也邑皆然州顧若是寧不輕政令而褻等威於是儲俸節費致木與石公私丕應樓是以成傑棟巍簷疏櫺堅檻雲山拱映采堊華煥其下則中通甕門旁峻石壁壯扉巨鍵目耀心惕入者鞠躬罔不興嘆何昔卑隘今雄麗也禮諸侯門阿觀闕隆殺有經僣侈不可儉陋亦不可郡國視古諸侯侯今能是是謂知禮抑非曰徒以為觀美也夫伉門列戟以威逺邇鳴角伐鼓以警昏昕有官守者盍思焉凡蚤作而聼斷莫休而宴息聞聲深省仁聲得無未遍四封者乎識察得無未極髙明者乎閭閻畎畝得無未安於興寢者乎奔馳赴訴得無厄門禁而未通者乎因斯樓動斯念殆凛然若不能以終日觀美云乎哉侯涖州垂六年政績著聞詔俾傳襲行且入覲矣邦人士念侯經始之難請刻文以記故書至元二十有五年四月朔日記觀空堂記鄉先生桂諶祐詩名滿江湖而肥遁萬山中築室三間藏書千卷忩明几淨將以逸老扁之曰觀空詩友劉塤為之記曰空矣奚觀觀空云者瞿曇氏説也愚不熟貝多語請以意言夫空非無因而得名由不空乃始有空即空與實對矣彼不觀實惟空是觀將亦厭夫實之不足恃故移其觀於空邪顧未悟乎空者正乃實為之嘗試求諸一身有五官四體有五藏六腑焉嘗試求諸一家有田宅池館有器用財賄與凡旦莫取具以養生者焉嘗試求諸一國與天下有宗廟社稷有朝廷百官有土地人民兵甲府庫焉夫焉往而非鑿鑿精實者日月幾何死生興替往往毛骨皮肉化為抔土亂山寒雲啼鳥夕陽牧豎樵翁相與長吁而太息而其華榱雕梁或後嗣之弗克守或傾頽而灰燼焉南畝東臯歲入他姓家所藏蓄散落人間其在上者則秦城之金人晉陌之銅駝運去祚移鼎遷物換虎豹九關玉帛萬國而秋風禾黍遺老咿嚶雖萬乘九州之權曽莫能留觀於晷刻悲夫實不足恃乃若此也彼有畏其為吾纍者始欲觀夫空矣由是言之空由實生實互形而空乃名詭曰觀空孰非觀實朝莫四三吾纍均耳令吾有以藥之請無觀空而空其觀何如且人以實為空非也吾視空實等亦非也其眩於兩端若是者將非觀為之邪而能頽然釋然遺爾形收爾視泊乎反其初無觀即無空乃莫吾纍矣苟未能廢所觀而曰空也者雖闃立曠野洞視太虛然心目所及宇宙之內觸景皆實物遊氛幻色亦足點滓將指何者以為空而又何觀斯堂扁以觀空達矣又由是而空其觀乃真空也已瞿曇氏之説未也先生然愚言請以是為記不然請示吾以空崇覺報慈禪院修造記崇覺南豐古剎也在唐名禪祖其易名自宋紹聖二年始厯五季摧毁其復興自曾氏始曾於是邦為望宋初大師密國公致堯首捐資新佛殿其後南豐先生文定公鞏堂封兹山中有司按令甲禁樵牧自是崇護惟謹又其後文肅公布登政府援故事請以為功德院祠其先有旨賜今額崇護加謹又其後參政公淵子帥江西其季刑部公沖子守南安過家上冡展敬先祠當是時旌戟列隧前官吏走道上崇護愈益謹而院亦滋耀矣故雖田入不豐徒衆不蕃而上下三百年間獲與名山巨剎齒騷人之所詠歌遊宦之所賞稱豈無自也初景定壬戌歲主席弗勝任院幾廢曽之胄玉局公鈺與其宗人髙詢謀於衆選僧於他院得定亨者使領之亨為人介且勤謂宏教法飭敝事吾責也苦淡節約懇惻祈訴時則玉局公與髙為之新其法堂焉桑海俄更方袍蜂鋭鮮不棄本務而逐世好亨獨堅確匪懈惟兹院是營命其徒貴聰題募逺邇時則有衆緣為之貌諸天構鐘樓焉僧寮之創則亨自力也簷楹宿雲堊繪耀日鼓喧鐘鍧薰芬燼輝亨方益思以侈飭其教傷哉逝矣聰也閔乃師興植之勞懼久且忘謁記於豫豫考元豐類稿諸志銘書曾氏兆域率曰從周鄉之原頭從周則今昌後耆原頭則院所都也慨思是宗之顯榮翕赫時其福兹院也宜甚厚鼎遷物改之餘保固宰邱寅奉祠像視昔崇護罔敢替蓋院以曾氏興曾之冢祠以院存勤災而豐穫茂施而裕報理也而亦有惑焉數百年漢唐仁義之澤酣潤融浹昭天漏泉寧無一絲髮之足繫百世者樊崇溫韜輩顧忍之秋風陵樹金碗人間乃弗獲下比於兹院之所封植則又理之所不可推何也余數遊兹院愛其嵐翠蔥鬱金碧華煥或時摩挲荒碑睨梁題歲月輒油油然徘徊思古凄楚傷懷為之動無窮之悲而亨能主此以不負曾氏聰能念此以不負其師信可書也為記之且勉之曰尚其善繼乃師之志亨蕭氏子繇寶峰住兹山凡十有九年而寂徒二人長聰也次貴慈大德四年庚子六月日記州城隍廟記大德三年春燕山李公彞以前憲臣來守嘉禾郡甫數月威惠流暢四履丕聳則因事之廢墜者補飭之而城隍之祠以新蓋故祠燬未復二紀矣斗室名存頽垣敗甓間斷煙寒鐙幽隘寂闃數議修畏隂陽拘忌之説公曰嘻有是哉城隍有神列祀典關政體其非淫厲之謂即廢弗祠將無以妥神靈福民物吾守臣何敢慢復何拘忌之畏捐已俸以倡協衆力以助選里望以分任曰鄧端汝其督修正殿曰李定汝其督修香亭曰陳拱曰朱敬汝其督修廡與門咸捐資赴令惟謹耆老率州民致助益謹明年廟成又明年正月丁巳迓神以居崇閣飛簷文砌博礎圭衮中峙劒佩傍侍祼薦豐潔妖厲伏息州民大和會蘄余記之按周典以吉禮事邦國之神城隍有祠其殆始此又按史吳以赤烏元年修蕪湖城隍祠至髙齊慕容儼梁武陵王紀俱祀城隍其祠之寖盛又如此而山隂陸氏謂唐始祠城隍誤矣惟南豐徙邑自開元始其祠城隍疑自兹始古志謂故宰遊侯茂洪功德在民民祠以為城隍之神余不敢知余獨以為畫城郭浚溝池建官府聚民庶誅賞於是歌哭於是孕育長養於是地載神氣安可無精爽以至神明而又安可無棲神之宫尸祝之庭邪况是神也實與官府分職事共理民物吾有司涖政而無所聚居而無宇則其心將惕然不能以終日彼聰明正直依人而行以捍禦患災一郡寄命乃風雨薄之土草蝕之王儀虛而民志鬱踰二十年曾無一為之惕然者獨何心邪惟公破羣疑搜墜典搆創一新而民不知役繼今官無廢祀之譏民有報祈之地神安民亦安是宜書也故書抑是役也非其僚友和謀慮一徴肆牽沮其獨無倦乎蓋主其議者有長官巴延徹爾而協議者有佐二楊澤常泰也故併書若其規制廣狹之宜支費多寡之目與夫用不足而取給於四提督者刻於碑隂故不書蓮社萬緣堂記佛教入中土繇東漢始溢為蓮教由東晉始分為豐郡萬緣堂則由至元已卯歲始也逺公開蓮社更十數代厯十數百年逺矣而寖盛南北混一盛益加焉厯都過邑無不有所謂白蓮堂者聚徒多至千百少不下百人更少猶數十棟宇宏麗像設嚴整乃至與梵宫道殿匹敵蓋誠盛矣斯堂特其一焉爾初州東之偏有勝地曰萬家岡南城吳氏世業也有鄉民曰覺全君蓮社道人也斷葷血持經法五世矣堂未建覺全期建堂遍走於有力者吳某於是首捐地沿舊岡名更曰萬緣己而有過用昭者捐資以市材有吳文容者捐田以贍衆堂之成久矣記未作覺全來求記余聞毗盧遮那之為佛祖也一清淨法身而已世有嗣佛教者亦惟清淨其身而己種蓮結社其非取清淨也乎余特未知嗣之者果能是否夫落鬚髮釋冠巾絶人道棄世務澄寂凝固泊然於無為之境佛之教也有室廬適其溫涼有飲食飽其朝莫外無飢寒之憂內得以專一淸淨之學力到機熟心華自發寶月自見入妙悟成正覺佛之意也余益未知居斯堂者果能是否嗟夫彼其鬚髮蕩然冠巾弛然吾猶未見其能然過此以往滋可懼已羣聚而裕處苦志而勤修一席之安至末也一餐之飫至微也顧清淨之學不可惰白蓮之名不可玷也人何為而人佛何為而佛其知之乎未也則有吾六經聖賢之訓在又將為汝陳説焉南安路學大成殿記王者之祀古惟以廟故易曰王假有廟詩曰清廟祀文王殿則未聞也唐祀夫子亦惟曰廟寧非謂殿統於廟不復專稱歟乃若安靈以殿名殿以大成煥乎宸奎之昭回則肇於宋迄於今何其盛也永惟慶厯詔下凡郡邑無不有學學無不有大成殿枛稜罘罳比隆治朝閶闔梐枑儷美輦道又何盛也橫浦古佳郡盛儒風讀蘇公一記舊亦知南安學為重矣大成有殿屢修屢圮逮邇歲圮益甚薦修完復蠧腐欲圮適符離王侯至暨教授永嘉張君夢桂謀新之徴費於學市材於山募役於傭期歲而殿成堂閣門廡因舊加葺焉建昌郡博士胡君長孺記之久矣推官孫侯來南豐求余作後記余輒因名殿之義諗諸生曰自堯至夫子七聖人者天下之大聖也獨稱夫子曰大成豈前數聖未潰於成耶堯舜禹湯文王以大聖而為君周公以大聖而為相據崇髙享富貴而行其道於禮樂刑政間潤澤浹生民聲光赫當時夫子泊然一匹夫爾挾其聰明睿知之資與凡經天緯地尊主庇民之學今日魯衛也明日陳蔡也位不髙道不行其曷曰大成然而識者曰賢於堯舜矣生民以來未有矣如仭墻如日月如天之不可階而升二三子之取譬若是也何居無亦曰身都萬乘福澤僅周乎一時道在六經功德可垂於萬世二帝不再帝三王不再王當時巍煌直如一點浮雲過太虛而今安在哉吾祖述堯舜憲章文武載諸經籍者百世師用百世之唐虞三代也千萬世師用千萬世之唐虞三代也其孰不曰大成士而遊於學也詎止朔望釋菜春秋釋奠而已興俯折旋乎殿庭間卬首觀焉名殿之旨如之何弗思而况十行新播二字增封所以翼扶章顯者益至又如之何弗思對溫厲恭安之容而想夫金之聲玉之振神遊千古與聖同符節雖未識其大成亦豈不可為成人也乎張拱闊步虛氣髙談心不存道行不副言上焉者以詞章誦説為儒者之極功下焉者蟲鼠其態虺蜴其志甚至有不可勝道者登斯殿者吾夫子有靈其誅之矣夫子不汝誅也聞斯言而不悛則身存而心死心死天誅之也即夫子誅之也余恨不獲俯伏殿下與其為士者評之孫侯宜因吾記轉以勉之可也王侯名虎翼今移鎮撫州其在南安也多嘉績皆可書而知修學為先務宜特書孫侯名萬鎰由推官擢南豐知州乃不忘舊治而求以表章之知所重也宜併書南豐州重修東嶽行宫記南豐東嶽祠壯麗甲東南四方觀者有是言久矣若稽古志祠創於宋嘉祐中時劉宰令先尸其事營度廣袤規制宏深繼以治平宣和之充擴又繼以紹興之繕飾繇是寖完美故侍宸王真人文鄉應詔歸里題於祠曰景物繁麗頗類深宫誠哉是言今仙墨猶存可驗也逮淳祐辛亥復修而咸淳戊辰水蕩之聖朝至元庚辰又修而弗克終之比歲詔書崇祀嶽瀆東岱復加大生之號其修理也宜益謹顧猶缺焉大德丙午歲前元侯正努與少尹李侯質數詣祠下覩其溼漏墮圮壁頽像仆謂非所以承上意尊大神也謀一新之捐俸以倡前郡守聶侯從政郡倅于侯時咸捐俸致助屬吏州氓亦如之選幹敏者董其役而元侯躬涖焉經始於大德丁未之五月落成於至大戊申之三月葺帝後殿搆疏妝樓敞端峩嵬兩廡因舊而加蓋覆塗塈者為屋凡一百五十餘間鼎新創造者凡五十有五間塑像因舊而增飾者帝后而下凡五十有一從新雕塑者帝像暨諸像凡二百丹堊輝華甃砌整潔其或未備則今郡侯綽哈實足成之是祠也視嘉祐為有光而壯麗誠為東南甲矣州人屬豫記之余聞先王制禮諸侯祭封內山川今岱宗峙於齊魯之境其祀也宜無越其封也後世廟祀乃遍郡邑得無與禮經戾與善為之解者曰東方生氣也民物所資生也宜祀以禍福恐動者曰泰山主生死也益宜祀斯言也非愚所敢知然而樂為之記者有以也凡祠廟興廢繫乎時爾聖主如堯甸宇淸泰豐雖偏州落萬山間而天幸際樂歲官無苛征民無轉徙乃得以崇幽靈之宫顯升平之象非時也乎耋稚士女瓣香拜庭裴回笑語苐以資遊觀之娛而誰知時和歲豐民安神樂皆上之福澤涵濡以致此也倘如他州異邑旱蝗頻仍流遷迸溢即民有環堵且弗保有司議賑救且弗暇而暇及神祠哉於傳有之先成民而後致力於神信矣吾人生此州逢此時覩此事遂得為太平幸民其為此記也非徒侈祠廟之修亦以賀世道之泰云是役之初鎮守總管林侯應春亦助費而提督某某助尤多若諸鄊人戶題助者别刻石以紀名至大二年己酉嵗某月日記水雲村記余家南豐之西里距治特數十步而近夜聆譙鼓聲鼕鼕如在枕邊而深巷無鄰幽華疏竹蕭間淡雅俗氛市聲所不到或竟日門無轍迹居然類村落間出門數武旴江橫陳江外南山孤聳緑水環洲渚白雲生洞穴客因名以水雲村豫亦自謂水雲村嘗有寇至去之寓旴城八載乃歸歸而海桑變人民非獨村中水雲依然竊以為吾之於世也流蕩惟所東西飛揚安限南北哉故復自稱水雲村客亦謂豫水雲村蓋嘗酒餘書暇散䇿村中撫水波雲氣而嘆曰人間世孰非水與雲邪今夫聚則形散則氣倐貴倐賤之楚之秦甫笑語之團欒俄聲景之磨滅即有身一水雲爾邸第儼乎鼎盛煙草忽其荒寒部曲傳呼而蒸嘗乏人阡陌彌望而後昆丐食即有家一水雲爾光景如流生聚易散蔥蒨暢茂而稿乾焉富強雄盛而衰謝焉即天事一水雲爾水乎雲乎名吾村乎溪曲浮波滔汨晝夜山椒遊氣變滅須臾乃萬事萬物亦一水雲而天地一大村也悲夫水底東流人不知白衣改變為蒼狗顧以彼之不可羈而停不可執而玩者恃為長且久千古達觀殆將一笑吾於是乎有感矣故筆之為水雲村記水竹佳處記繇州東門外沿旴水而下二十里其地為梅潭繇梅潭絶江而南其地為查溪瀕溪有隱者居焉其人為月潭曽君余嘗過其廬乃在翛然水竹間清漪淪漣翠玉叢鬱余絶喜之為名曰水竹佳處君徴余記余語君曰競利名者趨市朝適興趣者樂山水山水之佳視市朝不大勝乎嘗試即君所居而求之韶景沖融桑麻杳靄耕犁如雲江鱗遊泳春之佳處也梅林諸波舸艦銜尾龍兒解籜禽語宫商夏之佳處也秋之佳處山眉洗黛月浸澄江薲蓼映而鷗鷺飛冬之佳處疏林枯梢瓊田玉界行客稀而漁舟沸佳矣哉四時乎且也庭宇深明琴書橫陳有舞萊子之綵於堂前者有斟安仁之觴於膝下者則佳處不在水竹而在君之家庭猶未也忠厚培福夀詩禮淑子孫動而不與物忤靜而與天者遊則佳處不在家庭而在君之方寸間繇方寸推焉善積而慶長其佳處正浩浩乎無涯也余亦居近旴濱庭有疏竹顧倚市而多囂乃不能如君得佳處余甚羡君矣雖然幸共一江相距且不大逺君如許我則酒餘書暇乘興扁舟將時一詣君焉佳處未必不容分半席也君曰諾其為我歌乃歌曰眇清旴兮縈紆森緑竹兮繞廬誰宅其間兮曰月潭翁之攸居儼獨據夫佳處兮吾欲繪而為圖庭多蘭玉兮家富詩書里稱善人兮神明翕扶吾祝君以福夀兮君宜懋德以自娛吾欲分席兮君毋笑曰爾何其愚至大庚戌歲嘉平月記西林院修造記至大辛亥秋豫延平官期至有司給驛促就道西林鎔師倐來前曰將為山門干檀施記繕修未遑也而記可乎豫曰然師顰蹙亟取幅紙疏顛末見授曰行兹亟需暇為老僧記可乎豫曰諾明年春豫與諸生接會適小休視幅紙故在因省前諾之不可負也為之記曰吾豐北出揖仙門外有支徑繇支徑西復北數十武有精藍其名西林其題扁唐牛丞相筆其竹木深閟有幽趣其簷棟隱映蒼翠間有逺意至其搆創次第則紹定已丑歲成正殿者圓公也寶祐甲寅歲成法堂與鐘樓者然堅二公也暨咸淳壬申歲成毗盧藏者淙公也其大略如此而鎔則嗣淙者也嘗獨悵然曰佛殿古矣洊圮洊修圮彌甚吾安得不圖新藏殿未古也卑濕朽腐將亦圮吾安得不議徙吾老矣當吾世弗修後將誰修於是持願力感衆心時則有張某首為之新寶殿飾塑像有鄒某繼為之徙法輪創西殿若鐘樓則又張某葺焉興役於大德丙午歲落成於戊申己酉間堊輝而采煥猶神運而鬼輸也師勤矣哉西林蕞爾室無寸田可粒無拳土可薪晨昏鐘魚取給鐃梵信凄索不易堪矣師清苦所格天龍隂驅仆者起蠧者新繼自今當復可支百年亡慮矣乃有名山巨剎匹敵封君而罕克為師所為者非以飽甘鮮侈肥輕即以畜姝麗廣孳育於彼法中此輩當墮何獄顧且魁岸倨肆自矜豐泰曽不悟業由此積罪由此熾故曰師勤矣哉豫與師為方外友六十年見師沈朴靜嚴壯老弗二用醫術售恬不自私惟興造是急猶常曰是何足以見吾志邪將澄寂內照勇徹妙悟期超絶乎塵事經營之外乃或可藉手對吾瞿曇氏也豫曰師志乃及是乎即法雲地筆藏海皆師他日到處而豫亦志是也久矣空劫有家願分半席因備載師與豫素論如右而刻之石陸文安公祠堂記延祐某年六月甲子泉南偉特士李君肇建陸文安公祠堂成使友來告於文學掾劉塤曰不肖志聖賢之學勤矣初宗建無所得宗江西灑然若有得也因闢家孰揭繪像日與諸生嚴事之未有記也敢請豫竦立曰言何易邪事關道統豫安得而易言之也友重請弗置則舉昔所聞於師以復曰鴻濛未分道涵太極太極既判道屬於羣聖賢自堯舜纍傳而達乎孔孟自孟氏失傳而俟夫宋儒故有周張二程濬其原而周則成始者也有朱張吕陸承其流而陸則成終者也脈理貫通心境融徹殆天地重開而河洛復泄也道之統緒略見是矣中原逺難具言言其近則朱文公起於閩張宣公振於湘吕成公奮於浙莫不昭回峻極砰轟動蕩時則文安公拔起西江而與之齊其志氣神其識趣卓其學宗孟而直指本心其稟天得而匪繇師授劈析義利則疾雷破山剖别儒釋則明鏡照日抉人情之矯偽則飛矢中的破俗學之偏蔽則剛風掃雲以至該體用之全一天人之正探象數之奧究政化之原專涵養之功尚務內之學超箋傳之錮戒躐等之非誨人讀書必指樞要而示以入聖之户庭勉人立志必如鐫鑿而聼者至為之感泣告君必以唐虞三代為凖則治郡必以正俗慎罰為先務凡平昔提警學者懇惻英發無非鞭辟近裏復其性初救末俗之支離還太極之全體非蓋代英豪千齡間氣也夫象峰中天百世稽首朱文公嘗曰江南未有人如子靜八字著腳曰安得如子靜堂堂自在曰子靜實髙伯恭安得似曰子靜平日自任正欲身率學者一於天理不以一豪人欲雜其間至閲公奏篇則曰規模廣大原流深逺所造深所養厚文公斯言蓋天下之公言而私詬病者類曰惟務超悟也曰惟尚徑捷也分門護黨之風熾隨聲接響之弊滋而卒之盲瞽有不睹天外之光霽者矣嗟夫終日如愚而曰似禪浴沂詠歸而曰似仙彼親承元聖單傳正宗議者猶齗齗他奚怪焉抑文安公之訓曰宇宙即是吾心吾心即是宇宙千百世之前有聖人出焉同此心同此理也千百世之後有聖人出焉同此心同此理也東海有聖人出焉同此心同此理也南北西海有聖人出焉同此心同此理也此其寥廓髙朗會萬歸一彼此尚同異者不愧死哉李君之灑然有得獨異于是吾故書曰泉南偉特士蓋褒筆也宏齋包先生嘗言文安之學深造自得本之孟氏孟氏之後至是而始一明荆溪吳先生曰貫羣聖賢之旨可以合一身心之妙充一身心之妙可以補羣聖賢之遺合朱張吕陸之説溯而約之周張二程合周張二程之説溯而約之顔曽思孟合顔曽思孟之説溯而約之孔子則孔子之道即堯舜禹湯文武之道孔子之學即臯益伊仲傅箕周召之學百聖而一人萬世而一時孰為異孰為同哉味斯言也事既久而論宜定矣若猶未也則又有正心胡氏之説在曰江西之學如取日虞淵洗光咸池太白殘月何敢爭耀愚不佞敢誦此以成李君之志謹記方寸地記存方寸地與子孫耕古賢明訓也延平隱士聞君取以名其堂杏林使君為之題其扁豫因為之衍其意曰深乎哉君之寄意也方寸地云者誠言耶借喻乎夫人中兩間而立為萬物之靈其步趨聖賢其建立勳績其宰制事物其光裕雲仍一是皆以此地為本律以人間世常理即繩尺可約步畝可推區區方寸奚適於用惟其隱於中扃似若促狹而離婁弗能視公輸弗能度蓋蕩乎無畦廓乎無垠前無始而後無終也日朗月輝吾地能融雲敷雨沛吾地能通天淵飛躍古今代謝吾地能統宗宇宙在此方寸中不過太虛浮雲爾抑斯地也人共有之鮮克存之略舉古隱逸如馬少遊欲使鄉里稱善人有意於存者也如龎德公遺子孫以安有意於存者也吾故曰深乎哉君之寄意也君姿端雅而學富贍翛然髙隱涕唾浮榮鄉論無不推德人吉士少遊德公其匹與所居地與庠宫鄰其堂足容數十客乃跪曰方寸地者豈固有羡於金張之第王謝之宅而為是反説約邪噫君意深矣顧君甫中年爾繼今夀九齡即九齡存此地夀百歲即百歲存此地匪直斯今繩繩百世宜永存也愚敢以是為君頌則又授君治地之法曰潔淸以灑之毋汚以喜怒之塵泥坦夷以闢之毋隘以深險之溪穽正大直方以藩維之毋堆以利欲之糞壤是固君所優為又加勉焉則此方寸者非地也天也愚敢以是為君規君名濟時字幾安先世自廣信􅑫延平因家焉延祐三年丙辰歲華朝記積善堂記繇延平津而東六十里曰吉溪溯溪而上十里曰芷陂乃輿地勝處有宅兆焉曰遊氏墓阡遊居吉溪有尚義者曰和中居士其存也愛芷陂之勝將卜墓焉殁諸子以葬于是既葬搆創其傍曰積善堂居士長子仲安謁豫記豫曰昔固未嘗履斯地登斯堂也子而欲記為我言之對曰言其歲年乎遵治命而窆於兹者皇慶三年之冬也葺治完美邇日甫訖役者繼以二年之力也言其形勝乎則有時賢品題之什詠在先生其為我著之豫曰美哉子之名堂乎善之為義宏矣若之何易言之昔者聖人作六經貽萬代揭世教輔民彛無不以善為訓傍出如諸子百家之説貝多雲笈之文亦無不以善為第一義意者徹蟠際貫幽顯莫大乎善凡其夀富而安逸位尊隆而宗蕃衍又無不由此乎出也抑世固有知為善之足貴者罕有如子知積善之為貴者噫子何其敏悟邪夫物之積也不豐則其用也不裕譬取帑廪焉財賄日積則帑常充否則易以匱黍稌歲積則廪常實否則易以虛積善猶夫是也子而知所以積則必由一念一事之善至于無一念無一事之非善故純乎仁愛善乃積間以慘虐非矣純乎忠厚善乃積雜以刻剸非矣純乎亷取而優與善乃積參以貪吝非矣豫聞易為六經首乾坤為易經首其辭曰積善之家必有餘慶積不善之家必有餘殃必之為言垂戒峻切凛如科條之不可犯遵之者昌背之者亡善貴乎積蓋如此也吾又聞務積善之益宜先除賊善之病病安在利是已利嘗與善對始也勇於積善終也流為不善則利心賊之也骨肉財産之爭鄉鄰疆界之競商賈物直之計校一迷其心萬善俱喪夫焉有所積孟子曰欲知舜與跖之分利與善之間也舜跖相距何翅天壤而其分岐止在利善兩字吁可畏已亦可戒己子歸而與昆弟兒姪會於堂其以吾言告之他日豫獲登斯堂又當為精言之仲安名以仁弟仲和名以禮而仲安以文學進今為小學訓導云重修學記南豐為江右文獻邦郡有學舊矣燬於至元丙子重創乙酉距今僅三紀歲月未大逺風霜未大逼也柱石猶完牢而采雘猶章明也吾意更百年將亦足以搘柱乃延祐丙辰歲仲秋夜半禮殿壓焉霆轟山崩聲動逺邇咸曰噫異哉詰朝聚觀則殿西虹梁遽折為二棟橈瓦解狼籍委地衆駭視博詢乃知昔之搆創也責成欲速弗暇擇材故今之傾圮也閲歲未深己致蠧朽又咸曰噫宜哉無足異矣當是時南昌辛公方涖講席帑竭廩虛欲得議修顧役巨費侈趣辦無所以舒是憂會東魯王侯甫領郡政化新風聲聳崇文禮士槐芹德色一日語公曰毋徒憂共圖所以舒是憂分乃稽簿書搜遺餘有曽貢元梯已莊者故學田也比歲指為貢士莊者謬誤也租不入學而有司封貯者兩易歲也公謂昔之家居待次也嘗聞而憤之誓以𨽻職之日必復侵疆今其時邪即白侯侯喜遂由州及儒司勘驗是實以聞於省遄繇省以下於州匪直捐租乃鄆歡皆復侯益喜命發廪易楮焉以定計者踰百儒之助者又什二繇是市良材運巨甓匠資於官丁取於佃侯日詣學忘寒暑指授規畫督勵工程辛公則早暮從侯竭蹶服勞巳而腐者堅缺者全翳黯者光鮮層構飛簷度越於前且復飾衮冕像新櫺星門華煥雄峙中外交映州人謂昔未覩部使者亦謂他州罕及也公語余曰幸哉吾志遂吾憂釋矣永惟葺殿宇復田租太守功也今掾蒙太守賜也吾不忘也郡士友彌不忘也惟是學未有記今雖不忘者久或忘之盍記諸余曰諾因是思郡國不可以無賢牧守也而賢牧守不可以不知學余聞侯嘗從鄉先生野齋李公遊其誨也勤其悟也敏其言論風旨有習聞而默識故於吾學校盡瘁而於南豐先生遺祠復繕飾焉侯之知學可見也已吁僖公之修泮歌於詩文翁之興學著於史揆今凖昔可書也故書曰延祐四年八月奉議大夫南豐州知州王著重修學殿成學正辛泰來相之是為記若夫協謀集事則達嚕噶齊奉直公巴延徹爾同知州事務孫公好直判官從事周公吉俱有功於是役者也宜併記之南豐州紫霄華陽巖三茅真君祠記仙道行世無逺邇有人焉慕尚崇信之弗懈即逺者邇矣江左有郡曰金陵金陵屬邑有山曰三茅蓋茅仙兄弟成道之地道書所謂華陽洞天者也吾州僻左無知者知亦憚逺無遊者延祐甲寅歲里善士諶濟川楫慨慕元虛始獨造焉帆重湖航大江一往復凡三干里受經籙於宗壇分爐薰於靈瑣嚴奉以歸歸而謀卜地以祀未獲也其里之紫霄觀側古稱道人巖者臨流絶險歲久榛蕪而地幽塵淸堪駐仙馭觀主張惟善啓之濟川是之乃鏟乃芟乃闢乃鑱乘夷曠而祠三像于中搆别館而祀鍾吕于後蒼翠環合風露蕭爽咸稽首曰茅仙乃在是何其近也濟川徴豫記顧豫自幼服習孔氏書於老莊氏懵未有聞其何以記則取其所紀載者為述曰姬周公之嗣封于茅後因以為氏秦皇時有諱濛字初成者隱華山師鬼谷得道沖舉傳四世而三真出焉長曰盈字叔申生漢景帝時初入恆山學長生遇總真王君方平授大霄隱書九轉還丹愛句曲山謂為真洞仙館也南渡居之哀帝元夀二年叔申年一百四十有五後遇神人授以仙職一日乘鵠去次曰固字季偉幼曰𠂻字思和仕漢並為郡守髙年棄官從兄得道亦仙去邑人為建壇宇祠祀光武獻金於廟明帝敕修由晉訖唐帝咸受經籙於茅山逮至前宋崇敬尤謹仙書宸翰輝煌日星鶴帔星冠羅棲巖岫其頤神葆真之士依靈祐而獲度世者逮今無虛歲也嗟夫萬事萬理一方寸爾志所篤嚮即丹邱玄圃十洲三島且不逺矣濟川之於道也專且勤故履危涉險而無倦心道逺費侈而無靳色卒能使江左仙真之祀延逮鄉邦使一方寡聞之民翕加禮敬茅峯煙霞歘其在目豈吾徒儒迂不化者能及是邪是宜記初三真封號已穹厥今運啓聖明彌加崇信於是妙道沖虛聖佑增真應至道沖靖德佑增妙應微妙沖慧仁佑增神應云宜併記延祐四年歲在丁巳十有一月吉日記一齋記豐有水村翁者寖老且憊矣猶沈痼書癖不自療為達人所笑曰爾躬之弗恤而學之是務乎猶石田也有孫曰深弱冠嗜學頗類翁屏處斗室中案書整嚴研墨精潔癖好亦類翁辨色而興深更而寐忘寒暑飢渴誦讀達於臥內或時妨老人睡翁亦自笑一日語深曰我之沈痼不療者竟傳染至汝邪雖然妨睡事小志學事大吾不以此易彼也吾平生辱交名卿顯人魁儒望士濟濟滿朝野當吾齒壯氣雄狎玩短景豈識世境之有海田人命之為露電直謂清時常春白日常午也而大化銷鎔一體歸盡曽幾何年有不存若敖之祀者有不反湘纍之魂者有不歸先軫之元而不掩張進之骸者朱門縣薄故墟鞠草宗強胄貴苟賤資身令人感念興替哽塞摧傷已不勝懷舊之悲况使望爽鳩氏之居經田成子之國雍門之嘆梁父之吟川原莽蒼蛩螿慘戚將有俯仰千載至於流涕者矣今吾陋巷幽棲詩書十世雖疏鐘斜月殘夢悠揚而晝忩蕭間夜鐙靑熒猶獲與汝談經析理撫慨荒涼寧非祖孫之所甚幸又何愛片言不以成汝志也深汝來前今汝少也而志於學似矣抑未省此志壯老如一否凡志貴一一故有成吾懼汝之未達此也故扁汝讀書之室曰一齋汝其日對之日思之嘗試求其義其知一乎曰未也吾與汝談一一未易窺而亦未易測也爾充其用即浩乎其無津廓乎其無涯肫肫乎其純渾渾乎其真天地之所以清且寧以是堯舜禹之傳心湯之協德文之純孔之貫以是不惟是也下至於技若秋之奕牙之琴郢人之斤由基紀昌之射與夫鍾王顔栁之書僧繇熙筌道子輩之畫凡蓋代而絶倫擅名而致利亦以是也深勉乎哉夫併敵乃能殺將多岐必至亡羊宇宙以來人物何限孰非有志者有志孰無成者顧或不潰於成即其志有不一爾蓋一則無暴寒而功力完一則無雜悖而精神聚寸念之烈蓋天蓋地將何事之不可成二焉三焉始鋭者或終懦樂此者復羡彼中道廢晚節變雜念紛飛而幸其有成也愚己深勉乎哉昔者汝祖嘗志學如汝矣惟其志有不一也故知道義之足貴有時而重事功知博記玩喪之為非有時而溺語言文字知此心嘗在腔子裏之為妙有時如遊騎之四出知聖門學術之為正塗有時而縱談仙佛知建學之為足尚有時而心慕江西知科舉利祿之不足道有時而欣羡乎榮名若此皆不一之病也馴至於老而無得焉有由矣深勉乎哉謂豫不信質諸周子有問周子曰聖可學乎曰可問何以學曰要在一嗚呼微矣因書之以為記既擲筆覩案間陸子書有曰我這裏是刀鋸鼎鑊底學問斯語也吾偉之并書以堅汝志延祐己未孟秋水村翁記水雲村稿卷三
