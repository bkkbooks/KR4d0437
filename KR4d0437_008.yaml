body:
  text: 水雲村稿卷八元劉塤撰墓表志銘始祖工曹劉公墓表南豐劉氏之始祖曰工曹郎中諱希逖世仕南唐曽祖濠州刺史諱金祖清淮節度使贈太師諡忠肅諱仁贍考懷州刺史諱崇讚懷州而上未有葬南豐者葬南豐者自工曹始故南豐劉氏祖工曹以為始也工曹歿垂四百年迹遠且湮厯官行事不復存存者一壞之土可哀也已按家譜書工曹葬九陂耆牛頭坑地形若蛇蛤然國師陳孟陽實卜之坐離向子癸書之記其墓也又按舊史大師南唐亷鎮壽春周世宗擁重師來攻大師抗節死守與城存亡世宗哀其死而忠之追爵彭城郡王詔改清淮為忠正軍以旌厲於萬世而唐主亦贈公太師封越王賜諡忠肅故今子孫稱忠肅世家示不忘也嗚呼五代逺矣數百年間位將相列方靣英傑材武崝軋頡頏顧一再傳或數傳即蕩泯澌斷吾宗幸不隕墜汔于今薦更亂離文獻猶相仍為臣死忠天實昌之不然其曷克如是之久亦曷克使詩書一脈常綿綿也噫其盛哉工曹子二長曙次昭升州通判孫三人長元亨次元常次江樓府君諱元載是為三位三大位析二十一派二十一派存者五而出于江樓位者四焉至今存也大宋寶祐中塤等常侍諸叔拜工曹墓下思有表之後三十年為至元丙戌歲三月又拜焉念昔甫冠今望五矣歲月幾何人事難齊懼浸老無所復能為負追逺志凄然執筆刻石墓上用昭來裔墓距城三里孔邇且便風日佳時一往展省曰吾始祖也世世子孫宜勿忘是日叔長鏜前拜塤次之孫龍瑞麟瑞鸞瑞鳳瑞又次之五月朔日九世孫塤表時公年四十七升州通判劉公墓表塤既表始祖工曹之墓自是而下墓遠且湮者將例表之以彰先德隆世本也於是表通判公之墓焉公於工曹公為季子於塤為八世祖諱昭仕至通判升州歿葬南豐河東之駟馬窠今為昌厚耆冷水坑夫人黃氏祔其左巨阜隆然叢萃蔚然至元丙戌歲清明節率諸幼剪荆棘訪兆域突起坡陀中堂封不壞意山靈訶護之剗削平治羅拜酬奠薦楮鏹野老環視駭嘆曰墓古矣何後嗣長逺乃若是也公德善政績無所於考我後人蒙賴餘慶數百年文獻弗墜非積善不至此此固可考也嗚呼盛哉曾祖諱仁贍唐清淮節度使贈太師諡忠肅祖諱崇讚懷州刺史父諱希逖工曹也母邵氏葬郭北仙君嶺子三人長元亨次元常次江樓府君諱元載孫男四人長曰汝舟次曰用滋守祕書省著作郎次嘏登寶元元年進士第虔州石城縣尉贈屯田員外郎次汝霖曾孫二十有八人其可稽者十七長某次某次某次某次某次輔堯次某次某次某次某次灌次德純次德恭次仲軻次德輝次溉次湜儒林郎祕書省校書郎南劒州都曹次洵儒林郎洪州新建縣主簿次况福州寧德縣令終通直郎賜緋袋銀魚次德象次某次源次某次濟次容次演汀州戶曹次渭次潼重刻石填塜前曰升州通判劉公二府君夫人黃氏墓而別買石書此以表云世世萬子孫毋忘八世孫塤表本州教授曾月崖墓表故南豐州儒學教授曾君歿期歲葬州西長者耆之神窠行有狀墓有志矣老友劉塤哀其平生復為文以表諸墓曰自唐貴進士科宋因之成俗凡齒章縫親觚翰率以詞章科目為儒者之極功而它不皇務其得之也於人家國正亦未知其何如而偶失之即愁苦怨抑如不欲生如學佛而不臻疾證如修仙而不遂沖舉甚至垂絶猶耿耿凄斷為終古之恨若吾故人曾君者誠可哀也君名友龍字雲叔家南豐之市山曾故望族也七世祖曰偕裕而好施施久寖貧貧猶施弗厭厚德耆齡里稱曰長者及見其子發決科為名進士孫樽亦踵決科善積慶綿而君出焉當盛年時頎而晳儀矩顒昂猶班行中人也器識開擴不為拘儒局士而所篤尚專精賦律踐世科顓固沈酣猶嗜飴蜜咸淳初特薦書試禮部鋭取一中不利益奮發期再進則世俄易而科且廢矣科廢猶琅琅誦哦舌本流津曰吾志也間遇嘗擢第成名者輒傾倒禮敬曰吾羡也君素重厚至臨事處變則定且果方南北兵交篁嘯震野有司藉君聲望進鄉社既被命即嚴保伍束丁壯有白晝攫醫囊者亷得實送官尸諸市凶狡破膽一方以寧至元丁亥行省命教授本州學䘳佩得師者五年剡上將改調厭煩徑隱其小試止此大德甲辰歲年六十有九一日悵然曰吾試禮部時吾與某人俱吾賦與某人正同然某人得之吾竟失此一領緑衫吾遺恨也吾聞之流涕蓋距科廢已三十年距屬纊幾日耳憤悶未平猶若此吾故曰可哀也繇唐虞迄洙泗聖賢迭興其垂世立教良有在人之所以為人士之所以樹立不朽疑不專在科目得失間彼電火槿荂何與千載顧流俗驅靡之致令吾徒坐此鬱勃至于老且死猶悲憤憔悴不自解蓋世之通患而亦未有若君甚切者滋可哀也公歿是年七月之十日葬以次年八月之九日其世次與其他可書者志已具不重述述其所重者著之以慰吾知巳於九泉而申之詞曰苦思長哦胡不髙科歸來乎神窠遺恨不磨天乎奈何宋太史劉公墓志銘豫宗兄太史公方石先生既葬十有五年其子鎮訪豫盻城南寓舍出尚齋劉君所為行實慘愴而言曰先人之冡木拱矣顧未有銘銘先人者不在當世達顯人而在深知先人之文者抑知之於生者趣附焉耳特淺之為知今先人歿且久昔知之者希趨附之情見矣叔也乃且網羅先集片幅靡遺深嗜篤尚猶韓與栁是真知也已銘非叔而誰豫力量不敢當顧其情悲其言當而豫真深知公之文者矣故銘弗讓公劉氏掞名信翁字方石其别號世為南豐人幼英敏嗜學讀書深根極能賦有風骨丹霞張先生自明居旴江從朱陸明性理尤精先天之學鴻文大夫名為學者師一見奇公納為壻盡傾所學以授公公繇是盡聞過江與老儒言論宗旨文章大法語出心契警發融暢當是時項平菴安世柯東海夢得方孚若信孺陳魯叟㳊曽景建極諸公俱東南奇人而公遊從其間充其識度以昌其文遂大有名於世既薦於鄉而纍不利於春官乃退而深求聖經賢傳諸史百家益肆力於古學其進如川其文如淵當路爭致禮聘公氣岸峭徑自持若氷雪與人交必惟道義不徇時俗好尚諸公貴人以是加嚴憚晚用纍恩授迪功郎監建康府糧料院寶祐初有詔修中興四朝信史於時元老大儒木石先生尤公焴以端明殿學士提綱史館得自辟屬一時鴻筆名流咸豫筆削公特起逺外入館為校勘初南豐自曽文定公典元豐史事越百七十餘年而公繼之里人以為公榮公不慊也公時年七十有四矣龎皓登畿肅然澤臞而剛直之氣見乎顔面既挾老筆分修諸志傳成同館英雋俱傾伏禮下之甚尤公以公髙年言于臺免朝參行香異禮也明年書成將奏御而公故有寒喘疾疾大作四月六日卒於位朝野知公者嘖嘖惌惜悲夫吾宗文章宿老所施奈何僅若是也子鎮護其柩歸卜撫州之金潭葬焉豫於公為羣從嘗一再見見時年甫冠固未知公之學之文也既壯則知之而公已逝然其後盡讀公之文知公之心蓋公之言曰儒者之學不專文字要在識本體濟世用文章之妙司馬子長不必論也近世惟韓曾風味不可及故公所著往往似之嗚呼公已矣吾宗三百年文章家不乏人然能如公者幾人今也又特無人恨不逮從公考質也儻今而幸獲從焉公當不豫靳豫亦有以受矣每讀公氷玉集方石漫編慨然思吾兄之不可作則思瓣香巵酒以拜公墓而未能也故敘其生平而為之銘豫知己雲舍趙公次山見而矍然曰豫昔侍先宗丞識此老敬此老亦以晚後未知湊泊故不及參此老今殊恨失此老也子為銘吾為子丹書可乎豫謝不敢當趙公竟欲書之其世次則刻之碑隂銘曰世貴者文而孰為祖惟韓惟曽與經作輔公本二人展也髙古筆削汗青猗嗟遲暮悠悠金潭蒼蒼宰樹悲夫嗚呼是為寶祐太史公之墓先母揭氏孺人壙志先母揭氏孺人世居南豐生於宋開禧乙丑歲六月十有五日終於至元甲申歲十一月十六日享年八十吾宗自宋初升州通判生江樓府君以德義儒雅大其門子孫擢科列仕文獻相承至我曽大父登紹興第為道州寧遠縣丞沒於王事以承事郎致仕大父與先君世濟文學為三百年詩禮故家先母歸于我先君先君沒不孝孤甫五晬依外氏寡母孤兒凄涼萬苦先母勤婦工致束修遣從師問學率自督課每孤燈青熒母紉縫兒講習訖夜分或雞鳴乃已嘗曰汝家世名儒吾望汝毋失為儒也是時仁聖在御世運文明不孝孤既長獲以斯文受知魁儒名卿碩師勝友常車蓋盈門先母聞其講義理評文章退輒喜其獲齒士流免淪落由母教也常以嚴毅總家政以勤約理家務以肅潔奉家祭而於墳隴時省尤謹會權姦覆國三宫北遷先母流涕曰噫無望矣撫諸孫必談舊事切切以徇時廢書為戒素多疾常露禱覬臨終無重苦八帙慶壽視聽不衰是冬俄盛寒喘卧疾五六日厯厯囑後事不少亂醫進藥似少瘳忽顧不孝孤曰覺頗恍惚亟扶坐進鬻復就枕而逝於乎痛哉男不孝孤塤孫龍瑞麟瑞治命卜兆於塘原耆恩口之汪山乙酉歲九月丙申葬焉先母令德壽考法應得銘顧鴻筆故人凋謝殆盡乃忍死紀實掩諸幽永惟養志有虧志壙奚益吾負吾母慚愧痛心昔也嫠孤煢煢相依為命世未有此悲也今也兒無母憐堂空景寂世未有此哀也嗚呼痛哉哀乎已矣哀乎已矣吾母不可見吾哀與天終矣嗚呼山靈守護百世不墮陵谷或移有見此碑誰無母乎尚封崇之自志江之南有州曰豐豐之瀕有民曰劉塤字起潛父家淺村水雲間性寬靜忍辱然浸成墮弛見事遲而課效疏所喪敗常什九初不改其尤駭特者無位而思救時無責而喜論事無財而樂施豫道不行守道不易學不用嗜學不厭衆迂之自亦迂之終不改早參名輩大老槩有聞故於書不務拘束章句惟聖賢深旨是求曰書以理身心達政治也穿鑿破碎無益也用即治經博士身耳詩不求甚工亦不輕示人曰寄吾興陶吾情奚用人知讀易至革讀詩至黍離匪風諸篇常凄怨不勝情曰孰知我哀自恨孝養不盡當生旦即晨拜禰廟香一炷淚數行曰哀哀劬勞忍舉觴乎世易道隱羣弟子率改化奔放乃獨倐然理殘書訓飭如素深夜寒鐙父子談古今商義理稿乾苦淡非人所堪猶欣然曰陋巷讀書對聖賢語未為非樂其迂蓋如此生嘉熙庚子歲年六十有三矣誦陶詩自挽羡其達成自志且成示二子曰生弗克顯揚吾親死毋葬先人墓下葬道旁當有識者曰是非癡人耶不易節媚世取富貴而止於是葬于是邪吾或有知聊志吾愧也自始祖工曹葬南豐一傳升州通判通判公六傳曽大父諱鐸登進士科官承事郎大父炎父嚴俱治經教授州里母揭氏昔太史慈臨終嘆曰大丈夫當佩七尺劒升天子之堂奈何而死乎悲哉斯言抑窮達命也死生理也安命順理正也正而斃已矣而又何悲銘曰生何來死何歸百無成頑且癡豈無奇命制之有不死者後天巍巍趙深道墓志銘嗚呼運祚遷革臣子不奮忠力回危機哉成敗天也自襄失守江左東南日夜告急議者疑必亡忠臣諱言亡亡矣復圖存僅存卒不免亡崎嶇萬險期有所建立眷命不祐川決氷消使人沈憤鬱鬱摶手就盡至于無可奈何而後為不得已之舉蓋志士所不忍言而千載所共哀也初德祐乙亥冬毗陵以不屈屠蘇湖風靡明年孟春行都震文丞相使北營謀講解兵羈留不反而輔臣吳謝劉賈輩獻璽輸國矣丞相至京口用義士劉滸䇿得逸去走西淮涉東浙遵海趨閩從景炎時則有撫州幕屬趙公深道亦由贛趨閩從丞相丞相異之留佐都督府江淮徑勇多戀舊亦趨閩入廣公部軍且募義丁為助示以賞罰激以忠義間出偏師復故地屢捷於是嶺南雲合霆震撼動江西東公美髭髯敵稱趙胡子名喧一時驚謂異人也已而精健日集南下萃全力攻一隅丞相掩襲北去公收散卒鼓行轉鬬將進衛崖山行朝逮己卯春崖山傾覆公羈嵐霧中四顧傍徨曰孤臣疇依乎然猶強自立至庚辰歲則至元之十七年矣度無可支柱始提其精兵萬衆內附皆慟哭投戈聞者為公悲愴嗚呼公逝矣日遠日忘誰知之豫老且死不書誰書之故今特為公表之公諱孟濚深道其字宋秀安僖王六世孫也建炎自汴徙南豐曾祖師拱承忠郎祖希趙朝奉郎考與則廣州通判公以經學登咸淳乙丑科進士為江州湖口縣主簿興國軍司理德祐初元計院趙公必岊守撫州辟為節制司幹官罷歸里急警報奔贛未幾南趨督府凡三年纍擢要職主兵事最後請換武授澧州觀察使龍神衛都指揮使左金吾衛上將軍兼江西提刑都督諫議官改福建江西招捕使升閩廣制置使久之兵解北覲賜宴賜袍授通議大夫禮部尚書徽州路總管兼府尹不赴再入覲授杭州路總管再授桂陽路總管罷歸里大德乙巳歲九月二十有一日疾終於正寢享年六十有四娶曽氏子男二由嵩由榿女一浣奴陳公諒其壻也明年四月丙辰葬染原耆天心坪之先瑩又明年求豫銘豫夙厚公義應銘公之始任州縣也以勤敏受薦舉晚而為郡也潔亷自律秉清於吏拉朽于姦譁薦者表公風憲豫謂是皆常事毋容詳豫所詳者為其初心有足輔民彛扶世教也公起儒紳間將略精捍頛出意氣軒軒於文閎肆徑偉援經據史於事明鋭勇果中機合變於財也素輕其撫將士周賔友率傾倒不計乏絶至宴享必豐恥作寒儉態也由是從之者皆意滿少善格鬬擊刺尤精彎孤又能跣踐榛莾如履坦故于兵間艱阻荐經恬不為病性習則然而亦誠異哉其贊撫幕豫適詣趙撫州署豫掌書記與公共官舍會制置使駐撫豫日遊閫郡間目公調娛帥守綏輯諸將飭城守理戎器綽綽有䇿晝夜即與豫閲軍書論緩急興亡為之相視以悲嘗曰脫有不幸豫當擁衆保險少延廟祀耳豫悲其言暨歸自粵談景炎祥興事尤悲或時相顧墮淚也噫非烈丈夫竒男子也乎而九原不可作矣深文者猶曰誅殺多濫曰操執不完悲夫書曰責人斯無難誠使諸君易地而處之能為公所為乎吾有以知其不能也不能為公所為而訾其所未易為誠何心也今夫提孤軍起墜緒既非素拊循且迸裂潰決時苟弗戢即自焚矣謂誠濫耶嬰疾委頓中得無魏其矦之守田蚡者乎何其神宇屬纊不亂而歘若嚘嚶有弗間也至評公出處則箕子商之胄也臣于周范質周之賢也相乎宋聖人固列箕于三仁而考亭先賢亦躋質于名臣之録何也孟子曰男女不親授受禮也援溺權也亦天也吾如天何姑舍是而論公尤有大難者厥初一郡幕下僚耳正何與軍國事直忠憤堅徑汔至鼎移祚終既三四年厥後不當小恕邪事既久而論未定何由得釋公初入見欽承宣諭有曰而非看家狗乎主人歿矣猶守著一片田地不去乎稽首三復令人隕涕蓋千載猶有餘哀也吁流俗不見知明主獨知之請以是間執議者之口銘曰才英且奇而時不逢志閎以鋭而施不洪家國阻訌丹心有沖南服膺揚敵懾髯翁期晚西頽復于旦中哀哀彼蒼運數易終傍皇疇依惟時之蹤於赫明訓獨識孤忠湘南再麾綏良戢凶曷不駕牡曷不乘驄曷不迭鵷超然太空生也奇男沒也鬼雄其升於天燦然長虹老友作銘直筆生風建寧推官鄧公墓志銘鄧君元實諱德秀世居南豐生而早慧未冠俊聲著矣性坦率不務炫飾而談詞英發精神流動閲書雙眸厯落數行俱下為文飛翰翩翩靡待搆思其明義理推治亂皆頴出深詣由是兩取鄉薦登咸淳戊辰進士科初景定庚申辛酉間三山陳令君琥來蒞邑令君成均名流邑之士望琴堂希一盻如渴令君鑒裁特精拔尤加禮敬焉時輩如湯斯立曽唯仲及君俱列上賔余最鈍朴亦厠迹末坐令君嘗曰諸君異日皆𫀆笏中人也已而斯立無成先歿唯仲亦徒四舉禮部亦無成豫更落莫獨君取青爾初調澧州司戶參軍事憲使青陽公夢炎器能䇿略號西州竒傑於僚屬靳許可察君亷敏獨委任無貮案牘非經君閲不署也憲兼郡事檄君決常德獄獄有寃根連充斥君一閲得實縱舍殆盡澧陽尉逐捕弗獲應黜君憐其初仕白憲使寬之止校尉吏人稱長者制置使李公庭芝郡守趙公汝蘭亦知君遂與憲使交薦於朝會考滿留君助而君以便養丐歸調建寧府節度推官需次國事去矣悲夫君乃祖素厚我先君故豫與君彌厚聚辨傾豁無爾汝也君齒長豫才敏復勝豫豫每多君君乃不自足記癸酉歲豫家盱珹中君從湖外沿檄歸省因過豫曰近得君䇿一篇真可讀且可法也其謙奬如此丙子兵交大勢未一有仗名義圖興復者君與其謀軍聲震鄰君語豫曰一興復即一糜爛奈何豫不敢應居數日益震且逼君籠鐙夜叩吾門決䇿豫曰興復義也抑烏合非素練勢必擾盍少避乎君曰然俱散避已乃果擾且潰敗明年復見君相對欷歔而已又明年君避地山俄疾終至元戊寅歲七月四日也年止四十有七官止從政郎君所厚如月崖曽教友龍正心彭倅履道清逸趙使君孟瀠躬弔皆悲吒失聲知君深者復稱君孝事母母所愛諸女諸孫君能順承加厚歲入惟母命弗私又稱君勇為善邑吏吳宗忤令尹罪且死哀祈君救君為昭雪得不死饋謝拒不受人益賢之嗚呼才難古今所歎如君溫蓄何可多得哉儻不以時能不卓卓樹立以自見鼇動鯨奔淹鬱就盡彼妄庸人無賴子起鼠壤蟻垤間乘時晝昏梟鳴虎嘯至于豐大輝赫埓封君而儕世卿何德致然耶東郭先生謂西門子曰汝之達非知得也北宫子之窮非愚失也皆天也非人也而鹽車服驥章父薦屨賈傅亦嘗悒憤於此君其奈何君葬九坡耆之楊梅踰三十年有孫繼昭軒然振立一日袖君所著秀山小稿蘄豫詮次將鋟梓且丐銘豫喜君之有後又念君之不可無述也遂銘之曽祖達祖玠父應祥母任氏娶張氏男顯孫先卒繼昭次男子也治命為顯孫後銘曰黃文節公有言王良秣驥子而問塗氣已無萬里矣未出門而車軸折可為隕涕吁嗟元實不幸類此豈曰無才豈曰無志時厄命制一第中廢不朽有銘千載少慰王氏夫人墓志夫人王氏諱延童其先渤海人徙居京兆資德大夫浙東道宣慰使兼兩淮都轉運使阿里布其祖也武德將軍瓊州路安撫使圖嚕布哈其父也至元中宣武將軍超爾守南豐安撫公來為判官僚誼素篤會宣武公納祿其子綽哈忠翊繼來領郡因請婚於安撫公故夫人歸焉夫人生長世家而寬慈慧淑克盡婦道事長敬訓子嚴治家有度恤下有恩組繡縫織無不精習至於服儉勤甘勞苦樂施豫踰二十年不懈至大三年四月一日以疾逝年四十有一忠翊公哭之慟謂豫曰已矣今而後無復為豫助者矣頃豫連歲留京師無暇理家事吾妻綱維戶門增廣資産應接旅費無乏絶豫處萬里外無後顧之憂皆其力也今也已矣又謂豫曰吾纍世家寧海禮應歸葬於先塋顧官守無敢離次也卜兆南豐州新源耆之仙君嶺將以是月十有三日從權殯焉先生為我志之豫聞夫人歿之日無問中外親疏稱其德懷其恩皆慟哭失聲而忠翊公以失助尤悲豫是以知夫人賢行為不易得也遂書之子男三人哈喇布哈徹爾布哈實喇布哈女三人秀兒玉兒鈕鈕惟玉兒許嫁欒某餘在室孫一人玖珠是為志聶母曽氏墓志銘至大元年歲戊申三月某日里友聶自得母夫人曾氏歿明年五月乙酉祔其柩於先瑩又明年自得袖壙志踵吾門泣請銘夫人儒家女也世居州西之峰嶺其父江泉翁翔龍嘗受經於鄉達尊華谷先生嚴中書粲宋端平甲午歲舉進士翁齊家有禮子若女俱循循服庭訓里稱之夫人諱慶雲適南停聶君某婉淑儉勤克相夫子尤篤義方訓嘗篝燈夜績課兒書不怠其事尊撫卑睦內輯外惟儒家矩度是循里益稱之大德甲辰歲以八帙該賜帛恩會生旦自得率卑屬拜舞稱觴姻族閭黨咸在賦詠成巨軸里又稱焉曽幾何年乃一旦無疾逝矣悲哉自王澤既息內則弗修賢淑貞順往往罕聞於天下然嘗閲漢晉以來諸列女傳時有足為閨門法者未至防決川奔經淪紀蠧若近世之不可道也當是時獨有號為儒家者猶或篤守古迂時以先王之教私淑家庭故兒女薰陶未與俗混至於婦道母儀有若斯母得非聖經有法戒在邪由是推之斯母可銘也乃翁亦可敬也已子男某某孫某銘曰蹈父訓貞以靜壽且康全正命子光昭孫繼盛世詩書勿替隕陳倉使墓志銘吾州里近歲稱善人必曰陳月卿詢月卿所以善必曰急義出天性不矯昆弟同堂二十年其資産不私由役賦輸率先奉令不懈族姻交朋假貸或疾喪乏絶周恤不拒歲歉發廩輒殺其直不校鄉鄰忿爭訟鬬常持平排解不激館師加禮踰倍不靳遊士與凡挾術藝踵門各滿意去不厭至自奉即缺然禇衾敝絮一榻不侈也噫如是而曰善斯可矣聖賢以善律人其綱條固不止此然度君所能至復何以加此愚夫鄙人吝一金至亡軀捐命其摶噬無厭足若飢虎者安得不愧此也月卿名評世居南豐之橋南能拔起洗濯大其家聲復能觀書識大義教子習文事尤喜與方士遊郡嘗選為豐儲倉使以材稱卒不願仕年五十六以疾終至大二年十一月七日也明年七月丁酉其子奉柩葬集賢耆之黃家塘與厥配徐氏同壟而異坎既葬來求銘豫聞古有馬少遊者以鄉里善人著名漢史君善人也吾銘以補史銘曰流光未頺而遽重昏斂其福報遺留嗣昆善人之墳以銘永存孺人傳氏墓志銘豫妻傅氏建昌南城人宋都官某之孫雲麓隱君某之女母羅氏宋咸淳丁卯歲歸於我歸附後大德癸卯歲十月七日終於正寢年六十有三至大辛亥歲閏七月己未葬于州北二都韓坊之蕨亷窠男三人龍瑞鱗瑞鸞瑞而龍瑞先十五年歿孫男二人渾深而深為龍瑞後女一人德三娘尚幼其山龍自兌來坐未向丑與仙女峰對書此所以記其墓也其平生貞淑柔靜不妄言語孝事姑敬待夫教子寬恤下慈亷取而樂豫勇為善而好觀書與夫縫紝繡組精巧過人蒸嘗饋祀豐潔靡惰是皆可書而未有名世如歐曽者請之書豫不得不略書也悲夫銘曰三十七年同我甘苦所愧為夫何辭銘墓前將仕郎趙伯宣墓志銘皇慶壬子歲秋八月豫坐延平廣文舍小暇覽溪南諸峰有佳色動吟興俄經生趙若洽趨而跪慘愴而言曰吾先君不幸歿未克葬將以九月丙申葬不孝孤思欲闡幽潛示光昭然傍皇無可託也敢以託先生先生而念吾先君之𨽻講下也賜以銘非私友情乎豫哀其請為述焉君諱時播字伯宣宋廣陵郡王裔孫也世居福州今為延平人曽祖公芾金紫光祿大夫祖彥挺武經大夫父澰夫泉州觀察推官終宣教郎伯宣嘗舉進士咸淳癸酉歲試福建運司中其選明年援登極恩授將仕郎甫待銓值革命徑歸隱至大四年十有一月某日以疾終年七十有一娶林氏子男一若洽也女二孫二卜兆劍浦縣之黃煎坑豫所書止此若洽復來前曰吾先君平生寬慈而謙謹勇為善而樂聞過恤族姻鄰社而鄉譽歸之居間三紀典籍自怡退然庠序間恬不作榮進想而士論推之蓋其子之述如此故併書焉惜夫公族之信厚而止乎是也初豫署事甫兩月而伯宣逝其文會也不數故知之也不詳然伯宣嘗對豫語惴惴不妄發有以知其非口給取憎者氣質近厚有以知其非暴戾險譎者謂之善人人將曰可畀以銘烏乎不可銘曰黃煎之山幽幽黃煎之水悠悠有美若人歸全斯邱銘不磨君奚憂中大夫延平路宣相杏林公墓志銘公諱伊爾圖呼蘭其先回鶻人徙燕今為燕人所居種杏成林因以自號父某嘗總治鷹房事世祖皇帝以才辨被眷遇仕至工部尚書公幼隨侍邇清光因謀進尚書曉之曰兒乏詞辨慮倉卒奏對失次適自纍耳乃以中書選為蒙古譯史博通諸國字語既慎且勤為時相所信用會攻圍襄陽缺馬公被檄馳河朔括馬不踰月得騋駿數千赴軍大得濟又馳山東督餉遄告辦復得濟時相稱信愛久之積年勞宣受完州逹嚕噶齊年甫三十初筮仕即紫綬人羡早貴凡再任為許州真州逹嚕噶齊入為萬億庫提舉亦再任出為江陵路同知七年授中大夫延平路逹嚕噶齊乘傳開藩延祐二年三月也政尚寬靜不弛不貪不作威弄權尤不忍興造煩民所專轄驛駟弓兵程督雖嚴無豪分擾鄰郡汀有屬邑曰寧化寇突至破之披昌振鄰將樂元邇封也民驚潰空其邑公間亟提蠻卒馳救又萃諸邑義勇佐官軍公指畫分屯寇諜知不犯公坐鎮兩月綏招逃散邑復全乃還府府倉受糧歲委長二更迭監臨類有私覿是歲公適當次嚴禁令鏟宿蠧廩無敢以私進故輸送速辦公私忘譁明年臺察臨郡多所糾摘風動氷立亷知公無玷善待而行公笑謂豫曰繼今慎而益慎矣又曰吾齒寢邁吾將自休吾圭租自贍外節其嬴堪謀生而逸老矣入夏縱啖冷瓜暴下不飲藥五月十五日卒年六十有七邦人賢而哀之其家發遺篋乃見無所蓄藏隨身適用而已人以是益信其果不貪也夫人某氏子男四曰瑪哈曰大都律俱未成丁餘二尤幼歿三日禮殯于溪東二里之小沙實葬也搆亭覆其上九月亭成夫人使子來乞銘曰我公雅敬惟老師父師父亦雅知我公盍為公述平生大略傳之子孫乎豫哀其請輒述弗辭因思西北人材率雄傑悍鷙尚武而嗜殺意者天地徑氣攸萃耶而公獨稟和易趨尚文雅通儒書禮秀士喜談仙佛善作大字綽有中州風度其鍾天地之仁氣者歟胄出西土而種靈特異者歟噫善人亡矣可哀也乎銘曰仁氣篤生西極異稟譬彼璞玉天質孚尹地分千里秩崇三品施也弗閎霜木凋隕民懷循良士頌謙謹燕雲超超託此旅殯雙溪徴鏡九峰插筍桐鄉之思百世弗泯前朝請大夫邵武郡侯黎公墓志銘公諱靖德字共父永康軍𨗳江縣人初仕閩壻于南劒將樂之黃因家焉遂為閩人曾祖棻登紹興進士科知成都府新都縣纍贈少師祖伯巽登淳熙進士科夔州路提刑贈正奉大夫父自昭知惠州贈中散大夫叔祖伯登直顯謨閣知瀘州兼潼川路安撫使愛公醇謹務學奏補將仕郎淳祐丙午試吏部中選調南劍州沙縣主簿滿授常州録事未赴服中散喪既祥監行在端平倉又監交引庫幹辦江西運司公事侍郎魯公頴荗尚書洪公燾踵為部使者二公俱當世吏師於屬僚無所假借獨奇公連剡推舉由是赴景定甲子春班遷京秩知撫州宜黃縣避親改邵武軍邵武縣用年勞賜服緋魚公邑政清慎四封安和既授代通判建昌軍時郡守多急政公佐以寬簡民便之公餘杜門勤書纂次晦菴語録分類成編刻諸江西書院士便之移通判邵武軍授代趨京會賈似道出督潰遁王陳二丞相更化公封事極陳缺政切直無避且獻救急䇿王相閲視大喜署其後謂鑿鑿皆精實語擬擢丞相掾適邵武寇張民呶郡守遁廟論謂公兩仕邵習知情偽除監登聞檢院出守邵武軍免陛辭兼程至郡綏靖整飭𣙗􅝨帖妥德祐乙亥八月也是冬江西制帥黃萬石遁入閩隂懷異志兵民洶洶公慮汙玷解印綬去隱將樂縣之珠嶺葺斗室將老焉明年冬十月三山行朝除公軍器監丞都督府參議官不赴俄剽寇蜂起有魁渠伍姓者衆掩至公寓所空其資而火之公遂不免十二月三日也年止五十有一官至朝請大夫子男二逢原將仕郎奕原繼姻家鄒浚孫男一仲仁公遇害之明年逢原哀訴憲府部使者陳公元英捕伍冦梟首刳心為位以祭公其文有曰世之治也君子在位為守為牧世之亂也君子在野為魚為肉矦死賊手何禍斯酷又曰我興弔伐取賊刲腹剖心以祭矦其暝目逢原既復父讎奉其柩殯僧地未襄事逢原亦歿惟仲仁存流寓光澤矣嗚呼悲夫昔公之佐盱也亷靜簡儉自處如寒士揮屏塵俗不苟交接豫特以斯文相契辱愛等骨肉焉其守邵也禮聘荐至豫以親老辭弗克赴及其隱處也猶間道馳書相勞苦且曰暫寓劒邵之間若欲使豫知而嘗相聞者噫孰知一旦顛隕至斯極乎公歿且四十載豫沗仕閩嘗沿憲檄行縣至將樂首訪公遺蹤無存焉既代還經光澤物色仲仁幸見焉而亦中年矣仲仁曰吾父葬光澤吾將迎吾祖而就葬便時省也出行實請曰葬必有銘非先生其誰銘豫于是愴然緹襲以歸歸而孰復則公之平生歷厯在眼忍不銘乎自古海播塵揚時薦紳大夫士不幸羅墮凶逆者何限而公尤可哀者清規奧學亷聲惠政宜有載雲旗射天狼以相翼佑者顧亦若是慘則理之所不可推也理不可推亡所歸咎則奈何諉曰數爾嗚呼悲夫銘曰蜀文獻家圭組滿門奕世生賢清修而文時危抗章朝野傾聽專城幾何朱光西冥遼東避世吾慕幼安狼虎血牙聞者辛酸踰四十秋魄始復土生死交情為公銘墓梅溪范隱士壽基志銘延平古多幽人逸士或繇仙佛成道或用方術著名豫宦是邦談經餘暇嘗願交一二不可得晚乃得一人焉曰梅溪隱士范君挹其貌肅而和聆其言質而通詢其世則宦家叩其學則昔為士而今遊藝者也習儒術弗讎習修錬術嘗結廬空山終歲入靜尤喜習青囊術談龍穴卦應甚神常為好事者延致自言曽厯東南山水間覆驗古仙人所建立若城郭若寺觀若陽宅隂穴無一不按經據典故禍福興替無一不響應又自言吾家生理微而冡嗣息因求諸地理以救之得于其鄉之東溪一以瘞二親一以瘞子婦既而育孫三俱秀敏可望而家道亦漸昌又得其一于龜山留以藏吾蛻也其説皆精實入妙自信不惑謂景純筠松決不誤來世謂人間成毁升沉決由隂陽風水出豫素迂僻不通解然聞君言若此固亦深服君之篤信此也延祐丙辰歲夏五豫將乘驛還江西小駐城西之招仙一日君過我曰葬必有銘禮也然銘之美惡死者何知曷若未死而得銘乎吾死期遲速未可知而死之必不免也吾知之矣幸未死又幸辱知能豫賜一銘乎豫曰古之人有自挽者有自志者有諛墓中人者乃若生而刻銘非古也是殆不可且葬也而銘蓋逆慮夫世逺墓湮或至暴露故刻金石著姓名紀言行庶幾後人哀而掩閟焉此孝子慈孫事非墓中責也是殆不可君曰自我作古庸何傷且以此彰吾達又何玷豫強應曰諾遂為志曰君名起莘字希尹世居南平縣上芹鄉之梅岐里因號梅溪曽祖某某官祖某某官父某某官母某氏娶某氏子某蚤世孫三震艮坎君今年甫六十有三壽未艾也故缺其文以俟曰歿以某年月之某日葬以某年月之某日異時掩壙即填而刻之銘曰龜山聚氣強龍獻瑞未葬而銘何太早計吾銘不可妄得于以成人之美斯文斯邱千載弗毁前貢補進士宜川葉實夫墓志銘葉于撫宜川為聞家宜川于吾豐為接壤以故豫少嘗識其先世字季武為邑丞者其人忠信而文有德人雅士之風豫竊敬之别一周甲子逝且遠矣已而吾孫辱壻其門視丞公妻祖也公有子三長字實夫于吾孫妻伯祖也豫不逮識實夫然知實夫蓋端厚執禮如乃翁勤敏篤學如乃翁也蚤歲馳英聲嘗試咸淳文場兩中選赴成均輒報罷又嘗隨侍仕康廬膺禮聘講洞學當是時實齋劉公漢傳負朝望領郡鑒裁特精與山長孔君某俱異待實夫資其談經用淑䘳佩久之將振厲鋭進繼躅前芳會溟翻埃昏修塗蕪薉于是韜閟芒浮遊消搖庶幾乎馬少遊之為里善人而龎德公之遺子孫以安也又久之鄰封嘯篁蔓延踰境乃至廬燬櫜空震蕩竄匿無寧歲有司病焉采里望堪屏翰者得實夫檄授鄉正實夫應接綏撫舒卷中機逺邇卒帖息實夫性至孝奉八齡之親于鋒刃紛糾中常怡顔不違性復嗜學當科目一新時督兒孫日誦習不倦既壽且康意若有待于振家學紹祖風乃不幸而年止七十有六延祐乙卯歲二月五日逝矣實夫諱天秀曽祖某祖某父同德臨江軍清江縣丞母某氏娶某氏子某孫某後二年丁巳歲十月某日葬其鄉治命也先事其子述家傳來丐銘讀之辭迫而意哀豫竊以為毋庸哀何也夫承家為孝子居里為善人處儒林為吉士昭質不虧歿無愧矣而又奚哀宜畀之銘式慰爾後銘曰昔人有云雖拱璧駟馬華屋翕赫于生存之前不若片文隻字斷石漫滅于零落之後旨哉斯言人以文壽嗚呼實夫展也不朽皆山黃隱君墓志銘豫仕閩久告老歸詢鄉社年相若猶存者幾咸曰某垂八齡某踰八齡俱康健也而黃君子榮與其一又詢里吉人擅令譽享厚福者幾咸曰某好善崛興也某積善寖昌也而子榮亦與其一竊喜夫里之賢而壽者多吾猶及見且諸老猶待吾歸見彌足喜也雅欲合從選勝稍娛晚節乃倐聞子榮逝未之信也已而其子君厚托行實來丐銘信矣又竊悲夫風鐙之易零樂事之不可期也歲既晏而孰華豫其何忍執銘筆耶將固辭顧疇昔識子榮交君厚無容辭則采其實為志曰子榮諱必達先世繇洪雙井析派家南豐之白田曽祖某祖某父某俱務實趨善漸致豐裕子榮是承是懋滋充盈卒大其門為人魁岸有楨幹質實無畦穽解紛周急環里傾依而有司亦才之凡盤錯輒資其力當寶祐戊午訖德祐乙亥鄰封薦警獨能糾合綏靖屛翰東鄉逮世易糜潰時復能弭凶植良民用安堵暨至元己丑汀畬繹騷將薄州州且潰獨能部勒民義為王旅先由是聲聨勢張州恃以完不憚勞不希賞有司尤義之豐之自邑升州也奔競成習往往挾資取名迂視儒術獨能矯俗從文隆師訓子無虛歲晚亦樂親章縫有加禮君厚得以搴芳士林父教也所居池臺頗占地勝有太守過從悅之為扁曰皆山故自稱皆山翁延祐丁巳春正月十有八日疾終于正寢年八十有三娶樂氏先歿子男二天祥蚤世君厚需次吉安路龍泉縣北鄉巡檢孫某三月庚申葬黃柏原之瑤坪阡嗟呼子榮善人也而止于斯不小待耶如小待即風日佳時山亭野寺龎皓三五倚笻携觴相與尚齒貴德俯仰昔今或揚厲月評扶善警姦于以厚里俗輔民彛蓋太平時美事而止于斯不小待邪安能不使後死者之浩然長歎也按司馬公書儀王公以下三月而葬君厚亟襄大事是之謂禮宜得銘銘曰壽且福無不足兆協卜安斯麓貢補進士王君墓志銘前貢補太學生王君正父諱守正家于南豐太平鄉之三原年七十有七以延祐丙辰歲三月五日終于家之正寢以明年四月辛酉葬于里之蓮華岡先一月其孫孟瑋銜諸父命奉行狀跪而進曰先大父雖未獲交先生顧先君嘗辱交矣先大父歿未葬葬有日未銘也敢援先君故好而丐銘幸諾焉是吾三世藉以不朽也敢請豫因思正父居同郡生同庚學同業今其請也勤何愛幅紙數十行不以章潛德慰孝思乎遂應曰諾惟正父幼機警酷嗜學于學也根于恕故以如心自號于親克孝厯世變顛沛中未嘗一日失歡心也于弟昆友讓均于子孫繩約嚴于友朋敦信義死生無負于僮奴視才短長指授雖跛聾無棄于趨善勇往如家量出納無二是也凡此俱狀所已書豫竊有特書者焉吾豐素稱文獻邦往昔無論城闉里巷東阡西陌伊吾聲常相屬化美成俗槩以不儒為恥故雖粟連厫金盈匱昂昂峙閭右然而誦弦不接于其鄰章縫不踵于其門即清議卑鄙之曰何物俗子也率見擯于卿士大夫由是負資力知愧赧者爭自憤厲滌濯粉澤緣飾冀以免守錢奴多牛翁之譏而曰吾士矣抑猶有狙服竄名姑惟誑愚掩羞而實不學即清議復卑鄙之資以為笑當是時誠意向儒斯文自貴惟三原王氏最雖宗茂支蕃慕向或殊而其專勤比于寒寠貶損忘其侈汰惟正父伯仲最以故伯氏通父試景定甲子中選上南宫正父試咸淳癸酉亦中選補成均久之通父逝正父衣冠儼立兀兀談經義世易矣志弗易也宜特書狀又言正父苦學由天性雖亂離蕩析猶結茅依崖誦讀琅琅雖莫色蒼然猶搆家孰祀先聖率子孫寅奉如禮雖利習瀾倒猶建樓儲書常留賔論辨為樂其富而好禮也又宜特書嗚呼習俗移人賢者不免昔人嘗悒悒于是矣壯老好修揮絶蕪穢空山寒日郁然與簡編相始終若正父者殆蕭艾中之蘭茝歟惜也不逮識君而止銘君也曽祖某祖某父某子某孫某銘曰飲一瓢食一簞嗇矣唯克巳好學也聖人賢之有民人有社稷侈矣謂何必讀書也聖人斥之猗嗟正父傾心儒門詩禮芳潤昌其後昆後昆能勤亡也如存趙聖清墓志銘故友聖清趙姓孟沁名石塘其自號建炎自汲南渡始為南豐人承節郎諱師齊之曽孫運司貢士諱希康之孫吉水縣主簿諱與訪之子也前代王孫之遺胄庠序之秀士州里之吉人也不表暴以眩俗不輕儇以肆志而惟端謹寡過克循矩度者也不沉溺于曲學而惟專經屬文志取科目雖時不逢而學不廢者也不慕薄俗之華侈而惟守儉勤致豐裕退然務實自適者也其謙篤若是即怡愈壽康宜也乃僅六十有三延祐戊午歲正月某日逝矣悲夫昔歲豫沗領鄉校苦乏助采士譽資聖清為助當是時搆創一新學務叢委聖清謹出納嚴程督調娛補苴績是用集豫固喜之比歲豫仕閩久乃歸歸欲亟見聖清則聞病痱久謝客矣豫深惜之今年首春造其廬聖清矍然迎待論心移晷見其神情步履若平素豫又特喜曽幾何日遽傳疾復作不可為悲夫孰知此一見乃竟為永訣乎一日其子由來言曰將以五月某日葬州里五都之池原未有銘也敢請豫欲辭以同庠故無容辭聖清娶林繼王子男四女四孫男一女一銘曰石為塘兮齒齒塘之水兮清泚其瀦也深其潤無止何斯銘斯式表善士寧海州倉使孫公墓志銘郡少尹孫侯家寧海而仕南豐三閲歲將賦歸語豫曰先君倉使棄諸孤殯淺土有年未卜兆也吾反吾廬逝不親它務惟窀穸是務庶其少贖不孝罪然墓必有碑碑必有銘銘必有所託託之先生能勿吝乎豫謝何敢吝直愧弗文將無以稱顯揚耳于是掇其家譜而為之述按孫氏故復姓公孫也肇自遼西之令支世悠遠莫考略見于史者曰度曰淵疑即其宗顧不知何年去復而為單姓又不知何年析其𣲖居燕復自燕徙寧海遂為寧海人公諱公佑字翼之其諱希而力穯興家者曽祖也諱福而仕金為評事娶田氏者祖也諱時英仕元為戶部郎中娶沙氏繼解氏者考也初戶部公生三子伯曰公亮仲曰公佐並受朝命為啇山鐵冶提舉儒書吏牘博習兼濟俱時論所器重季即倉使仕鄉郡不大顯而其德義律身禮法齊家厚族睦姻拯難賙急能使州里稱善人猶如二兄焉二兄徙家青社仕寖顯家寖昌公處寧海故宅其子孫蕃家力裕亦如二兄焉提舉公之居青社也家有木函備貯儲嵗在辛未有柏一根産函之底芳馨蔥蒨聚觀駭異公喜曰是謂壽徵其吾家眉壽之占乎時甫中年已而與長弟果得壽近九齡倉使公亦如之大德甲辰嵗偕夫人郭氏同躋八十逺邇慶羡頌歌聨軸靡不曰積善之報也公既享髙年膺厚福及見厥子之榮官清時暇日夷猶樂天又靡不曰行地仙翁也以大德某年某月某日逝年八十有二夫人以某年某月某日逝年八十有四男好直承務郎同知南豐州事次好禮博興州稅使次好智膠州吏目孫男自恭至寧凡六將以某年月日奉公及夫人柩合葬于某鄉祔祖壟也昔有從寧海來者間為豫道孫氏世以德善著豫固未之敢信今而福壽之報彌章世宦之榮弗替斯可信已易曰積善有慶書曰天道福善允矣不誣嘗聞叔敖以瘞蛇致卿相鍾以設瓜感真靈派胄雖殊抑何孫門之多善人而天之于是宗又何其多顯報邪彼有不信夫為善之必有報而天道之必不昧者其尚鑒于孫氏哉銘曰孫起遼西蔓延山東有門其崇積厚報豐維倉使公棣鄂森秀雙慶眉壽子榮孫茂考終有年窆于新阡惟善故傳永耀銘篇奉議大夫南豐州知州王公墓志銘公諱著字善章姓王氏東平人也東平文獻郡自野齋李公集生徒講家孰襟佩雲赴若河汾伊洛間雖賦資有敏鈍進學有淺深凡一登門經指授無不取中于時往往資以致名聲規仕進公其一也公家世仕金為顯宦有封國于魯者已乃中微至公生而幼慧崛起屹立既長偕同志事野齋日侍書䇿琴瑟間薰染成質駸駸頴出寖長習文事明法律得推擇為吏至元中繇尚膳監徙軍器監典符移有能聲久之出掾福建行省入領西山灰場積年勞登品從初授平江路長洲縣丞府命監視平淮庫庫官吏侵盜鈔本至踰萬錠上下互蒙蔽公白發其姦犯者懼厚賂公公不為動事聞優升一等授建德路遂安縣尹元貞大德間授湖南道宣慰司經歷滿授潭州推官不赴改授信州推官滿宣授杭州路稅務提舉當丁未戊申間閩越飢疫露骸橫藉行商景絶由是課大虧督補急星火公傾資均償至貸負無怨言後更以最聞延祐初擢南豐知州州閩贛接壤也地僻罕迎送民淳安耕鑿戶無豪俠里無推薶公順其俗而撫柔之一惟以平怒為政本絶摉求禁動搖民用大和鄰封南城縣緣偽鈔縱首惡妄指株連州民至數十尉領卒踰境會巡檢掩捕若劇盜然田里洶洶公奮曰良民也吾知之宜急救不救即數十人死數十家破矣纍移檄駁止且戒巡檢毋曲徇尉失意去民獲全咸額首戴公郡庠禮殿素雄峙一夕梁蠧棟傾貌像幾仆亟議修顧役重力殫官士俱失色公曰吾有以處勿憂也稽簿書搜遺餘得有司所封貯舊學租謬指為貢莊粟者凡四百斛請于省易楮市材奐輪增耀復飾衮冕像新櫺星門士刻石頌功焉州東祠仙真曰王侍宸職雨暘著靈異嵗頻亢旱公才往禱靁雨輒踵至或淫潦復往拜即雲收日舒如翻覆手若此者屢咸駭異之公為搆山亭表仙蛻以故雨期嵗農無旱潦憂由公力也嵗首嘗逆計艱歉先期騰牘丐早發官廩且重殺厥直以優民逮耕耨時至則備豫而食足矣民不待哺亦由公力也郡有候卒抵罪獄垂成繇徑祈免主吏且隂助公曰不可事干刑名敢徇情曲法乎正其罪聞者歎服嗟夫公之于政績也小施爾假之嵗年丕展素藴漢良吏不分半席乎不幸緣小故往建昌嬰暴疾亟輿還州廨甫一日卒矣延祐巳未正月十有七日也年止六十有七官止奉議大夫悲哉公之初領郡也豫仕閩未之識然遊士延譽家書傳音率稱道公政由是知公名暨豫代還甫謁入即倒􅨌傾豁若素交豫不省奚以然也其咨訪政理賡酬篇章無虛日謙和慎栗言洞肺腑一不作世俗矯偽狀且命長孫來受經焉豫又不省奚以然也思公笑言厯厯在眼悲哉不可作矣曽祖某祖某魯國公考祐妣馬氏娶李氏子男三子誠子達思文女一適同郡趙世顯孫男二長英孫次元豐是嵗四月載柩歸葬東平故里諸子來丐銘豫坐老病固辭且曉之曰而翁故舊滿朝名世巨儒提大手筆者滿朝子歸而求銘宜也銘豈豫所得為諸子請曰世之欲得銘者率隂祈達官顯人假條冰輝映不計生死交情也惟其然故序載失實而傳播致疑徒自欺爾銘猶不銘今而吾父所雅敬惟老師老師復深知吾父則夫以郡士而紀邦侯也公以知己而秉銘筆也直吾父無知即已如有知也銘由老師出九原不慰乎豫聆斯言而益悲乃為銘併書其近事之一曰公義不忘師門嘗逮請放魯齋許公故事命野齋李公列從祀聞于行省是之轉聞于朝矣擬奏稟將獲可銘曰王為顯姓曄奕東魯言亢其宗有善章父魯國之孫野齋之徒盛年亨衢才名于于秉麾南州政平民悅夷路佹傾六轡驟蹶丹旐北歸州人悲啼畀此銘詩永世之思李氏孺人墓志銘里同姓有名希龍字浩可嘗厯吾州行用庫副使者一日請于豫曰頃不幸遭妻喪窆有坎葬有期而刻未有銘也聞諸士論凡歿而有足稱者類辱銘于仁人不佞敢請豫惟寖耄且昏將揮屛翰墨謝塵事安得復效唐賢諛墓中人哉即固辭已而其請益力曰吾妻非有封爵贈諡也亦惟是婦道母儀粗有足書顧弗獲片言掩諸幽是墮大倫閟潛德仁人其忍諸豫于是蹴然哀之乃俾述其平生曰吾妻同鄉李氏諱妙靜其先世嘗試童子科至今人稱李神童家家故尚禮法其在室也濡染母訓貞靜婉淑其歸于我也能勤能儉能協和中外飭家務其于子孫能律以矩範勉以詩書其待姻族能篤恩義得歡心其視鄉鄰貧乏能賙恤不吝而其于釋教益能崇信常捐金搆創不倦也歿以延祐戊午十月之某日年七十子男四長惟一後一年歿次某某某孫男四女五葬以明年八月庚申實本鄉之五龍坑若此皆其夫之述而不假于人之諛信斯言也少為淑女壯為令妻而老為賢母所謂可書其在兹乎浩可家吾州里世稱善人迄今羣從及其子若孫俱朴茂端謹弗侈弗矜而李氏復篤于善濟美夫家其豐衍未艾也吾知之矣故畀以銘吾觀古昔賢婦人其制行卓異者率載之史其不至于卓異不得列于史則託之銘銘而傳猶夫史也吾銘豈輕畀者銘曰為婦而賢為母而壽歸全斯邱式裕爾後陸郡彭氏墓志銘吾故人宗正寺簿寶塘黃公之曾孫曰瑞曾昔請婚于吾里故人提舉彭公之長女孫曰德玉既獲諾久之瑞曽承父命來受室于彭因館甥焉甫三期將于歸行廟見禮拜舅姑堂下不幸遽以疹疾夭惜哉瑞曽嘗從豫受經一日踵門愴然曰薄命失助負吾親望無以為懷矣吾乃祖乃父俾歸柩于黃氏之阡而吾婦翁素鍾愛未忍遽棄捐也酌情從宜姑就窆而為後圖惟是冡隧有刻敢以纍先生先生能不替世好乎其賜之言以泄瑞曽之悲豫老矣不輕志人墓抑二姓俱平生老友而于瑞曽同筆硯誼難拒于是閲其狀有曰志女功執婦道平居無厲聲疾色柔和儉勤罔有間言能事父母如舅姑能于弟姪加友愛雖未逮事重闈而嵗時致禮省問必嚴必敬如親見之故吾二親之聞訃也相向而哭之哀疾驅百里臨其喪豫閲狀至此不待終曰足矣可以稱賢婦當吾銘矣儒家女服習禮訓養成淑質宜不與流俗庸婦同惟其夭也故可書者止此誠獲永年供甘旨奉蒸嘗宜家睦族寧不為瑞曽之良助今而止乎是也天也人其奈何曽祖日新贈宣義郎祖履道從仕郎瑞州蒙山銀場提舉父祿孫未仕母鄒氏女肇娘甫半嵗大德丁酉三月某日其生也延祐己未七月四日其歿也某月甲子其葬日也某山某原其藏穴也銘曰儒家之女為儒家婦結縭維新風鐙何遽駕言于歸竟化坯土斯銘何悲為思厥祖水雲村稿卷八
