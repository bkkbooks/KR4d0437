body:
  text: 水雲村稾巻十四元劉壎撰公牘代包尚書申省乞朝假狀咸淳丙寅昨準尚書省劄子云云給假一月候滿前來供職者恩㫖薦頒孤衷增感伏念某棲遲莫景眷戀明時清朝未忍於棄捐優詔僅䝉於予告恩綸稠疊寧忘魏闕之思藥裹纒緜靡遂漢廷之恃今者年益加大病殊未瘳雖出入庭户以猶艱豈奔走道途而無苦輒陳私悃俛念顛危欲望公朝特賜敷奏更與給假一月少需煖淑庶便老癃實拜鈞造生全之賜代申省乞蠲租免糴狀咸淳戊辰夏鄉邑水災逺近艱糴人心洶洶予日慮冦禍六月初遷避建昌城中未久果聞嘯略四起八月八日賊破邑大焚略而去是時朝㫖下江西運司於諸郡和糴米數十萬石頒降官誥度牒銀楮四色為糴本數内建昌合糴三萬石南豐與焉予聞之惻然曰邑虚矣何堪重糴乎即思以救之適雲舍趙公必岊新注雩都宰歸亦寓盱城居相鄰因約其同謁鄉達尊包樞相恢陳尚書宗禮曾侍郎頴茂黄侍郎萬石易安撫士英請為聨衘列上於朝祈免糴又祈蠲租諸老俱然之陳公命予亟具稾以進即備公劄聞於賈平章似道未幾尚書省劄下盡從所請租糴兩免次年春夏遂免艱食云某等跧伏田里囿身化鈞自安其愚詎容妄有陳述兹以事變出於鄉里事體關於朝廷冒昧籲呼仰祈鈞鑒某等生長建昌竊惟本郡山多田少素非富饒而南豐一帶又接閩贛民俗慓悍輕生習兵纔遇水旱無聊輒嘯聚稱戈負固挻亂致上煩于有司今年春夏以來積雨霖淫谿澗漲溢至四月乙巳大水五月壬戌又水拔屋宇衝田疇葢四縣皆然而南豐則平原出水災變尤甚東西彌望莽為沙邱牛畜種植多没巨浸廩儲溼腐告糴孔艱於是强民結聚者四起州郡為之調兵鎮壓遣榜招諭而後定曾幾何日被水者修補廬舍未就葺理縣市未成忽八月初本縣管下峽村賊首羅動天等聚集兇徒焚劫鄉落竟以初八日辰時掩襲不備長驅破縣虜略財貨婦女殺死宗室王民本縣無兵無城徒手受冦邑􅀈市肆悉盡于烟燄之中生靈老少多斃於賊刃之下僅得尉卒數輩短兵巷戰而寡不敵衆莫遏其鋒賊埶既長好亂者衆邑距郡不四舍朝發莫至蕩無隄防近城居民率竄城内傍連贛撫屬邑如寧都宜黄無不震動弱者徙家逺遁强者團結自防州郡始調廂禁寨兵結約隅總邱應祿胥廣趙集義兵攻圍賊洞幸擒元惡己正典刑同黨羣兇或逃或捕既而憲司軍馬踵至雖可少安然郭内則瓦礫蕩然奠居無所諸鄉則側受冦燬茅葦相連生者骨肉流離死者肝腦塗地甚可痛也某等竊念南豐自紹定己丑廖冦兵火之餘凡二十年創痍僅起而寳祐戊午之張冦起焚蕩劫略一夕為虚郡家急於繭絲草草收拾甫及十年痛猶未定而羅冦繼起四十餘年三經殘破寒厓赤子斬然無一縷生意秋成納稼民食所關而始以洪水之漂流繼以兇燄之焚略又繼以軍馬之蹂踐田疇刈穫能有幾何况邑之宿儲空於水鄉之積貯空於劫市井之生聚空於火疾痛呼天安得不仰祈一分之寛乎共惟寛大之朝仁恩旁達元勲當國澤及隱微凡州縣兵荒毎拜存撫今南豐水盜兵火交逼沓至尤宜興憐欲望公朝曲垂軫念特降㫖揮行下建昌軍將南豐民户二税蠲免一年其本軍和糴米年例四縣總計三萬餘石併乞劄下江西轉運司行下本郡將南豐一縣今年合糴之數特與除豁令運司收回糴本庶幾寛恩所被民力獲紓亦見本朝仁逺之意顒望鈞慈亟賜報可某等當與下邑黎庶永戴洪恩干犯鈞嚴下情不勝俛伏俟命之至咸淳四年十月日右武大夫閤門宣贊舍人主管華州雲臺觀易士英朝散郎集英殿修譔黄萬石通奉大夫寳章閣待制曾頴茂文華閣直學士大中大夫陳宗禮資政殿學士通奉大夫致仕包恢劄子是年十一月尚書省劄子下建昌軍仰將南豐縣民户咸淳四年夏秋二税蠲免一年外仍劄江西轉運司行下本軍將南豐縣咸淳四年和糴米照數蠲免收回糴本併劄送包資政等官准此代申省為陳參政請諡狀竊惟聖經存節惠之文清朝有錫諡之典所以旌别淑慝昭示來今儻非依賴於鈞陶何以煇光於泉壤伏念先君樞參資政年垂七袠厯仕兩朝清介方嚴不混流俗平生勁直之節著在朝廷簡靜之政行於郡國為學官因冬雷上疏語侵大臣鄭丞相惡之而斥為宰屬因陳四大願厯詆時事丁大全惡之而又斥景定更化天日清明起散地乘軺傳觀風嶺海一道肅清中間雖以詩語為御史虞虙所誣徙居二水而元宰當國察其非辜曾不踰年㝷叨擢用由庶僚而登言路由言路而升從班彈擊不避貴權論思必主正大一時忠言讜議以之為首端人雅士以之為宗出帥羊城以清約洗貪風以安靜鎮逺俗至今南人歌思靡忘暨登廟堂守正不變雖莫究大用而天下善類識與不識翕然以名節稱之其持身處事治家居官皎皎無毫髪磨玷至若讀書講道勤苦自厲則壯老猶一日也公朝為之贈官加賻恩全始終亦既哀榮無憾矣永惟墓草已宿壹惠未章不肖孤零丁待盡弗克顯揚深懼先君名實與草木俱腐無以贖不孝罪謹繕寫行狀一帙叩首百拜以請欲望朝廷俛賜矜念或䝉特達密啟徑降恩㫖為易其名或䝉下之有司從公議諡豈惟不肖孤誓報洪恩九原有知亦將永永戴德其無斁某冒犯鈞嚴下情不勝俛伏俟命之至呈州轉申㢘訪分司救荒狀大德十年丙午歲春夏間江浙大饑吾邦與鄰郡皆然景象惡甚予不能安條其事上於郡適分司官至因以聞竊惟民間或有疾苦學校所當開陳本州歸附三十餘年多遇豐歲民各安生亦曾間有艱糴之時然止是小歉不至大傷惟有今年凶荒特甚豈非歲在丙午自古以為戹㑹邪即今饑民充塞道塗沿門乞食扶老携幼氣命如絲菜色雷腹行步傾倒一村一保之間兒號婦哭所不忍聞葢縁此州本是窮原去處山多田少地狹民貧雖遇豐年猶有不給自大德四年以來連年不熟罕有積儲至七年八年則旱損其半九年則蟲傷尤多民户輸糧還債之外所存無幾上年臘月農家多已無飯度歲矣苦捱至春又遇雪凍閏月以後淫雨連緜至三月二十一日夜半西鄉峯嶺等處山水發洪衝田拔屋莽為沙邱如秧如麥俱巳蕩盡沿河一帶彌望蕭然常年猶有鄰境可以通融今則鄰路俱荒四境斗絶常年猶有蔬菜可以助食今則久雨浸淫蔬菜腐死常年猶有客船運米可以接續今則州民前往下江販運多被龍興撫建闌遏不許到州常年米碩價止中統鈔一十兩糴戸猶曰艱難今則價值日增倍而又倍且又夾雜水濕沙糠舂簸之餘一斗僅得七升而已以此展計毎碩乃成三十兩之上小民久困鈔從何來以至將屋宇園畬絲麻衣服牛犂器具甚至猫犬等物俱已典賣應急自春至夏厯日滋久葢亦罄竭矣且糧多之户不免猶有缺食者耕農之家困乏可知弱者忍饑待盡强者率衆開倉或有百十為羣突入大家升堂入厨需求飯食必待烹豬給酒醉飽乃去既曰饑民誰能抵拒亦且數衆叫囂震驚以此税户亦不安居往往搬移回避景象殊惡葢三十年所未見也居是邦者廪廩度日幸䝉省府矜䘏纍次發糶官糧儻非得此賑饑則餓死久矣又奉榜文委官勸糶伏覩辭意哀矜懇切洞察民病百姓見榜歡聲如雷以至感極而泣然官倉所糶毎户多者五斗少者一二斗而止略計人口不同大槩僅充五日之食所食既盡又只忍饑今纔五月上旬相去秋成尚逺兼本州山深地寒止宜晚禾惟有近郭鄉村略種早稻通計十分之内早稻止有三分各濟本鄉何能普及近為大水衝田之後補挿稻秧比常年栽挿之時甚為遲緩恐至七月纔見收刈况又未卜有收無收凡人一不食則饑再不食則困三不食則餓且死豈能空腹忍死待秋熟乎至如逺村止種晚禾直到秋冬之交然後成熟似此饑荒正長委計利害今則未論秋後且慮目前若不多方措置不惟餓死者衆亦恐别生事端倍費有司處置伏見本州官糧除已糶出及存留年終支持外尚有餘賸乞行照勘數目接續發糶拘錢還官仍乞申覆省府乞於糧多路分轉撥萬石儹運前來接濟亦是損有餘補不足之意就乞行下龍興撫建諸路放行米船毋得阻遏均是江西地面一般饑民何忍妄分彼我瘠魯肥杞也其有富户蓄米待價固是愚而無知不䘏禍敗理宜督勒隨時平糶庶免後患可保家業至若姦民不畏官法乗時放强鼓動惡少不問物主擅取倉禾此風亦不可長所宜折其萌芽合無多出榜文嚴加禁治嘗聞古人救荒有法凡禁治閉糶之户强糴之民必將二事竝行葢以安富恤貧不至偏負如某所陳似涉激切然事急不暇徐行心痛不及緩聲如言可采早望定奪實一州生靈之幸伏乞照詳施行是年省府節節行下糶糧又專官親臨賑濟孤貧者分遣郡官下鄉勸諭大家減價發糶郡侯聶公伯達名從政懇惻奉承秋毫無擾貧富安之又勸農競種蕎麥為明年續食計所收甚廣暨丁未歲民得麥續食不復有饑由是兩歲雖歉而獲免溝壑者皆公家全活力也建請改葬鄉賢游澧州狀竊惟尊禮先賢國家之令典建明義事學校之公言伏見南豐志該載先賢數内有故澧州太守游大夫諱少游文學政事為時名臣亡殁之後已行薶葬經今百年昨因至元己丑庚寅間兵冦擾攘將本官墳墓發掘破棺取物衆皆見其金紫儼然顏貌如生衣服俱被剥去屍體棄於道傍子孫凋零無人收瘞鄰近憐其裸露就將浮土略為掩藏不復再行正葬今則又厯年深雨水浸淫牛畜踐踏此去日久必復暴露矣生前既是品官身後豈宜如此本處亦有善人肯為出力遷葬却為未曾聞官由此未能輕動本官元葬新城耆接連玊泉地靣有玉泉耆儒人黄貢元名猶方讀書知禮樂為義事謂宜委之此人倡率鄉里仁人義士及游門宗親協力維持製造棺衾將本官遺骸裝斂入棺加以釘線灰漆如法封閉結砌墳穴用石葢壓務令完牢仍於墓前鐫石明書澧州太守游公之墓致祭安奉以表先賢則澤及朽骨風厲薄俗誠州郡之美事也講究隄備湖冦事宜狀竊惟江海湖泊水靣濶逺蘆葦阻深致有盜賊出没從古不免而近年為尤甚剽劫商旅損傷官員非止掩其資財又且占其妻子㝷䡮無處生死衘寃今者李某所陳件件皆實原其事理葢縁賊船盤據水中巡尉逺在岸上追捕縣隔力無所施又賊船民船混雜波心雖有智者不能辨認為今之計謂宜别立水路巡捕司驗地靣逺近節節置立使聲勢相接首擊尾應給以官船日夜巡哨其有雇覓民船裝載者宜依李某所陳令本人經官告給印信勘合及用火印烙船參照相同見得某處某人管下附籍船户如此明白若或船無火印及無勘合即是賊船顯然彰露自無所容而水盜因可弭矣至如船居之戸規避差發則宜印烙其船及依土居粉壁例置立粉版開寫户貫人口官為置籍時常㸃視非止官府得以役使而姦盜不至窩藏此又一舉而兩利也其要在乎講之周密行之堅決又須嚴立法禁隄防巡捕司與賊交通之弊庶可戢水盜護良民惟執事者實圖利之生靈幸甚水雲村稾巻十四
