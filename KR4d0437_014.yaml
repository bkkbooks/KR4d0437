body:
  text: 水雲村稿卷十四元劉塤撰公牘代包尚書申省乞朝假狀咸淳丙寅昨準尚書省劄子云云給假一月候滿前來供職者恩旨薦頒孤衷增感伏念某棲遲莫景眷戀明時清朝未忍於棄捐優詔僅蒙於豫告恩綸稠疊寧忘魏闕之思藥裹纒綿靡遂漢廷之恃今者年益加大病殊未瘳雖出入庭户以猶艱豈奔走道途而無苦輒陳私悃俯念顛危欲望公朝特賜敷奏更與給假一月少需暖淑庶便老癃實拜鈞造生全之賜代申省乞蠲租免糴狀咸淳戊辰夏鄉邑水災逺近艱糴人心洶洶豫日慮冦禍六月初遷避建昌城中未久果聞嘯略四起八月八日賊破邑大焚略而去是時朝旨下江西運司於諸郡和糴米數十萬石頒降官誥度牒銀楮四色為糴本數內建昌合糴三萬石南豐與焉豫聞之惻然曰邑虛矣何堪重糴乎即思以救之適雲舍趙公必岊新注雩都宰歸亦寓盱城居相鄰因約其同謁鄉達尊包樞相恢陳尚書宗禮曾侍郎頴茂黃侍郎萬石易安撫士英請為聨銜列上於朝祈免糴又祈蠲租諸老俱然之陳公命豫亟具稿以進即備公劄聞於賈平章似道未幾尚書省劄下盡從所請租糴兩免次年春夏遂免艱食云某等跧伏田里囿身化鈞自安其愚詎容妄有陳述兹以事變出於鄉里事體關於朝廷冒昧籲呼仰祈鈞鑒某等生長建昌竊惟本郡山多田少素非富饒而南豐一帶又接閩贛民俗慓悍輕生習兵才遇水旱無聊輒嘯聚稱戈負固挻亂致上煩于有司今年春夏以來積雨霖淫溪澗漲溢至四月乙巳大水五月壬戌又水拔屋宇衝田疇蓋四縣皆然而南豐則平原出水災變尤甚東西彌望莽為沙邱牛畜種植多沒巨浸廩儲溼腐告糴孔艱於是強民結聚者四起州郡為之調兵鎮壓遣榜招諭而後定曾幾何日被水者修補廬舍未就葺理縣市未成忽八月初本縣管下峽村賊首羅動天等聚集凶徒焚劫鄉落竟以初八日辰時掩襲不備長驅破縣虜略財貨婦女殺死宗室王民本縣無兵無城徒手受冦邑􅀈市肆悉盡于煙焰之中生靈老少多斃於賊刃之下僅得尉卒數輩短兵巷戰而寡不敵衆莫遏其鋒賊藝既長好亂者衆邑距郡不四舍朝發莫至蕩無隄防近城居民率竄城內傍連贛撫屬邑如寧都宜黃無不震動弱者徙家逺遁強者團結自防州郡始調廂禁寨兵結約隅總邱應祿胥廣趙集義兵攻圍賊洞幸擒元惡己正典刑同黨羣凶或逃或捕既而憲司軍馬踵至雖可少安然郭內則瓦礫蕩然奠居無所諸鄉則側受冦燬茅葦相連生者骨肉流離死者肝腦塗地甚可痛也某等竊念南豐自紹定己丑廖冦兵火之餘凡二十年創痍僅起而寶祐戊午之張冦起焚蕩劫略一夕為虛郡家急於繭絲草草收拾甫及十年痛猶未定而羅冦繼起四十餘年三經殘破寒崖赤子斬然無一縷生意秋成納稼民食所關而始以洪水之漂流繼以凶焰之焚略又繼以軍馬之蹂踐田疇刈穫能有幾何况邑之宿儲空於水鄉之積貯空於劫市井之生聚空於火疾痛呼天安得不仰祈一分之寬乎共惟寬大之朝仁恩旁達元勳當國澤及隱微凡州縣兵荒每拜存撫今南豐水盜兵火交逼沓至尤宜興憐欲望公朝曲垂軫念特降旨揮行下建昌軍將南豐民户二稅蠲免一年其本軍和糴米年例四縣總計三萬餘石併乞劄下江西轉運司行下本郡將南豐一縣今年合糴之數特與除豁令運司收回糴本庶幾寬恩所被民力獲紓亦見本朝仁逺之意顒望鈞慈亟賜報可某等當與下邑黎庶永戴洪恩干犯鈞嚴下情不勝俯伏俟命之至咸淳四年十月日右武大夫閣門宣贊舍人主管華州雲臺觀易士英朝散郎集英殿修撰黃萬石通奉大夫寶章閣待制曾頴茂文華閣直學士大中大夫陳宗禮資政殿學士通奉大夫致仕包恢劄子是年十一月尚書省劄子下建昌軍仰將南豐縣民户咸淳四年夏秋二稅蠲免一年外仍劄江西轉運司行下本軍將南豐縣咸淳四年和糴米照數蠲免收回糴本併劄送包資政等官準此代申省為陳參政請諡狀竊惟聖經存節惠之文清朝有錫諡之典所以旌别淑慝昭示來今儻非依賴於鈞陶何以輝光於泉壤伏念先君樞參資政年垂七帙厯仕兩朝清介方嚴不混流俗平生徑直之節著在朝廷簡靜之政行於郡國為學官因冬雷上疏語侵大臣鄭丞相惡之而斥為宰屬因陳四大願厯詆時事丁大全惡之而又斥景定更化天日清明起散地乘軺傳觀風嶺海一道肅清中間雖以詩語為御史虞虙所誣徙居二水而元宰當國察其非辜曾不踰年尋叨擢用由庶僚而登言路由言路而升從班彈擊不避貴權論思必主正大一時忠言讜議以之為首端人雅士以之為宗出帥羊城以清約洗貪風以安靜鎮逺俗至今南人歌思靡忘暨登廟堂守正不變雖莫究大用而天下善類識與不識翕然以名節稱之其持身處事治家居官皎皎無毫髮磨玷至若讀書講道勤苦自厲則壯老猶一日也公朝為之贈官加賻恩全始終亦既哀榮無憾矣永惟墓草已宿一惠未章不肖孤零丁待盡弗克顯揚深懼先君名實與草木俱腐無以贖不孝罪謹繕寫行狀一帙叩首百拜以請欲望朝廷俯賜矜念或蒙特達密啓徑降恩旨為易其名或蒙下之有司從公議諡豈惟不肖孤誓報洪恩九原有知亦將永永戴德其無斁某冒犯鈞嚴下情不勝俯伏俟命之至呈州轉申廉訪分司救荒狀大德十年丙午歲春夏間江浙大飢吾邦與鄰郡皆然景象惡甚豫不能安條其事上於郡適分司官至因以聞竊惟民間或有疾苦學校所當開陳本州歸附三十餘年多遇豐歲民各安生亦曾間有艱糴之時然止是小歉不至大傷惟有今年凶荒特甚豈非歲在丙午自古以為厄會邪即今飢民充塞道塗沿門乞食扶老携幼氣命如絲菜色雷腹行步傾倒一村一保之間兒號婦哭所不忍聞蓋緣此州本是窮原去處山多田少地狹民貧雖遇豐年猶有不給自大德四年以來連年不熟罕有積儲至七年八年則旱損其半九年則蟲傷尤多民户輸糧還債之外所存無幾上年臘月農家多已無飯度歲矣苦捱至春又遇雪凍閏月以後淫雨連綿至三月二十一日夜半西鄉峯嶺等處山水發洪衝田拔屋莽為沙邱如秧如麥俱巳蕩盡沿河一帶彌望蕭然常年猶有鄰境可以通融今則鄰路俱荒四境斗絶常年猶有蔬菜可以助食今則久雨浸淫蔬菜腐死常年猶有客船運米可以接續今則州民前往下江販運多被龍興撫建闌遏不許到州常年米碩價止中統鈔一十兩糴戶猶曰艱難今則價值日增倍而又倍且又夾雜水濕沙粳舂簸之餘一斗僅得七升而已以此展計每碩乃成三十兩之上小民久困鈔從何來以至將屋宇園畬絲麻衣服牛犂器具甚至貓犬等物俱已典賣應急自春至夏厯日滋久蓋亦罄竭矣且糧多之户不免猶有缺食者耕農之家困乏可知弱者忍飢待盡強者率衆開倉或有百十為羣突入大家升堂入厨需求飯食必待烹豬給酒醉飽乃去既曰飢民誰能抵拒亦且數衆叫囂震驚以此稅户亦不安居往往搬移回避景象殊惡蓋三十年所未見也居是邦者廪廩度日幸蒙省府矜恤纍次發糶官糧儻非得此賑飢則餓死久矣又奉榜文委官勸糶伏覩辭意哀矜懇切洞察民病百姓見榜歡聲如雷以至感極而泣然官倉所糶每户多者五斗少者一二斗而止略計人口不同大槩僅充五日之食所食既盡又只忍飢今才五月上旬相去秋成尚逺兼本州山深地寒止宜晚禾惟有近郭鄉村略種早稻通計十分之內早稻止有三分各濟本鄉何能普及近為大水衝田之後補插稻秧比常年栽插之時甚為遲緩恐至七月才見收刈况又未卜有收無收凡人一不食則飢再不食則困三不食則餓且死豈能空腹忍死待秋熟乎至如逺村止種晚禾直到秋冬之交然後成熟似此飢荒正長委計利害今則未論秋後且慮目前若不多方措置不惟餓死者衆亦恐别生事端倍費有司處置伏見本州官糧除已糶出及存留年終支持外尚有餘賸乞行照勘數目接續發糶拘錢還官仍乞申覆省府乞於糧多路分轉撥萬石儹運前來接濟亦是損有餘補不足之意就乞行下龍興撫建諸路放行米船毋得阻遏均是江西地面一般飢民何忍妄分彼我瘠魯肥杞也其有富户蓄米待價固是愚而無知不恤禍敗理宜督勒隨時平糶庶免後患可保家業至若姦民不畏官法乘時放強鼓動惡少不問物主擅取倉禾此風亦不可長所宜折其萌芽合無多出榜文嚴加禁治嘗聞古人救荒有法凡禁治閉糶之户強糴之民必將二事並行蓋以安富恤貧不至偏負如某所陳似涉激切然事急不暇徐行心痛不及緩聲如言可采早望定奪實一州生靈之幸伏乞照詳施行是年省府節節行下糶糧又專官親臨賑濟孤貧者分遣郡官下鄉勸諭大家減價發糶郡侯聶公伯達名從政懇惻奉承秋毫無擾貧富安之又勸農競種蕎麥為明年續食計所收甚廣暨丁未歲民得麥續食不復有飢由是兩歲雖歉而獲免溝壑者皆公家全活力也建請改葬鄉賢遊澧州狀竊惟尊禮先賢國家之令典建明義事學校之公言伏見南豐志該載先賢數內有故澧州太守遊大夫諱少遊文學政事為時名臣亡殁之後已行薶葬經今百年昨因至元己丑庚寅間兵冦擾攘將本官墳墓發掘破棺取物衆皆見其金紫儼然顏貌如生衣服俱被剝去尸體棄於道傍子孫凋零無人收瘞鄰近憐其裸露就將浮土略為掩藏不復再行正葬今則又厯年深雨水浸淫牛畜踐踏此去日久必復暴露矣生前既是品官身後豈宜如此本處亦有善人肯為出力遷葬却為未曾聞官由此未能輕動本官元葬新城耆接連玊泉地靣有玉泉耆儒人黃貢元名猶方讀書知禮樂為義事謂宜委之此人倡率鄉里仁人義士及遊門宗親協力維持製造棺衾將本官遺骸裝斂入棺加以釘線灰漆如法封閉結砌墳穴用石蓋壓務令完牢仍於墓前鐫石明書澧州太守遊公之墓致祭安奉以表先賢則澤及朽骨風厲薄俗誠州郡之美事也講究隄備湖冦事宜狀竊惟江海湖泊水靣濶逺蘆葦阻深致有盜賊出沒從古不免而近年為尤甚剽劫商旅損傷官員非止掩其資財又且占其妻子尋䡮無處生死銜寃今者李某所陳件件皆實原其事理蓋緣賊船盤據水中巡尉逺在岸上追捕縣隔力無所施又賊船民船混雜波心雖有智者不能辨認為今之計謂宜别立水路巡捕司驗地靣逺近節節置立使聲勢相接首擊尾應給以官船日夜巡哨其有雇覓民船裝載者宜依李某所陳令本人經官告給印信勘合及用火印烙船參照相同見得某處某人管下附籍船户如此明白若或船無火印及無勘合即是賊船顯然彰露自無所容而水盜因可弭矣至如船居之戶規避差發則宜印烙其船及依土居粉壁例置立粉版開寫户貫人口官為置籍時常點視非止官府得以役使而姦盜不至窩藏此又一舉而兩利也其要在乎講之周密行之堅決又須嚴立法禁隄防巡捕司與賊交通之弊庶可戢水盜護良民惟執事者實圖利之生靈幸甚水雲村稿卷十四
